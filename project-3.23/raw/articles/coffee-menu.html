<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡时光 - 菜单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #f5f0e8 0%, #e8dfd0 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .poster-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fffaf0;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(139, 90, 43, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #8B4513 0%, #6B3410 100%);
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 20px 20px;
            opacity: 0.5;
        }

        .shop-name {
            font-family: "Songti SC", "SimSun", serif;
            font-size: 48px;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 8px;
            position: relative;
        }

        .shop-name-en {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 4px;
            font-weight: 300;
        }

        .coffee-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .menu-section {
            padding: 40px 30px;
        }

        .section-title {
            font-family: "Songti SC", "SimSun", serif;
            font-size: 28px;
            color: #5D4037;
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: #8B4513;
            margin: 15px auto 0;
        }

        .menu-grid {
            display: grid;
            gap: 0;
        }

        .menu-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            padding: 20px 0;
            border-bottom: 1px dashed #d4c4b0;
            align-items: center;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .item-name {
            font-size: 20px;
            color: #3E2723;
            font-weight: 600;
        }

        .item-name-en {
            font-size: 14px;
            color: #8D6E63;
            font-style: italic;
        }

        .item-desc {
            font-size: 13px;
            color: #A1887F;
            line-height: 1.5;
            margin-top: 5px;
        }

        .item-price {
            font-size: 24px;
            color: #5D4037;
            font-weight: 700;
            white-space: nowrap;
            text-align: right;
        }

        .price-symbol {
            font-size: 16px;
            margin-right: 2px;
        }

        .shop-info {
            background: linear-gradient(135deg, #5D4037 0%, #4E342E 100%);
            padding: 35px 30px;
            color: #fff;
        }

        .shop-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            text-align: center;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }

        .info-value {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }

        .wifi-info {
            grid-column: span 2;
        }

        .footer {
            background: #3E2723;
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .divider {
            height: 15px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                #d4c4b0 10px,
                #d4c4b0 20px
            );
            margin: 0 30px;
        }

        @media (max-width: 600px) {
            .shop-name {
                font-size: 32px;
                letter-spacing: 4px;
            }

            .menu-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .item-price {
                text-align: left;
            }

            .shop-info-grid {
                grid-template-columns: 1fr;
            }

            .wifi-info {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="poster-container">
        <header class="header">
            <div class="coffee-icon">☕</div>
            <h1 class="shop-name">咖啡时光</h1>
            <p class="shop-name-en">COFFEE TIME</p>
        </header>

        <section class="menu-section">
            <h2 class="section-title">美式咖啡</h2>

            <div class="menu-grid">
                <div class="menu-item">
                    <div class="item-info">
                        <span class="item-name">美式咖啡</span>
                        <span class="item-name-en">Americano</span>
                        <span class="item-desc">浓缩咖啡与水的经典搭配</span>
                    </div>
                    <div class="item-price"><span class="price-symbol">¥</span>22</div>
                </div>
            </div>
        </section>

        <div class="divider"></div>

        <section class="shop-info">
            <div class="shop-info-grid">
                <div class="info-item">
                    <span class="info-label">地址</span>
                    <span class="info-value">示例地址</span>
                </div>
                <div class="info-item">
                    <span class="info-label">电话</span>
                    <span class="info-value">示例电话</span>
                </div>
                <div class="info-item">
                    <span class="info-label">营业时间</span>
                    <span class="info-value">07:00 - 21:00</span>
                </div>
                <div class="info-item">
                    <span class="info-label">WiFi</span>
                    <span class="info-value">Coffee2024</span>
                </div>
            </div>
        </section>

        <footer class="footer">
            欢迎光临 · 期待您的下次光临
        </footer>
    </div>
</body>
</html>
