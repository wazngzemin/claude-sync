<text x="474" y="908" font-size="14" fill="#fff" font-weight="bold" text-anchor="start">端侧自闭环 · 实时不绕云(归需求9端侧能力)</text>
<text x="474" y="942" font-size="12.5" fill="#334155" text-anchor="start">• 听声辨位转向:唤醒后转向说话人,24°快速聚焦——慢了就怪,必须端侧</text>
<text x="474" y="961.5" font-size="12.5" fill="#334155" text-anchor="start">• 多人交互转向状态机(V11新增):首次转唤醒人 / 异位转中间 / 唤醒打断重置</text>
<text x="474" y="981.0" font-size="12" fill="#b91c1c" text-anchor="start">  → 这是『一轮对话内的有状态逻辑』,不是简单条件→动作,建议单拎子项</text>
<text x="474" y="1000.0" font-size="12.5" fill="#334155" text-anchor="start">• 外力扭头 → 即时反馈(cry+shake_head+sick)</text>
<rect x="40" y="1052" width="373.3333333333333" height="108" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#sh)"/>
