<text x="900" y="648" text-anchor="middle" class="t-box" style="font-size:12px;">4步判定: ❶ ID_000预判过滤(闲聊/纯控制/问路) → ❷ 上下文辅助(speaker_position/env_info)</text>
<text x="900" y="664" text-anchor="middle" class="t-box" style="font-size:12px;">→ ❸ 场景特殊规则(观影位置/副驾限定/情绪温度) → ❹ 互斥锚定(最终确认归属)</text>
<text x="900" y="690" text-anchor="middle" class="t-box">输出: 13个场景ID (ID_001~ID_013) + ID_000兜底 · 支持多场景同时命中</text>
<text x="900" y="706" text-anchor="middle" class="t-warn">⚠ 当前命中率 60-70%（目标 ≥85%）· 1/3的query被错分或漏分</text>
<rect x="340" y="718" width="540" height="70" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>

<text x="370" y="735" class="t-example-a" style="font-size:11px;">案例A 分类过程:</text>

<text x="370" y="763" class="t-box-sm">❷ 无特殊上下文 → 继续</text>
<text x="370" y="776" class="t-box-sm">❹ 命中互斥4.5: "猫""照顾" → <tspan font-weight="700" fill="#dc2626">输出 ID_011 (宠物关怀) → 分子级场景!</tspan></text>
<rect x="920" y="718" width="540" height="70" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<rect x="930" y="725" width="10" height="10" rx="2" fill="#16a34a"/>
<text x="950" y="735" class="t-example-b" style="font-size:11px;">案例B 分类过程:</text>
<text x="950" y="750" class="t-box-sm">❶ 有体感("热""闷") → 不是纯控制指令 → 继续</text>
<text x="950" y="763" class="t-box-sm">❸ 命中4.3: "热" → ID_004(降温), "闷/通风" → ID_012(通风)</text>
<text x="950" y="776" class="t-box-sm">❹ 多场景命中 → <tspan font-weight="700" fill="#16a34a">输出 ID_004,ID_012 (降温+通风) → 编排级场景!</tspan></text>

<text x="405" y="920" text-anchor="middle" style="font-size:14px;font-weight:700;fill:#dc2626;">🅰 分子级路径：案例A "我车里有只猫帮我照顾一下"</text>

<text x="405" y="955" text-anchor="middle" class="t-box-title">分子级调用（6个预置场景）</text>

<text x="405" y="996" text-anchor="middle" class="t-box">🔋 离车保电    🛏 大床模式    💺 一键躺平</text>
<text x="405" y="1015" text-anchor="middle" class="t-box-sm" style="fill:#991b1b;">特征: 执行项100%确定 · 有安全边界 · 有回滚 · 不走Planner编排 · 不注入Skill</text>
<text x="405" y="1033" text-anchor="middle" class="t-example-a">→ 案例A 命中 🐾 宠物模式</text>
<line x1="405" y1="1045" x2="405" y2="1070" stroke="#dc2626" stroke-width="2" marker-end="url(#a-red)"/>
<rect x="150" y="1070" width="510" height="55" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="405" y="1092" text-anchor="middle" class="t-box-title" style="font-size:13px;">方向靠 Function Call 下发</text>
<text x="405" y="1110" text-anchor="middle" class="t-data">function_call: "开启宠物模式"  →  方向靠端侧执行</text>
<text x="405" y="1120" text-anchor="middle" class="t-warn" style="font-size:10px;">⚠ 当前方向靠尚未注册此指令! 需整理Query示例提给左晨!</text>

<text x="405" y="1170" text-anchor="middle" class="t-box-title" style="font-size:13px;">前置条件校验 + 二次确认弹窗</text>
<line x1="150" y1="1178" x2="660" y2="1178" stroke="#fca5a5" stroke-width="1"/>
<text x="405" y="1195" text-anchor="middle" class="t-data">P档 ✓ · 电量≥20% ✓ · 高压正常 ✓ · 整车电源run ✓</text>
<text x="405" y="1211" text-anchor="middle" class="t-box-sm">弹窗: "空调温度设置(默认22°C)" → 用户点确认 → 正式进入模式</text>
<line x1="405" y1="1225" x2="405" y2="1250" stroke="#dc2626" stroke-width="2" marker-end="url(#a-red)"/>
<rect x="100" y="1250" width="610" height="310" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#sh)"/>
<text x="405" y="1272" text-anchor="middle" class="t-box-title" style="font-size:14px;">预置应用执行（宠物模式 · 共15条固定执行项）</text>
<line x1="120" y1="1280" x2="690" y2="1280" stroke="#fca5a5" stroke-width="1"/>
<text x="140" y="1298" class="t-data" style="font-size:10px;">① 设置弹窗 → 空调温度（仅开启前可编辑，默认22°C）</text>
<text x="140" y="1314" class="t-data" style="font-size:10px;">② 确认弹窗 → 用户确认后执行</text>
<text x="140" y="1330" class="t-data" style="font-size:10px;">③ 中控屏 → 专属占屏（显示温度 + '不用担心，主人马上回来'）</text>
<text x="140" y="1346" class="t-data" style="font-size:10px;">④ 后排屏 → 黑屏屏蔽，用户不可操作</text>
<text x="140" y="1362" class="t-data" style="font-size:10px;">⑤ 多媒体/小程序 → 全部暂停</text>
<text x="140" y="1378" class="t-data" style="font-size:10px;">⑥ 关闭所有车窗  ⑦ 关闭氛围灯  ⑧ 关闭阅读灯</text>
<text x="140" y="1394" class="t-data" style="font-size:10px;">⑨ 打开空调A/C → 温度22°C  ⑩ 打开空调外循环</text>
<text x="140" y="1410" class="t-data" style="font-size:10px;">⑪ 语音功能 → 屏蔽（防止宠物误触发）</text>
<text x="140" y="1426" class="t-data" style="font-size:10px;">⑫ 高压维持 → 电源off后仍维持高压</text>
<text x="140" y="1442" class="t-data" style="font-size:10px;">⑬ 空调维持 → 电源off后仍可运行空调</text>
<text x="140" y="1458" class="t-data" style="font-size:10px;">⑭ 外部锁车后 → 屏蔽车内电动控键，解锁后解除</text>
<text x="140" y="1474" class="t-data" style="font-size:10px;">⑮ 屏蔽空调硬开关（若有配置）</text>
<line x1="120" y1="1496" x2="690" y2="1496" stroke="#fca5a5" stroke-width="1"/>
<text x="405" y="1512" text-anchor="middle" class="t-ok">✅ 全部确定性执行 · 100%可靠 · 不依赖LLM推理</text>
<text x="405" y="1528" text-anchor="middle" class="t-ok">✅ 退出时15条全部自动回滚至进入前状态</text>
<text x="405" y="1544" text-anchor="middle" class="t-ok">✅ 运行期持续监控: 高压异常/SOC&lt;15%/非P档 → 自动退出+APP短信通知</text>

<text x="1250" y="920" text-anchor="middle" style="font-size:14px;font-weight:700;fill:#16a34a;">🅱 编排级路径：案例B "我好热好闷赶紧帮我降降温通通风"</text>
<rect x="820" y="935" width="860" height="195" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
<text x="1250" y="955" text-anchor="middle" class="t-box-title" style="font-size:14px;fill:#5b21b6;">📚 动态知识检索 + 注入 Planner SP</text>
<line x1="840" y1="962" x2="1660" y2="962" stroke="#c4b5fd" stroke-width="1"/>
