<text x="842.6666666666666" y="1122" font-size="12.5" fill="#334155" text-anchor="start">PRD是当期D6X(标了1/2/3批)</text>
<text x="842.6666666666666" y="1142" font-size="12" fill="#b91c1c" text-anchor="start">→ 找航哥定,再决定排不排期</text>
