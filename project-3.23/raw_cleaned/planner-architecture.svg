<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1050" width="960" height="1050">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 18px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .layer-label { font-size: 15px; font-weight: 600; fill: #111827; }
    .node-label { font-size: 13px; font-weight: 600; fill: #111827; }
    .node-sub { font-size: 11px; fill: #6b7280; }
    .badge { font-size: 10px; font-weight: 600; fill: #ffffff; }
    .section-label { font-size: 14px; font-weight: 700; fill: #374151; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="1050" fill="#ffffff"/>
  <text x="480" y="36" text-anchor="middle" class="title">Driver Agent 2.0 — Planner 系统全景架构图</text>
  <text x="480" y="54" text-anchor="middle" class="subtitle">三层漏斗 + 端云协同 + Planner 内部工作流 + 四类任务</text>
  <rect x="20" y="70" width="920" height="100" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="90" class="section-label">入口层：端云协同分流</text>
  <circle cx="80" cy="130" r="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="80" y="134" text-anchor="middle" font-size="16">🗣</text>
  <text x="80" y="158" text-anchor="middle" class="node-sub">用户语音</text>
  <rect x="150" y="100" width="200" height="55" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="122" text-anchor="middle" class="node-label">端侧（车载芯片）</text>
  <text x="250" y="140" text-anchor="middle" class="node-sub">本地LLM + 白名单匹配</text>
  <rect x="400" y="105" width="120" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="460" y="130" text-anchor="middle" class="node-label" fill="#166534">本地响应</text>
  <rect x="580" y="100" width="200" height="55" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="122" text-anchor="middle" class="node-label">云侧（仲裁模型）</text>
  <text x="680" y="140" text-anchor="middle" class="node-sub">Seed 1.6 Flash SFT</text>
  <line x1="98" y1="130" x2="148" y2="128" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="350" y1="120" x2="398" y2="122" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="352" y="106" width="48" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="376" y="117" text-anchor="middle" class="node-sub" fill="#16a34a">能接住</text>
  <path d="M 350,140 L 400,150 L 578,128" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="420" y="142" width="60" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="450" y="153" text-anchor="middle" class="node-sub" fill="#dc2626">接不住</text>
  <rect x="820" y="105" width="100" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="870" y="130" text-anchor="middle" class="node-label" fill="#166534">快速下发</text>
  <line x1="780" y1="118" x2="818" y2="120" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="795" y="112" text-anchor="middle" class="node-sub" fill="#16a34a">简单</text>
  <rect x="20" y="185" width="920" height="440" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1" opacity="0.3"/>
  <text x="40" y="208" class="section-label">核心链路：三层漏斗（云侧复杂流量处理）</text>
  <rect x="60" y="220" width="840" height="85" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="70" y="224" width="80" height="20" rx="4" fill="#2563eb"/>
  <text x="110" y="238" text-anchor="middle" class="badge">第一层</text>
  <text x="160" y="238" class="layer-label">句法RAG — 精确匹配，直接执行</text>
  <text x="70" y="260" class="node-sub">能力：拒识 | 车书问答 | 音乐搜播 | 音色演绎 | 出行规划 | 简单车控 | GUI Agent | 天气查询</text>
  <text x="70" y="278" class="node-sub">特点：用户query精确匹配 → 毫秒级响应 → 车厂可自行配置 → 数据可回流</text>
  <rect x="720" y="250" width="80" height="28" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="760" y="269" text-anchor="middle" class="node-label" fill="#166534">直接执行</text>
  <line x1="700" y1="264" x2="718" y2="264" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="685" y="257" text-anchor="middle" class="node-sub" fill="#16a34a">命中</text>
  <line x1="480" y1="305" x2="480" y2="320" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="500" y="316" class="node-sub" fill="#ea580c">未匹配 ↓ 漏到下一层</text>
  <rect x="60" y="325" width="840" height="100" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="70" y="329" width="80" height="20" rx="4" fill="#16a34a"/>
  <text x="110" y="343" text-anchor="middle" class="badge">第二层</text>
  <text x="160" y="343" class="layer-label">情景RAG + 仲裁模型 — 知识注入 + 简单/复杂分流</text>
  <rect x="80" y="355" width="200" height="55" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="180" y="375" text-anchor="middle" class="node-label">情景RAG</text>
  <text x="180" y="393" text-anchor="middle" class="node-sub">注入few-shot知识 → 辅助模型拆解</text>
  <rect x="320" y="355" width="200" height="55" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="420" y="375" text-anchor="middle" class="node-label">仲裁模型</text>
  <text x="420" y="393" text-anchor="middle" class="node-sub">判断简单 vs 复杂</text>
  <rect x="570" y="355" width="130" height="55" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="635" y="378" text-anchor="middle" class="node-label" fill="#166534">简单指令</text>
  <text x="635" y="396" text-anchor="middle" class="node-sub">云侧LLM直接出</text>
  <line x1="520" y1="375" x2="568" y2="378" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="420" y1="410" x2="420" y2="435" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="440" y="430" class="node-sub" fill="#ea580c">复杂 ↓</text>
  <line x1="280" y1="382" x2="318" y2="382" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="299" y="376" text-anchor="middle" class="node-sub" fill="#9333ea">注入</text>
  <rect x="60" y="440" width="840" height="170" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5"/>
  <rect x="70" y="444" width="80" height="20" rx="4" fill="#9333ea"/>
  <text x="110" y="458" text-anchor="middle" class="badge">第三层</text>
  <text x="160" y="458" class="layer-label">Planner — 深度推理，任务拆解（doubao-seed-1.8 SFT）</text>
  <rect x="80" y="480" width="110" height="40" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="135" y="505" text-anchor="middle" class="node-label">拒识判断</text>
  <rect x="210" y="480" width="120" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="270" y="505" text-anchor="middle" class="node-label">plan_describe</text>
  <rect x="350" y="480" width="100" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="400" y="505" text-anchor="middle" class="node-label">查记忆</text>
  <rect x="470" y="480" width="100" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="520" y="505" text-anchor="middle" class="node-label">查车况</text>
  <rect x="590" y="480" width="100" height="40" rx="6" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="640" y="505" text-anchor="middle" class="node-label">任务拆解</text>
  <rect x="710" y="480" width="100" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="760" y="505" text-anchor="middle" class="node-label">调用Agent</text>
  <line x1="190" y1="500" x2="208" y2="500" stroke="#6b7280" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="330" y1="500" x2="348" y2="500" stroke="#6b7280" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="450" y1="500" x2="468" y2="500" stroke="#6b7280" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="570" y1="500" x2="588" y2="500" stroke="#6b7280" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="690" y1="500" x2="708" y2="500" stroke="#6b7280" stroke-width="1" marker-end="url(#arr-blue)"/>
  <rect x="710" y="535" width="100" height="35" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="760" y="557" text-anchor="middle" class="node-label">plan_update</text>
  <rect x="710" y="575" width="100" height="25" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="760" y="592" text-anchor="middle" class="node-sub" fill="#166534">总结回复用户</text>
  <line x1="760" y1="520" x2="760" y2="533" stroke="#6b7280" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="760" y1="570" x2="760" y2="573" stroke="#16a34a" stroke-width="1" marker-end="url(#arr-green)"/>
  <text x="80" y="555" class="node-sub">Planner 四大专属工具：plan_describe（说计划）| search_user_preferences（查记忆）| search_vehicle_status_info（查车况）| plan_update（更新进度）</text>
  <rect x="20" y="630" width="920" height="80" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
  <text x="40" y="653" class="section-label">执行层：下游 Agent</text>
  <rect x="60" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="96" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">车控</text>
  <rect x="140" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="176" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">音乐</text>
  <rect x="220" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="256" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">本地生活</text>
  <rect x="300" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="336" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">联网QA</text>
  <rect x="380" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="416" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">联网搜索</text>
  <rect x="460" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="496" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">条件任务</text>
  <rect x="540" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="576" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">短视频</text>
  <rect x="620" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="656" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">记忆</text>
  <rect x="700" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="736" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">S2S</text>
  <rect x="780" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="816" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">VQA</text>
  <rect x="860" y="665" width="72" height="30" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="896" y="685" text-anchor="middle" class="node-sub" fill="#991b1b">GUI</text>
  <line x1="480" y1="610" x2="480" y2="660" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="20" y="725" width="920" height="130" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="748" class="section-label">Planner 四类任务类型</text>
  <rect x="40" y="760" width="210" height="80" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="48" y="780" class="node-label">单步复杂任务</text>
  <rect x="220" y="766" width="24" height="16" rx="4" fill="#93c5fd"/>
  <text x="232" y="778" text-anchor="middle" class="badge">S7</text>
  <text x="48" y="800" class="node-sub">一句话 → 多个并行子任务</text>
  <text x="48" y="816" class="node-sub" fill="#9ca3af">例：「我好热」→ 开空调+座椅通风+调温度</text>
  <rect x="270" y="760" width="210" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="278" y="780" class="node-label">多步任务</text>
  <rect x="450" y="766" width="24" height="16" rx="4" fill="#86efac"/>
  <text x="462" y="778" text-anchor="middle" class="badge">S8</text>
  <text x="278" y="800" class="node-sub">有先后顺序的多步骤</text>
  <text x="278" y="816" class="node-sub" fill="#9ca3af">例：「去昨天那个餐厅」→ 查记忆→导航</text>
  <rect x="500" y="760" width="210" height="80" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="508" y="780" class="node-label">条件任务</text>
  <rect x="680" y="766" width="24" height="16" rx="4" fill="#fdba74"/>
  <text x="692" y="778" text-anchor="middle" class="badge">S8</text>
  <text x="508" y="800" class="node-sub">条件满足后自动执行</text>
  <text x="508" y="816" class="node-sub" fill="#9ca3af">例：「10分钟后关座椅加热」</text>
  <rect x="730" y="760" width="195" height="80" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="738" y="780" class="node-label">持续任务</text>
  <rect x="895" y="766" width="24" height="16" rx="4" fill="#c084fc"/>
  <text x="907" y="778" text-anchor="middle" class="badge">S9</text>
  <text x="738" y="800" class="node-sub">长时间持续进行</text>
  <text x="738" y="816" class="node-sub" fill="#9ca3af">例：「介绍沿途风景」</text>
  <rect x="20" y="870" width="920" height="160" rx="10" fill="#faf5ff" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
  <text x="40" y="893" class="section-label">演进方向：Goal List + Advisor 体系（文档三）</text>
  <rect x="60" y="905" width="250" height="110" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="928" text-anchor="middle" class="node-label">Goal List（目标列表）</text>
  <rect x="75" y="940" width="55" height="24" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="102" y="956" text-anchor="middle" class="node-sub">舒适</text>
  <rect x="140" y="940" width="55" height="24" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="167" y="956" text-anchor="middle" class="node-sub">出行</text>
  <rect x="205" y="940" width="55" height="24" rx="5" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="232" y="956" text-anchor="middle" class="node-sub">情感</text>
  <rect x="270" y="940" width="55" height="24" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="297" y="956" text-anchor="middle" class="node-sub">内容</text>
  <text x="185" y="985" text-anchor="middle" class="node-sub">+ 动态目标（点咖啡、介绍风景…）</text>
  <rect x="370" y="905" width="240" height="50" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="928" text-anchor="middle" class="node-label">Planner（新职责）</text>
  <text x="490" y="945" text-anchor="middle" class="node-sub">推理 + 对话 + 串联（重时延、要快）</text>
  <rect x="370" y="970" width="240" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="992" text-anchor="middle" class="node-label">Advisor（新职责）</text>
  <text x="490" y="1008" text-anchor="middle" class="node-sub">目标追踪 + 主动服务（重思考、可以慢）</text>
  <line x1="310" y1="950" x2="368" y2="930" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="310" y1="960" x2="368" y2="990" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <path d="M 490,955 L 490,968" fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="660" y="905" width="260" height="110" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="670" y="928" class="node-label" fill="#9333ea">核心变化</text>
  <text x="670" y="948" class="node-sub">1. Planner 不再更新目标进展</text>
  <text x="670" y="966" class="node-sub">2. Advisor 负责监控目标达成</text>
  <text x="670" y="984" class="node-sub">3. 动态目标 → 自动注册动态Advisor</text>
  <text x="670" y="1002" class="node-sub">4. 打断恢复由Advisor决定是否恢复</text>
  <g transform="translate(20, 1030)">
    <line x1="0" y1="8" x2="25" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/><text x="30" y="12" fill="#6b7280" font-size="11">主流程</text>
    <line x1="90" y1="8" x2="115" y2="8" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/><text x="120" y="12" fill="#6b7280" font-size="11">执行/输出</text>
    <line x1="200" y1="8" x2="225" y2="8" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/><text x="230" y="12" fill="#6b7280" font-size="11">漏斗下沉</text>
    <line x1="310" y1="8" x2="335" y2="8" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arr-purple)"/><text x="340" y="12" fill="#6b7280" font-size="11">知识注入</text>
    <line x1="420" y1="8" x2="445" y2="8" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/><text x="450" y="12" fill="#6b7280" font-size="11">Agent调用</text>
  </g>
</svg>