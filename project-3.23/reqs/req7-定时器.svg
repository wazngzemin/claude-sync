<circle cx="66" cy="144" r="12" fill="#ffffff"/>
<text x="66" y="149" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">1</text>
<text x="88" y="150" font-size="15.5" font-weight="bold" fill="#ffffff">你(PM)产出 — 时间条件需求定义</text>
<text x="66" y="186" font-size="13" fill="#1f2937">• 三类:定时(N分钟后) / 日期 / 节日</text>
<text x="66" y="208" font-size="13" fill="#1f2937">• 定时器做在端上,时间信息要能透出</text>
<path d="M570.0,234 L570.0,258" stroke="#94a3b8" stroke-width="2.6" marker-end="url(#a)"/>
<rect x="40" y="262" width="1060" height="132" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8" filter="url(#sh)"/>
<rect x="40" y="262" width="1060" height="36" rx="12" fill="#7c3aed"/>
<rect x="40" y="280" width="1060" height="18" fill="#7c3aed"/>
<circle cx="66" cy="280" r="12" fill="#ffffff"/>
<text x="66" y="285" font-size="14" font-weight="bold" fill="#7c3aed" text-anchor="middle">2</text>
<text x="88" y="286" font-size="15.5" font-weight="bold" fill="#ffffff">交给谁 → 他拿到后做什么</text>
<text x="62" y="322" font-size="13.5" font-weight="bold" fill="#5b21b6">开发 · 刘洋(端侧)</text>
<text x="66" y="348" font-size="13" fill="#1f2937">• 把『时间』当成端状态的一个维度</text>
<text x="66" y="370" font-size="13" fill="#1f2937">• 定时器挂进端侧触发器(像每隔N分钟 check)</text>
