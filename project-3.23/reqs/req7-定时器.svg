<rect x="40" y="424" width="1060" height="84" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.8" filter="url(#sh)"/>
<rect x="40" y="424" width="1060" height="36" rx="12" fill="#0d9488"/>
<rect x="40" y="442" width="1060" height="18" fill="#0d9488"/>
<circle cx="66" cy="442" r="12" fill="#ffffff"/>
<text x="66" y="447" font-size="14" font-weight="bold" fill="#0d9488" text-anchor="middle">3</text>
<text x="88" y="448" font-size="15.5" font-weight="bold" fill="#ffffff">测试验收</text>
<text x="66" y="484" font-size="13" fill="#1f2937">• 弱网 / 隧道场景下定时仍能触发</text>
<path d="M570.0,510 L570.0,534" stroke="#94a3b8" stroke-width="2.6" marker-end="url(#a)"/>
