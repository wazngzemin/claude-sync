<svg viewBox="0 0 1820 1480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L9 4 L0 8 z"/></marker>
  </defs>
  <rect x="0" y="0" width="1820" height="1480" fill="#FFFFFF"/>
  <text x="40" y="56" font-size="34" font-weight="700" fill="#1F2A44">触发器 · 业务流程（注册 + 运行主循环）</text>

  <!-- A 注册阶段 -->
  <rect x="40" y="84" width="130" height="92" fill="#5B3FA3"/><text x="58" y="124" font-size="20" font-weight="700" fill="#FFFFFF">A 注册</text><text x="58" y="152" font-size="14" fill="#E2DBF4">场景进库</text>
  <rect x="190" y="84" width="288" height="92" fill="#EFEAF9" stroke="#5B3FA3" stroke-width="1.6"/><text x="206" y="116" font-size="17" font-weight="700" fill="#1F2A44">来源产生需求</text><text x="206" y="142" font-size="14" fill="#51607A">Planner / Advisor / 预设 /</text><text x="206" y="164" font-size="14" fill="#51607A">用户 / 运营</text>
  <rect x="510" y="84" width="320" height="92" fill="#EFEAF9" stroke="#5B3FA3" stroke-width="1.6"/><text x="526" y="116" font-size="17" font-weight="700" fill="#1F2A44">解析器拆条件</text><text x="526" y="142" font-size="14" fill="#51607A">condition{...}</text><text x="526" y="164" font-size="14" fill="#51607A">执行项默认 = notify planner</text>
  <rect x="700" y="84" width="78" height="24" fill="#FBE3E0" stroke="#2B3A55" stroke-width="1.4"/><text x="710" y="103" font-size="13" font-weight="700" fill="#C0392B">需2 P0</text>
  <rect x="862" y="84" width="252" height="92" fill="#FCF3E6" stroke="#8A4B12" stroke-width="1.6"/><text x="878" y="116" font-size="17" font-weight="700" fill="#1F2A44">常识判断？</text><text x="878" y="142" font-size="14" fill="#51607A">黄赌毒 / 反科学 → 拒</text><text x="878" y="164" font-size="14" fill="#51607A">否 → 注册失败回执</text>
  <rect x="1146" y="84" width="430" height="92" fill="#EFEAF9" stroke="#5B3FA3" stroke-width="1.6"/><text x="1162" y="116" font-size="17" font-weight="700" fill="#1F2A44">注册入场景库</text><text x="1162" y="142" font-size="14" fill="#51607A">存 条件 + 执行项 + 任务原文</text><text x="1162" y="164" font-size="14" fill="#51607A">注册成功 → 回执 Planner</text>
  <line x1="478" y1="130" x2="508" y2="130" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="130" x2="860" y2="130" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1114" y1="130" x2="1144" y2="130" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="1576,176 1640,176 1640,792 822,792" fill="none" stroke="#5B3FA3" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1300" y="208" font-size="15" fill="#5B3FA3">场景集供判定读取 ↓</text>

  <!-- B 运行主循环 -->
  <rect x="40" y="232" width="130" height="78" fill="#8A4B12"/><text x="58" y="270" font-size="20" font-weight="700" fill="#FFFFFF">B 运行</text><text x="58" y="296" font-size="14" fill="#F3E2CC">主循环 ↻</text>

  <rect x="360" y="320" width="440" height="68" fill="#EAF2FC" stroke="#2B3A55" stroke-width="1.6"/><text x="380" y="352" font-size="18" font-weight="700" fill="#1F2A44">① 信号产生</text><text x="380" y="376" font-size="15" fill="#51607A">端 / 云信号源实时产生</text>
  <line x1="580" y1="388" x2="580" y2="414" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="416" width="440" height="68" fill="#E6F4EC" stroke="#1E5E3A" stroke-width="1.8"/><text x="380" y="448" font-size="18" font-weight="700" fill="#1E5E3A">② 写入信号库</text><text x="380" y="472" font-size="15" fill="#1F2A44">标准化快照 · 含任务状态</text>
  <line x1="580" y1="484" x2="580" y2="510" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="512" width="440" height="68" fill="#FBF1E3" stroke="#8A4B12" stroke-width="1.6"/><text x="380" y="544" font-size="18" font-weight="700" fill="#1F2A44">③ 触发扫描 / 取信号快照</text><text x="380" y="568" font-size="15" fill="#51607A">任意信号更新 或 周期(5s)</text>
  <line x1="580" y1="580" x2="580" y2="606" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="608" width="440" height="86" fill="#FCF3E6" stroke="#8A4B12" stroke-width="2"/><text x="380" y="640" font-size="18" font-weight="700" fill="#8A4B12">④ 场景判定：条件全达成？</text><text x="380" y="666" font-size="15" fill="#1F2A44">规则判定【事件+额外条件】</text><text x="380" y="688" font-size="15" fill="#1F2A44">+ 模型判定（VLM 自然语言）</text>
  <rect x="690" y="608" width="86" height="24" fill="#FBE3E0" stroke="#2B3A55" stroke-width="1.4"/><text x="700" y="627" font-size="13" font-weight="700" fill="#C0392B">需10·11</text>
  <polyline points="360,650 270,650 270,546 358,546" fill="none" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="606" font-size="14" fill="#51607A">否·继续扫描</text>
  <line x1="580" y1="694" x2="580" y2="720" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="592" y="714" font-size="14" fill="#1E5E3A">是 ↓</text>
  <rect x="360" y="722" width="440" height="66" fill="#FBF1E3" stroke="#8A4B12" stroke-width="1.6"/><text x="380" y="752" font-size="18" font-weight="700" fill="#1F2A44">⑤ 数值抖动过滤</text><text x="380" y="775" font-size="15" fill="#51607A">抖动区间 + 周期内不重复</text>
  <line x1="580" y1="788" x2="580" y2="814" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="816" width="440" height="66" fill="#FBF1E3" stroke="#8A4B12" stroke-width="1.6"/><text x="380" y="846" font-size="18" font-weight="700" fill="#1F2A44">⑥ 冲突仲裁</text><text x="380" y="869" font-size="15" fill="#51607A">命中多场景取优先级最高</text>
  <line x1="580" y1="882" x2="580" y2="908" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="910" width="440" height="86" fill="#FCF3E6" stroke="#8A4B12" stroke-width="2"/><text x="380" y="942" font-size="18" font-weight="700" fill="#8A4B12">⑦ 需要视觉识别？</text><text x="380" y="968" font-size="15" fill="#1F2A44">是 → VLM 子流程（右）</text><text x="380" y="990" font-size="15" fill="#1F2A44">否 → 直接执行 ↓</text>
  <line x1="580" y1="996" x2="580" y2="1042" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="1044" width="440" height="78" fill="#FBEAEA" stroke="#9A2A2A" stroke-width="2"/><text x="380" y="1076" font-size="18" font-weight="700" fill="#1F2A44">⑧ 执行内容</text><text x="380" y="1100" font-size="15" fill="#51607A">车控 / advisor / 通知planner / HMI · 疲劳管理</text>
  <rect x="690" y="1044" width="76" height="24" fill="#EFF1F5" stroke="#2B3A55" stroke-width="1.4"/><text x="702" y="1063" font-size="13" font-weight="700" fill="#51607A">需9 后</text>
  <line x1="580" y1="1122" x2="580" y2="1148" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ⑨ 下游 -->
  <rect x="60" y="1150" width="1540" height="100" fill="#F1F3F7" stroke="#2B3A55" stroke-width="1.6"/>
  <text x="78" y="1182" font-size="18" font-weight="700" fill="#1F2A44">⑨ 下游</text>
  <rect x="200" y="1166" width="380" height="68" fill="#FFFFFF" stroke="#2B3A55" stroke-width="1.5"/><text x="216" y="1196" font-size="16" font-weight="700" fill="#1F2A44">Planner</text><text x="216" y="1220" font-size="14" fill="#51607A">通知"任务已触发"→ 执行(真正车控)</text>
  <rect x="600" y="1166" width="600" height="68" fill="#FFFFFF" stroke="#2B3A55" stroke-width="1.5"/><text x="616" y="1196" font-size="16" font-weight="700" fill="#1F2A44">N 个 Advisor（舒适/内容/出行/情感）</text><text x="616" y="1220" font-size="14" fill="#51607A">12 类事件：上车/下车/接近目的地/疲劳/天气…</text>
  <rect x="1108" y="1172" width="84" height="24" fill="#FBE3E0" stroke="#2B3A55" stroke-width="1.4"/><text x="1118" y="1191" font-size="13" font-weight="700" fill="#C0392B">需10 P0</text>
  <rect x="1220" y="1166" width="360" height="68" fill="#FFFFFF" stroke="#2B3A55" stroke-width="1.5"/><text x="1236" y="1196" font-size="16" font-weight="700" fill="#1F2A44">车辆 / HMI</text><text x="1236" y="1220" font-size="14" fill="#51607A">车控 · 卡片 · 语音播报</text>
  <line x1="400" y1="1250" x2="400" y2="1286" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ⑩ 回写续接 -->
  <rect x="200" y="1288" width="780" height="74" fill="#E6F4EC" stroke="#1E5E3A" stroke-width="2"/><text x="220" y="1320" font-size="18" font-weight="700" fill="#1E5E3A">⑩ 回写 &amp; 闭环 &amp; 续接</text><text x="220" y="1346" font-size="15" fill="#1F2A44">执行记录回写云端 · 通知 Planner · 续接：周期→回扫描 / 单次→完成 / 被打断→恢复</text>
  <rect x="896" y="1296" width="74" height="24" fill="#EFF1F5" stroke="#2B3A55" stroke-width="1.4"/><text x="908" y="1315" font-size="13" font-weight="700" fill="#51607A">需7 后</text>
  <polyline points="200,1325 130,1325 130,546 358,546" fill="none" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="96" y="950" font-size="15" font-weight="700" fill="#8A4B12" transform="rotate(-90 96,950)">续接 ↻ 回到扫描</text>

  <!-- VLM 子流程 -->
  <rect x="1000" y="900" width="600" height="330" fill="#E6F4EC" stroke="#1E5E3A" stroke-width="2"/>
  <text x="1018" y="934" font-size="18" font-weight="700" fill="#1E5E3A">VLM 识别子流程（⑦"是"走这里）</text>
  <rect x="1018" y="946" width="564" height="78" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="1.6"/><text x="1034" y="976" font-size="16" font-weight="700" fill="#1F2A44">命中后标记</text><text x="1034" y="1000" font-size="14" fill="#51607A">优先级 P0-P4 · 互斥组 VLM_CABIN/FRONT</text><text x="1034" y="1018" font-size="14" fill="#51607A">冷却(P0不冷却 · Always-on 3s/5s)</text>
  <line x1="1300" y1="1024" x2="1300" y2="1042" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1018" y="1044" width="564" height="78" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="1.6"/><text x="1034" y="1074" font-size="16" font-weight="700" fill="#1F2A44">下发运行指令 → VLM</text><text x="1034" y="1098" font-size="14" fill="#51607A">task_id / task_goal / priority / timeout</text><text x="1034" y="1116" font-size="14" fill="#51607A">mutex_group / trigger_source / expire_at</text>
  <line x1="1300" y1="1122" x2="1300" y2="1140" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1018" y="1142" width="564" height="70" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="1.6"/><text x="1034" y="1172" font-size="16" font-weight="700" fill="#1F2A44">VLM 识别 → 接收终态</text><text x="1034" y="1196" font-size="14" fill="#51607A">成功 / 空结果 / 失败超时(红线) / 打断</text>
  <polyline points="800,1064 880,1064 880,978 1016,978" fill="none" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="812" y="1054" font-size="14" fill="#1E5E3A">是 →</text>
  <polyline points="1018,1177 940,1177 940,450 802,450" fill="none" stroke="#1E5E3A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="918" y="840" font-size="15" font-weight="700" fill="#1E5E3A" transform="rotate(-90 918,840)">VLM结果回写信号库</text>
</svg>
