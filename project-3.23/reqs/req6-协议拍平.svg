<text x="88" y="308" font-size="15.5" font-weight="bold" fill="#ffffff">交给谁 → 他们拿到后做什么</text>
<text x="62" y="344" font-size="13.5" font-weight="bold" fill="#5b21b6">开发 刘洋 → 供应商</text>
<text x="66" y="370" font-size="13" fill="#1f2937">• 刘洋:评估改造工作量</text>
<text x="66" y="392" font-size="13" fill="#1f2937">• 供应商:按新协议格式改造(代价不小)</text>
