<script id="data" type="application/json">{"records": [{"id": "feedback_apply_user_role", "category": "memory", "badge": "FEEDBACK", "color": "amber", "title": "套用 AI PM 人设", "subtitle": "User is AI PM — proactively infer suitable format/style from this role instead of asking the user to pick", "scope": "global", "status": "active", "updated": "05-26", "body": "When the user asks for explainers, docs, or any output where format/style is a choice, infer the appropriate style from their AI PM role (already saved in user_profile.md) rather than offering generic options like \"teaching / tech review / story\".\n\n**Why:** User pushed back on 2026-05-26: \"我给你说过我的人设是Ai产品经理,你为什么就记不住呢?你觉得我该用什么类型呢?\" — surfacing that I asked a style question I should have answered myself by referencing memory.\n\n**How to apply:** For an AI PM on Driver Agent 2.0 Planner, default to **hybrid pedagogical + tech-review** style:\n- Concept-first, then mechanism, then example (teaching structure)\n- Hard data, real architecture, real tradeoffs (tech-review rigor)\n- Each section ends with \"PM talking points\" or \"向上汇报口径\" — what they can take into a stakeholder conversation\n- Diagrams should be architecture/flow/data charts, not abstract metaphors\n\nStill ask the user when there's a genuine product decision (e.g., scope, what to save, what to delete) — but not for style questions answerable from their role.", "linkKeys": ["feedback_apply_user_role", "Apply user role when making style/format decisions", "Apply user role when making style/format decisions", "feedback-apply-user-role"], "metaType": "feedback", "info": "feedback"}, {"id": "feedback_dont_delete_user_content", "category": "memory", "badge": "FEEDBACK", "color": "amber", "title": "不删用户内容", "subtitle": "整理/优化用户文档时,绝不自作主张删内容或重构;'优化话术'≠删减重写", "scope": "global", "status": "active", "updated": "06-15", "body": "给王泽民改文档(讲稿/PRD/图)时,**不要擅自删内容、去重、重构结构**。他要\"优化话术/风格\"时,默认含义是\"在原内容上打磨措辞\",**不是**删段落、不是改结构。\n\n**Why**:本会话连犯两次——他要 renwei 优化讲稿话术,我却先\"整篇去重\"把他第一~十二段讲稿正文删了,他暴怒\"你全给我删了前面的\"。后又全量还原成 4 个重复版,他又嫌\"全是重复\"。两头不讨好,根源都是**替他做了删/重构的决定**。\n\n**How to apply**:\n1. 改文档先**只做加法/改词**,不删段、不动结构。要删/合并/去重,**先问**(用 AskUserQuestion 给他拍板留哪版),别猜。\n2. **每次大改前先 `cp` 一份带后缀备份**(`_X前备份.html`),留兜底,改完告诉他备份在哪。\n3. renwei 话术优化要忠于\"少动\":他的讲稿本就是好口吻(带例子/自问自答),AI 一磨人味就没——只清真 AI 痕迹(破折号/三段对仗/金句/拔高),其余保留,逐处交代。\n4. 他认可的方案要落到**唯一交付物**,别留一堆并行版本。\n\n讲稿现状(2026-06-15):`产品-端侧触发器/触发器流程图-评审讲解稿.html` 已合并为单一版=大图+开场+主持人分段第一~十二段(内嵌15/24原子·VLM精讲)+谁写代码+结语。**每段有两个图都要留**:① mini-flow 文字摘要条(用户明确\"还是需要文字的\",别删);② 该段独立流程图——**只含该段模块、重新连线重画**,不是大图截框(`diagrams-v2/gen_segflow.py`,segflow01~12.svg)。教训:他要\"每段流程图\"=重画干净子图,截大图局部框他嫌乱。详见 [[project_trigger_architecture]] [[feedback_trigger_diagram]]。", "linkKeys": ["feedback_dont_delete_user_content", "feedback_dont_delete_user_content", "feedback-dont-delete-user-content", "feedback-dont-delete-user-content"], "metaType": "feedback", "info": "feedback"}, {"id": "feedback_fork_internalization_format", "category": "memory", "badge": "FEEDBACK", "color": "amber", "title": "fork 内化格式", "subtitle": "How the user wants articles/forks turned into something he can actually use — workflow remodel, not analysis", "scope": "global", "status": "active", "updated": "06-08", "body": "fork 文章时，用户要的是**严格按 article-forker SKILL** 输出，且**每次必须同时给两份：详细教程(concept.md) + 工具(tool.html)**，不要只给一个、不要留着等确认。深度对标 forks/2026-05-27-markdown-is-programming/concept.md（369 行、贴他真实 SP/23工具/触发清单、带真实模板+本周P0/P1/P2）。\n\n**最致命的教训（2026-06-08 反复翻车）：必须先读透\"他给的实际原文\"，忠实于文章真正的论点，不能套模板。** 数据治理那篇：我做成了\"怎么把 Skill 治理做得更好\"，但黄钊的题眼是反转——\"关键恰恰不是数据治理（那是无底洞陷阱），真出路是 AI First 重设计让数据从源头按规则产生\"。把 fork 做成了作者明确否定的结论 = 没读他的文档。务必抓住作者**真正强调/反对**的是什么，再落到他工作上。\n\n他明确拒绝/踩过的雷：\n- 学术拆解（论证链/隐含假设/破绽单独堆给他看）——看不懂、带不进工作（但 source.md 内部仍按 deep-read-guide 做）\n- 自作主张加戏（如\"对内/对外\"\"X 草稿\"——没让写就别写）\n- 把\"深\"丢掉换成几张薄卡片——\"一点也不深、没按 skill\"\n- 套通用模板而不读原文真实论点\n\n**Why**：他评判产出看两条——①是否忠实文章真正想说的；②是否够深且能内化进他 Planner/触发器日常工作 + 喂养输出闭环（见 [[user-content-creator-system]]）。\n**How to apply**：① 先逐字读他给的原文，提炼作者真正的 thesis（尤其反转/否定句）；② 严格按 skill 出 source+concept+tool 三件套，每次都给 concept+tool 两份；③ concept 深度对标 markdown-is-programming，贴他真实工作内容。关联 [[feedback_fork_workflow]]。", "linkKeys": ["feedback_fork_internalization_format", "feedback_fork_internalization_format", "feedback-fork-internalization-format", "feedback-fork-internalization-format"], "metaType": "feedback", "info": "feedback"}, {"id": "feedback_fork_workflow", "category": "memory", "badge": "FEEDBACK", "color": "amber", "title": "Fork 工作流偏好", "subtitle": "Every fork must have timestamp, update INDEX.md, be systematic not fragmented, include SVG logic diagrams", "scope": "global", "status": "active", "updated": "基础", "body": "Every article fork must include exact timestamp (YYYY-MM-DD HH:mm) in metadata.json.\n\n**Why:** User frequently gives articles for analysis and needs to retrieve past forks by date/time. Also wants a chronological record of all forks.\n\n**How to apply:**\n- metadata.json must have `fork_time` field with exact time\n- After every fork, append a row to `forks/INDEX.md` with date, title, category, outputs, local path, wiki links\n- HTML tool outputs must use systematic module-based layout with SVG logic diagrams, not fragmented card layouts\n- Every module needs: learning objective → core diagram → steps → checkpoint", "linkKeys": ["feedback_fork_workflow", "Fork workflow preferences", "Fork workflow preferences", "feedback-fork-workflow"], "metaType": "feedback", "info": "feedback"}, {"id": "feedback_trigger_diagram", "category": "memory", "badge": "FEEDBACK", "color": "amber", "title": "触发器图细化诉求", "subtitle": "用户要\\\"细化触发器架构图\\\"时的真实诉求——别换结构、拆原子、线标为什么、按流程分色", "scope": "global", "status": "active", "updated": "06-15", "body": "给王泽民细化触发器架构图时,经过多轮纠偏后确认的真实诉求(一开始我反复跑偏:换成26/44节点别的结构、照抄复刻、问太多)。\n\n**Why**:用户有一张自己设计的 30 节点全模块大图(产品-端侧触发器,原图 1-30 + L1-L33),要的是**在这张图基础上\"细化\"**,不是重画结构、不是复刻、不是另起炉灶。\n\n**How to apply**(下次做触发器/类似图直接照这个来):\n1. **骨架不要换**——他的 30 节点是对的(《业务流程讲解稿》《全链路详解》就是按它讲的)。只在其上加细,别改结构、别改编号。\n2. **触发器模块要拆到原子级**——15云端拆 11 原子(注册校验/场景库/信号扫描/条件判定/抖动过滤/冷却频控/优先级仲裁/端云分类/标准事件/CallbackRouter/场景下发);24端侧拆 12 原子(规则接收/信号扫描/两级判定/本地定时器/优先级仲裁/冷却Always-on/运行指令/VLM调度/抢占恢复/结果回写/动作执行/弱网兜底)。\n3. **每条线标\"为什么\"**——不是\"L12\",而是\"信号变了→取快照求值\"\"过频控→排优先级\"这种因果。\n4. **按流程分色**——注册流/信号流/判定流/下发流(端云粗线)/命中输出流/执行流,纵向流水线,别缠成一团。\n5. **细化要有依据**——接口/DSL 字段必须自己逐字核对原文(接口文档/DSL定义【对外】),\"待确认项\"(range/持续时长/group/VLM并发)要标⚠不能当既定。\n\n产出在 `产品-端侧触发器/diagrams-v2/`(gen*.py 可改重导)。最终图见 `触发器全模块大图-终版`(原图布局+4路径分色+15/24拆原子)。\n\n**写评审讲稿时**:用户本人的评审腔调与详细度标准 = `产品-端侧触发器/端侧触发器需求评审会讲稿.md`(逐字稿)。特征:\"各位好/我先说一句把范围框死\"\"我问大家一个问题:…答案是:\"\"举个例子\"\"大家注意\"\"为什么X不能Y?…(具体后果如撞车)\"\"好,…讲完了\"\"核心就一句话\"\"端侧没脑子只管执行\";详细度=走读(带例子/JSON/为什么),不是列要点。别自编PM口语。讲稿产物:`触发器流程图-评审讲解稿.html`。详见 [[project_trigger_architecture]]。", "linkKeys": ["feedback_trigger_diagram", "feedback_trigger_diagram", "feedback-trigger-diagram", "feedback-trigger-diagram"], "metaType": "feedback", "info": "feedback"}, {"id": "project_career_embodied_ai", "category": "memory", "badge": "PROJECT", "color": "green", "title": "转具身智能", "subtitle": "User (王泽民) wants to transition into the embodied intelligence (具身智能) industry; evaluate work through that lens", "scope": "project", "status": "active", "updated": "06", "body": "王泽民（本项目用户，豆包上车 AI PM）有**转具身智能（Embodied AI）行业**的职业目标（2026-06 提出）。\n\n**已对齐的判断框架**（见根目录 `触发器Planner转具身智能_能力迁移图谱.html`）：\n- 他 own 的 **Planner（任务规划）+ 触发器（条件触发）** 正是具身\"认知脑\"上半身，是 PM/LLM 背景转具身的标准入口。\n- 强迁移：分层任务规划、tool_feedback 闭环/Replan、行为树/FSM 式触发、SP/上下文工程、多模态融合、空间 grounding、记忆、评测集。\n- 缺口（只需听得懂不需自己做）：低层控制/操作/移动、VLA 架构（先读 SayCan/PaLM-E——与他的 Planner+触发器几乎同构）、仿真/数据引擎。\n- 代表作方向：触发器的\"条件二次判断 / affordance（可供性）校验\"缺口。\n\n**How to apply**：今后涉及他工作价值/方向选择时，默认带\"对转具身有无帮助\"的视角；优先肯定认知脑层工作，提醒少往账号/支付/商业集成等对具身零加成的方向投入。关联 [[project_trigger_system]]、[[user_profile]]。", "linkKeys": ["project_career_embodied_ai", "project_career_embodied_ai", "project-career-embodied-ai", "project-career-embodied-ai"], "metaType": "project", "info": "project"}, {"id": "project_director_sp_groundtruth", "category": "memory", "badge": "PROJECT", "color": "green", "title": "Director SP 真身", "subtitle": "Director 真实 SP 事实校正——存在多版本；06-09版26工具/5字段/情绪状态机，06-12版28工具/4字段/14emoji；端状态表格式、skill列表污染", "scope": "project", "status": "active", "updated": "06-12", "body": "用户 2026-06-09 提供了 Director（=Planner）**当前生产环境真实 SP**，它是权威一手资料，纠正了 CLAUDE.md schema 和旧版 promptv3.md 的多处说法。讲架构/做评测时以此为准：\n\n- **工具 = 26 个**（CLAUDE.md 说23、旧 promptv3 说18，都过时）。新增/回归：vehicle_system_settings、vehicle_communication_control、personal_skill_record、trip_plan_record、ai_broadcast_generate、auto_drive、ambient_light_control、car_log、car_care_qa、recording_minutes、image_generate(真可用)、search_visual_info(含屏幕内容问答)。\n- **车型 = 上汽荣威 D6X，五座 SUV**（不是\"6座增程版\"）。后排空调不可调温/风量、座椅按摩仅前排、无HUD、车门/雨刮/儿童锁/智驾开关不支持语音——这些是车控幻觉的护栏。\n- **输出 5 字段**：talk_or_not / talk_content / **emoji_id**(17个形象动画) / **emotional_state_change**(情绪状态机:平静/欣喜/关切/低落/生气/好奇,有转换规则,不突变) / action_list[{action_id,params,tool_name}]。\n- **输入 user_query 新字段**：timestamp(自我时间感知,>30天好久不见)、assistant_emotional_state(情绪连贯)、goal_list、env_info(后两者随输入直传,可免调工具)。\n- **易混点(评测重点)**：媒体播控(上一首/暂停)归 vehicle_system_settings 不归音乐工具；记忆分两类(客观事实→operate_user_memory，交互习惯→personal_skill_record)；**navi/route/poi/trip 4个工具不可并行**。\n- **SP 末尾「动态专业知识」块 = 前置筛选模块注入点**，对应\"知识筛选专家\"SP（6类专家EXP/DRV/COM/ENT/LIFE/EMO×四段式知识ID），是 token 优化核心落点。\n\n**2026-06-12 用户又贴了一版真实 SP，与上面 06-09 版有差异（存在多版本，讲解前确认是哪版）：**\n- **工具 = 28 个**（编号到29缺18）。命名与06-09版不同：vehicle_communication（非_control）、user_memory_search/user_memory_operate、audio_record（非recording_minutes）、visual_qa（非search_visual_info）、broadcast_search 等。\n- **输出 = 4 字段**：talk_or_not / talk_content（情绪用[]标签如[开心地说]写在话里）/ emoji_id（**14个**）/ action_list。**这版没有 emotional_state_change 独立字段，也不是17个emoji**——与06-09版的\"5字段/情绪状态机/17emoji\"冲突，说明版本在演进。\n- **车端状态确实是表格式**`_参数顺序_:[模式,位置,状态,开关,温度]`+位置对齐行 → 实锤\"模型读不懂端状态\"(A2根因)；**当前播放音频在端状态里有歌名** → 歌名幻觉可改 music_search.notice 一行修复。\n- **个性化skill列表(用户个性化需求)严重污染**：大量重复(s-90/91、s-102/103、s-144/145)、矛盾、无效\"记录希望优化UI…后续反馈优化\"skill → 占context稀释注意力，需 personal_skill_record 加去重+按说话人过滤。\n- **可立即改 = 所有固定段纯文本**(工具notice/tips、注意事项、能力边界、参考示例)；端状态改造/skill清洗要工程；方位映射等要训练。\n- 实修方案产物：`planner 架构/SP实修方案_基于真实SP_20260612.html`（逐工具before/after）；另有 系统大图_深度版、全量Bug逐例详细分析、流程图全景 等聚合报告。\n\n陪读产物在 `planner 架构/planner_round1~4_*.html`（round4 是 SP 真身解剖）。相关 [[project_trigger_system]] [[user_profile]] [[project_planner_bug_taxonomy]]。", "linkKeys": ["project_director_sp_groundtruth", "project_director_sp_groundtruth", "project-director-sp-groundtruth", "project-director-sp-groundtruth"], "metaType": "project", "info": "project"}, {"id": "project_planner_bug_taxonomy", "category": "memory", "badge": "PROJECT", "color": "green", "title": "Planner bug 六大类", "subtitle": "Planner/Director bug 六大类框架(A-F)+33逐例case+分层解法L0-L6+实修物料，2026-06-12 排查会产物", "scope": "project", "status": "active", "updated": "06-12", "body": "2026-06-12 凌晨 Planner Bug 排查会（1h23m）后，为用户做了一整套 bug 聚合分析+解法落地。核心框架（讲 Planner 质量/给立委汇报时复用）：\n\n**六大类分诊框架（A–F）**——拿到任何 bug 走\"分诊决策树\"6步定责：\n- **A 推理**（大脑想错，真该修）：A1空间关系 / A2端状态读不懂 / A3上下文该调不调\n- **B 幻觉**（编造工具没返回的信息，如歌名）\n- **C 改写合理但下游接不住**（如\"开始导航到XX\"被意图分到算路）→ 转弋途\n- **D 非Planner**（ASR/UI/手动点击/FC/无log）→ 转走，约35%\n- **E 低优功能缺失** → 走干预/补能力边界\n- **F 严重性误标**（钓鱼case/POI联网/已闭环）→ 降级\n\n**关键结论**：33个逐例里真该Planner修(A+B)约17个，纯顽固模型问题仅3-4个（方位映射\"主驾右=副驾\"、温度反、坚持事实）；导航40+条真问题仅2-3条；Director官方177条里≈35%非自身。**\"Planner没有太大问题\"有数据支撑**。\n\n**分层解法 L0-L6**（越靠前越轻、剥离越多）：L0流程治理→L1干预平台(硬规则绕过模型)→L2注意事项→L3工具描述/知识→L4端状态改造(★治本,表格→自然语言)→L5下游/弋途→L6训练。性价比最高=L4端状态改造+L3补空间知识，都不用重训模型。\n\n**P级定义共识**：P0=高频域阻塞不可闭环 / PR=能闭环体验差 / P2-3=能完成不够好。红线：只有不可用才算bug。\n\n**评测缺口**（需产品先给definition）：情绪标签scope / emoji输出时机 / 下游TTS支持边界——否则评测兜不住、模型没法训。\n\n产物（planner 架构/）：会议纪要、全量Bug聚合分析报告、全量Bug逐例详细分析(33 case)、流程图全景、系统大图_深度版(含L0-L6解法+RACI+物料库)、SP实修方案_基于真实SP(逐工具before/after)。相关 [[project_director_sp_groundtruth]] [[project_trigger_system]] [[career_embodied_ai]]。", "linkKeys": ["project_planner_bug_taxonomy", "project_planner_bug_taxonomy", "project-planner-bug-taxonomy", "project-planner-bug-taxonomy"], "metaType": "project", "info": "project"}, {"id": "project_signal_format_ownership", "category": "memory", "badge": "PROJECT", "color": "green", "title": "信号格式归属", "subtitle": "端上报信号格式/单位归\\\"产品约束\\\"，不是端上拍；触发器侧应主动给建议格式", "scope": "project", "status": "active", "updated": "06-17", "body": "端上报信号的**格式/单位/示例归\"产品约束\"**，不是端上(汪帅/金龙)决定。汪帅2026-06原话「端状态上报产品来约束，产品要什么就实现什么」。所以遇到\"单位是米还是千米/时长什么格式/地址什么结构\"这类问题，**别去问端上**——这是产品 PRD 缺口。\n\n**人物链路（导航信号这块）：**\n- 仁杰 = 导航 PRD 的产品 owner（写格式/示例的人）\n- 汪帅、金龙 = 端上，只按 PRD 实现；金龙会把格式问题转给汪帅，汪帅再转仁杰\n- 王泽民(你) = 触发器侧产品，最清楚要什么格式（要配阈值）\n\n**正确打法：别等仁杰从零写，主动给\"建议格式\"反喂确认（快10倍）。** 触发器侧建议格式标准：剩余距离=整数·米；剩余时长=整数秒、到达时间=Unix时间戳（别用\"X小时X分\"字符串）；地址=字符串+经纬度，收藏地址带类型枚举(家/公司)。\n\n**Why:** 问错对象(端上)会被原地打回\"产品没定我不报\"，白耗一轮。\n**How to apply:** 格式/单位问题 → 给仁杰建议格式+@汪帅知会，不是问端上确认。详见 `信号要不到-推进手册-手把手.html` 的「端上格式」卡。关联 [[project_trigger_architecture]]、[[reference_config_platform]]。", "linkKeys": ["project_signal_format_ownership", "project_signal_format_ownership", "project-signal-format-ownership", "project-signal-format-ownership"], "metaType": "project", "info": "project"}, {"id": "project_trigger_architecture", "category": "memory", "badge": "PROJECT", "color": "green", "title": "端云触发器架构", "subtitle": "端云触发器架构定论——触发器=动态Advisor感知订阅的执行底座；云/端触发器分工 + 3条修正铁律", "scope": "project", "status": "active", "updated": "06-15", "body": "触发器（豆包上车 Driver Agent 2.0）架构定论，读完全部 PRD+6场会议+Advisor/Director架构后得出：\n\n**本质**：触发器不是独立产品，是**动态 Advisor（及 Planner/主动服务）感知订阅的执行底座**。动态 Advisor 把 Director 派的目标拆成 4 类任务，其中条件/定时/VLM 三类向触发器注册（感知订阅）。没有触发器，动态 Advisor 二期(DNA-616)的条件/定时/POI/VLM 全落不了地。\n\n**两个触发器分工**：\n- 云端触发器 = 注册校验+中转（Advisor/Planner 动态任务唯一入口）、规则/场景全集配置、跨任务语义仲裁、模型类事件、场景&任务下发。上汽是纯云端形态、直接承载判定。\n- 端侧触发器 = 两级条件判定、信号扫描+500ms快照对齐、P0-P4+互斥组、冷却/抢占恢复、端侧定时器[需7]、VLM调度+五态结果、结果回写信号库→上报Context、弱网动作闭环。赛力斯是端云结合、有端侧VLM。\n\n**3 条修正铁律（评审必守，撞 5/7 西钺结论的硬伤）**：\n1. 动态注册必须经云端触发器中转，不直连端侧；\n2. 端侧结果统一走 信号库→Context，端侧不直推 Advisor/Director（notify 在云端感知订阅层做）；\n3. 信号判定只在一侧（不双判）——上汽走云、赛力斯走端。\n\n**VLM 触发真身**：阈值穿越（last=False & this=True 上升沿才触发，防轰炸），event/state 两模式。上汽当期无端侧视觉、VLM 主战场是赛力斯。\n\n产物：`产品-端侧触发器/触发器需求-完整说明-是什么为什么怎么做如何做.md` + `diagrams-v2/触发器架构-评审版.svg/png`（gen.py 可改）。详见 [[project_trigger_system]] [[project_director_sp_groundtruth]]。", "linkKeys": ["project_trigger_architecture", "project_trigger_architecture", "project-trigger-architecture", "project-trigger-architecture"], "metaType": "project", "info": "project"}, {"id": "project_trigger_system", "category": "memory", "badge": "PROJECT", "color": "green", "title": "触发器产品链路", "subtitle": "User now owns the 触发器(Trigger) product; its link chain, owners, and the 上汽610 P0 (high-freq condition list)", "scope": "project", "status": "active", "updated": "06-15", "body": "用户(泽民/AI PM)被领导(大马)指派接手 **触发器(Trigger) 产品**——它是 主动服务/静态Advisor、动态Advisor、条件任务、机器人 四方共用的底层\"事件感知+判断+触发\"引擎,三要素=触发器/条件(Condition)/动作(Action)。\n\n**整条链路:** 用户语音→ASR→三层漏斗→Planner→意图模型(把人话翻成触发器协议,依赖\"高频条件清单\")→云端触发器(注册动&静、冲突仲裁、承载模型生成事件)→端侧触发器(判断是否触发、定时器、执行策略)→读端状态信号库v2.5→命中触发→notify给云 或 端上直接执行→tool_feedback回传。现状:**所有任务都走云端Planner**;目标态(赛力斯阶段):端侧直接闭环+端云分工+云端接模型。\n\n**关键负责人:** 意图=廖婉婷;触发器开发=刘洋(北京);测试=萝莉/绿货;后台配置=叶芳;端状态信号库v2.5维护=韩天亮;context=仁杰;动态Advisor产品=施佳杰;主动服务/静态Advisor产品=赵益红;机器人=吕壮;后台账号权限=找文涛/芭比(BABA)。\n\n**眼下P0(上汽DNA,610交需求,6/15前评审):** ①整理一版标准《高频触发条件清单》(对标理想任务大师,从信号库v2.5精选)→②交意图调模型→③评估赵益红事件表的\"?\"。协议改造/任意位置/视觉/端侧执行/时间/距离事件 全部挪到赛力斯阶段(仁杰拍板)。\n\n**DNA-616 动态advisor二期新增待办(2026-06-02内审,泽民被点名):** 领导优先级=导航/地理围栏/音频。①导航=地理围栏=POI距离事件(同一件事):触发器支持\"接近(距POI<阈值)/离开(>阈值)\"事件各触发1次→泽民评估\"云端能否拿到定位+POI信号、业务逻辑能否支持订阅\"。②事件触发接口透出+自动化验证(触发器承接)。③音频=文档无此模块,需向领导确认是(a)音频信号还是(b)播报体验(后者承接方是Director/豆包客户端)。坑:POI语义模糊(\"外婆家\"用户说的≠系统找的)、距离阈值要展示给用户(\"快到公司\"落成\"<500m\")。\n\n**文档资产(/Users/bytedance/Desktop/3.23/):** 行动指南.html(本周行动+9图)、触发器需求-全链路详解.html(13条需求·词典·交付物规格,最全·主文档)、触发器-骨架图与流程图.html(完整骨架图+业务流程图连线版)、reqs/(req1-9图+各分析md)。骨架链路图:`trigger-system-skeleton.png/.svg`。详见 [[feedback_apply_user_role]]。", "linkKeys": ["project_trigger_system", "project-trigger-system", "project-trigger-system", "project-trigger-system"], "metaType": "project", "info": "project"}, {"id": "project_video_panel", "category": "memory", "badge": "PROJECT", "color": "green", "title": "视频翻译面板", "subtitle": "User's video-translation web control panel — GitHub repo, how to run, architecture", "scope": "project", "status": "active", "updated": "06-09", "body": "用户把小虎视频翻译工具(`xiaohu-video-translate`)包了一个**本地网页控制面板**,方便可视化操作。\n\n- **GitHub(public)**: https://github.com/wazngzemin/video-translate-panel (SSH 身份 `wazngzemin`)\n- **本地目录**: `/Users/bytedance/Desktop/3.23/video-panel/`\n- **启动(首选)**: 双击 `视频翻译面板.app`(后台拉起+开浏览器,无终端窗口);停止双击 `停止面板.app`。也可 `python3 panel.py` / `bash start.sh`。默认 http://127.0.0.1:8765\n- **App 原理**: `.app/Contents/MacOS/run` 里 `nohup python3 panel.py &` 脱离会话;脚本内写死 PATH(含 /opt/homebrew/bin、~/.npm-global/bin)解决 Finder 启动找不到 yt-dlp/ffmpeg/claude\n- **架构**: 下载/Whisper 转写/ffmpeg 烧录由面板直接跑;翻译润色和出 Markdown 调度 `claude -p`(用现有登录,无 API key)。支持 YouTube/抖音/本地视频,中文/双语字幕。\n- **可移植**: 路径全相对自身,`scripts/` 已 vendored 原仓库脚本(MIT),clone 即用;`setup.sh` 装依赖(Apple Silicon→mlx-whisper,其它→faster-whisper)。\n- **依赖**: yt-dlp, ffmpeg, mlx-whisper/faster-whisper, claude CLI(需登录)。用户机器是 Mac M3。\n\n**踩过的坑(都已修复并入库)**:\n1. **HF 模型卡死**: mlx 模型走 xethub CDN,国内卡死。修复=转写子进程加 `HF_HUB_DISABLE_XET=1`(走普通 HTTP)。\n2. **brew/Trae 的 ffmpeg 都没 libass**,烧字幕报 `No option name near`。修复=仓库 `bin/ffmpeg` 用带 libass 的静态版(setup.sh 从 ffmpeg.martin-riedl.de 下),Mac 烧录用 `h264_videotoolbox` 硬件编码(~3.5x)。\n3. **claude -p 一次性翻 1800+ 行会 socket closed**。修复=每 ~100 条分段+失败重试 4 次。\n4. 烧录截帧验证常落在字幕空隙,要按 bi.ass 里真实 Dialogue 时间截帧。\n5. 转写跑在 homebrew python3.14(有 mlx),mlx 路径硬编码 large-v3-turbo,`--model` 只对 faster 生效。\n\n**Why**: 用户不想只在本机用,要能在别的电脑复现;且在国内网络。\n**How to apply**: 改面板看 `panel.py`(单文件:后端+内联HTML);提交后 `git push origin main`。一次完整任务实测:20分钟1080p视频,下载+转写+翻译+烧录全程约 30-40 分钟。", "linkKeys": ["project_video_panel", "project-video-panel", "project-video-panel", "project-video-panel"], "metaType": "project", "info": "project"}, {"id": "reference_config_platform", "category": "memory", "badge": "REFERENCE", "color": "purple", "title": "配置平台真实UI", "subtitle": "火山后台'触发器→场景管理→新建场景'真实UI结构(节点13)+ 待改造点", "scope": "project", "status": "active", "updated": "06-15", "body": "火山引擎 AI 汽车管理平台「触发器 → 场景管理 → 新建场景」= 架构图节点 13(规则配置平台)的真实后台。2026-06-15 用户截图确认,据此把节点13拆成 8 原子。\n\n**真实页面分区(= 13-1~13-8):**\n- 基础信息:场景名称(【测试/正式】-【使用方】-【场景】)、优先级(1)\n- 发布范围:渠道(上汽DNA)/指定车辆VIN(多选)/适用车型/软件版本(运算符) = effective_scope\n- 触发条件:**动态条件**(vlm信号·选信号/字段/运算符/值·多组·且/或)+ **静态条件**(车状态信号·24类字段·多组)\n- 执行动作:舒适/情感/出行/内容 Advisor + **主动推荐** + **延时执行** + 事件/注意力信息 + 下游输入(prompt)\n- 执行策略:执行总次数/单次上电周期/自然日内总次数/执行最小间隔(默认30秒) = execute_policy\n- 「新建场景」按钮 = 注册\n\n**车状态信号 24 类字段**:车辆行进状态/车内空调/空调循环/空气净化/座椅按摩/方向盘加热/音量/当前播放音频/近光灯/远光灯/后雾灯/轮胎/车内外温度/车门/座位占座/能量回收/座椅通风/座椅加热/导航/氛围灯/车辆速度/车窗/车门锁/行驶里程。\n\n**执行动作下拉**:舒适Advisor/情感Advisor/出行Advisor/内容Advisor/主动推荐/延时执行。\n\n**⚠ 需改造点(已标进节点13原子表)**:① 动态条件现在只有\"vlm信号\"占位,要补 VLM 7字段(camera_group/seat/query/interval/timeout/priority/mutex_group);② 运算符要补 range/持续时长/group与或/任一车门·座位;③ 执行动作要补端侧直执白名单(TTS/卡片/车控)+ custom_callback;④ 要补端云分类(哪些下发端侧24/留云)+ 端侧本地倒计时下发(弱网)+ 撤销/灰度(update_status 1生效2失效3删)。\n\n产物:`触发器流程图-评审讲解稿.html` 大图节点13已原子化 + 第七段后有节点13对照表(gen_final.py)。详见 [[project_trigger_architecture]]。", "linkKeys": ["reference_config_platform", "reference_config_platform", "reference-config-platform", "reference-config-platform"], "metaType": "reference", "info": "reference"}, {"id": "reference_feishu_wiki", "category": "memory", "badge": "REFERENCE", "color": "purple", "title": "飞书 wiki tokens", "subtitle": "Node tokens and doc IDs for the ai-car wiki space used by article-forker and llm-wiki-lark", "scope": "project", "status": "active", "updated": "05-26", "body": "Wiki: ai car\n- space_id: 7630463641124342714\n- root_token: CGZqwzyTliv4ktktSEvcQAF7nbg\n- INDEX doc_id: K5ujdRblCoSzFWx4eGzcjKUTnWb\n- LOG doc_id: GfGZd0zD8ojXUNxfy59cAJ1en3c\n\nNode tokens (for creating child docs):\n- raw/articles: K6XUwFE9miGZ5PkhXvgcX6XwnNf\n- wiki/sources: ZwZZwv089iMuhCku9qwcCJgfn7c\n- wiki/concepts: OawKwNIAhiUR3skninDcTFnCnKc\n\nPreviously created fork docs (2026-05-20 AI时代还要读书么):\n- Raw: ZzxJdDfFEo3joFxeKssckDhHn7h\n- Source: YHQjdTYdro5mqXx2uHlc290EnPf\n- Concept: ZmFndLO9RoPoqexUJ6tcyumxnif\n\nPublished methodology docs:\n- 2026-05-26 Planner 评测方法论 (对外分享): doc_id=ZO8QdCgFvo86zSxpdF9cj5dqnOb, url=feishu.cn/wiki/MlUEwNZY1ixd0Eka1sGcCd1LnFe, under wiki/concepts node\n\nPush lessons:\n- Lark docx 不支持任意 HTML — div/span/td/br/inline-style 等会被剥成纯文本(仍有警告但不阻塞)\n- 流程图/架构图必须改用飞书画板 DSL,不能用 HTML\n- 大文档(>20KB)应分段 append,单段建议 < 25KB 以避开 argv 长度风险", "linkKeys": ["reference_feishu_wiki", "Feishu wiki node tokens", "Feishu wiki node tokens", "reference-feishu-wiki"], "metaType": "reference", "info": "reference"}, {"id": "user_content_creator_system", "category": "memory", "badge": "USER", "color": "blue", "title": "内容创作系统", "subtitle": "User runs an X account + wants a low-friction content production system; his growth philosophy and what \\\"internalization\\\" means to him", "scope": "global", "status": "active", "updated": "近期", "body": "王泽民 不只是豆包上车 AI PM，也在认真做 AI 内容创作者。关键事实：\n\n- **X 账号**：2026 年 4 月末开始认真运营，到 2026-06 不到 1.5 个月涨到 ~1200 粉。内容 = 持续关注 AI 产品/Agent/开源工具/行业文章 → 提炼 → 短推/长推/文章输出。\n- **核心诉求**：想要一套**低摩擦的内容生产系统**，支撑长期、稳定、高频输出（不靠一时兴奋、不每天从零硬扛）。这正是他做 article-forker / wiki 的深层动机之一——forks 不只是内化进 Planner 工作，也是喂养 X 输出的燃料。\n- **成长地图（对他很有启发，可作沟通锚点）**：信息→知识→认知→**心→心性**（前三是他熟悉的，\"心/心性\"——发心/价值观/稳定性/真诚/长期认真——是他最受触动、想打开的更高维）。\n- **认同的理念**：Ilya\"对数尺度\"（认知差距是维度差距，自己还在早期但空间大）；\"意乐心\"与\"擅长>喜欢\"（长期能做的事要有内在乐趣+内驱，不是硬\"坚持\"）。\n- **认同的闭环**：AI 日报(高频输入)→周报(筛选聚合)→Wiki(分类沉淀)→原创认知/文章/手册；\"以点带面再到球\"的信息压缩与还原。2025 年 5 月加入某星球后一直践行输入-输出-成长闭环。\n\n**Why**：他对 fork 产物反复不满的根因，是产物没服务到\"内化进日常 + 喂养输出\"这个闭环；他评判一切产出都看是否进入这个闭环。\n**How to apply**：帮他做内容/知识整理时，默认目标是\"既能内化进工作、又能成为可输出素材\"，并保持低摩擦。关联 [[feedback_fork_workflow]] [[project_career_embodied_ai]] [[user_profile]]。", "linkKeys": ["user_content_creator_system", "user-content-creator-system", "user-content-creator-system", "user-content-creator-system"], "metaType": "user", "info": "user"}, {"id": "user_profile", "category": "memory", "badge": "USER", "color": "blue", "title": "用户画像 · 王泽民", "subtitle": "ByteDance AI PM on Doubao in-car intelligent cockpit (Driver Agent 2.0), non-technical, wants systematic/visual outputs", "scope": "global", "status": "active", "updated": "基础", "body": "User's name is **王泽民 (Wang Zemin / 泽民)**. He is a **product manager at ByteDance (字节跳动)**, working on the **Doubao (豆包) in-car intelligent cockpit** — specifically the **Driver Agent 2.0 Planner system**, deployed on SAIC Roewe D6X (上汽荣威 D6X). Recently also took over the **触发器(Trigger) product** (see [[project-trigger-system]]).\n\nKey context:\n- Role: AI 产品经理, responsible for the Planner module (task planning, tool orchestration, context management)\n- Currently focused on: Planner latency optimization, context compression, badcase analysis\n- Works with: Doubao Seed 1.8 model, 23 downstream tools, Goal List + Advisor architecture\n\nCommunication preferences:\n- Systematic structure over fragments — content should flow as a connected learning path\n- Visual logic diagrams (flowcharts, concept maps, decision trees) — not just text\n- \"Plugin-style learning\" — modular, each module self-contained but building on the previous\n- Immediately usable outputs — \"看完就能用\" is the standard\n- Prefers very detailed breakdowns with concrete examples, real data, and step-by-step flows\n- Frequently reads and shares articles, needs efficient retrieval of past analyses", "linkKeys": ["user_profile", "User profile", "User profile", "user-profile"], "metaType": "user", "info": "user"}, {"id": "skill_article-forker", "category": "skill", "badge": "SKILL", "color": "violet", "title": "article-forker", "subtitle": "触发: /forkit · /fork · 深度拆解文章 · 上传飞书知识库", "scope": "global", "status": "active", "updated": "", "body": "**触发: /forkit · /fork · 深度拆解文章 · 上传飞书知识库**\n\n把文章、随笔、转写稿、播客、thread、URL 或长文 fork 成可复用知识资产：source / concept / tool 三件套、Planner/SP/Agent 方法论产物、飞书 wiki 页、或交互式 HTML 教程。\n\n**何时用：** 用户想 fork / 深度阅读 / 逆向 / 把文章变成可复用知识。**触发：** /forkit、/fork、article-forker、fork this article、深度拆解文章、做成 source/concept/tool。\n\n**约束（来自记忆）：** 每次必须同时给 concept.md + tool.html 两份；先逐字读原文抓作者真正的 thesis（尤其反转/否定句），别套模板；深度对标 markdown-is-programming（贴真实 SP/工具/触发清单）。", "related": ["skill_llm-wiki-lark", "skill_graphify", "reference_feishu_wiki", "feedback_fork_workflow", "feedback_fork_internalization_format", "user_content_creator_system"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_graphify", "category": "skill", "badge": "SKILL", "color": "violet", "title": "graphify", "subtitle": "触发: /graphify", "scope": "global", "status": "active", "updated": "", "body": "**触发: /graphify**\n\n任意输入（代码、文档、论文、图像）→ 知识图谱 → 聚类社区 → 同时产出 HTML + JSON + 审计报告。\n\n**何时用：** 想把一堆素材或一段复杂内容结构化成实体-关系图、看聚类社区时。触发 /graphify。", "related": ["skill_article-forker"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_llm-wiki-lark", "category": "skill", "badge": "SKILL", "color": "teal", "title": "llm-wiki-lark", "subtitle": "触发: llm wiki · 知识库 · wiki ingest/query/lint/init/import", "scope": "global", "status": "active", "updated": "", "body": "**触发: llm wiki · 知识库 · wiki ingest/query/lint/init/import**\n\n在飞书云盘或知识库中构建三层目录架构的 LLM 知识库。支持云盘和知识库两种存储模式。\n\n**操作：** init（初始化）/ import（素材导入）/ ingest（源文档摄入）/ query（知识查询）/ lint（健康检查）。\n\n**何时用：** 把文档/文章/笔记整理成结构化知识库，或从已建知识库检索、合成答案。本项目 wiki/ 即此方法论的本地落地。", "related": ["skill_article-forker", "reference_feishu_wiki", "claudemd_project"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_hv-analysis", "category": "skill", "badge": "SKILL", "color": "teal", "title": "hv-analysis", "subtitle": "触发: 横纵分析 · 研究一下 · 深度研究 · 竞品分析", "scope": "global", "status": "active", "updated": "", "body": "**触发: 横纵分析 · 研究一下 · 深度研究 · 竞品分析**\n\n横纵分析法（Horizontal-Vertical Analysis）深度研究 Skill，数字生命卡兹克提出。融合索绪尔历时-共时、社会科学纵向-横截面、商学院案例研究与竞争战略。\n\n**双轴：** 纵轴追踪从诞生到当下的完整生命历程（叙事故事）；横轴在当下截面与竞品系统横向对比；交叉两轴产出独到洞察 → 精排 PDF 报告。\n\n**何时用：** 系统性研究产品/公司/概念/技术/人物。即使只说\"帮我了解一下 XX\"\"XX 是什么来头\"且需系统深研都触发。**不要用于：** 简单名词解释、公众号写作（用 khazix-writer）、标题摘要。", "related": [], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_deep-research", "category": "skill", "badge": "SKILL", "color": "teal", "title": "deep-research", "subtitle": "触发: deep research", "scope": "global", "status": "active", "updated": "", "body": "**触发: deep research**\n\nDeep research harness——扇出多源 web 搜索、抓取来源、对抗式验证 claims、合成带引用的研究报告。\n\n**何时用：** 想要深度、多源、经事实核查的研究报告。调用前若问题不够具体（如\"买什么车\"缺预算/用途/地区）先问 2-3 个澄清问题缩小范围，再把细化后的问题作 args 传入。", "related": [], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_khazix-writer", "category": "skill", "badge": "SKILL", "color": "rose", "title": "khazix-writer", "subtitle": "触发: 写文章 · 写稿子 · 续写 · 公众号长文 · 出稿", "scope": "global", "status": "active", "updated": "", "body": "**触发: 写文章 · 写稿子 · 续写 · 公众号长文 · 出稿**\n\n数字生命卡兹克（Khazix）的公众号长文写作 skill。\n\n**何时用：** 撰写公众号文章、写稿、续写、根据素材产出长文。丢来 PDF/brief/新闻链接/语音转文字说\"帮我写篇文章\"也触发。**不要用于：** 短内容（小红书/推特/朋友圈）或纯标题摘要（用 wechat-title）。", "related": ["skill_renwei-writing", "user_content_creator_system"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_renwei-writing", "category": "skill", "badge": "SKILL", "color": "rose", "title": "renwei-writing", "subtitle": "触发: 打磨文案 · 润色 · 帮我改 · 人味儿 · AI 味儿", "scope": "global", "status": "active", "updated": "", "body": "**触发: 打磨文案 · 润色 · 帮我改 · 人味儿 · AI 味儿**\n\n人味儿写作——打磨、润色、改写别人的文字时，保住文字背后那个人的存在感。\n\n**两层：** 底层原理（动不动、怎么动）+ 事后检查清单（动过的地方有没有 AI 味儿，源自 Wikipedia Signs of AI writing / blader humanizer）。\n\n**何时用：** 用户拿自己的文字要打磨/润色/精简/改写；代笔后说\"AI 味儿太重\"\"没人味儿\"的返工。**记忆约束：** 给王泽民改讲稿只清真 AI 痕迹（破折号/三段对仗/金句/拔高），其余保留、逐处交代，别删段别重构。", "related": ["feedback_dont_delete_user_content", "user_content_creator_system"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_any2card", "category": "skill", "badge": "SKILL", "color": "rose", "title": "any2card", "subtitle": "触发: 信息卡 · 卡片摘要 · 社交分享图 · 把链接做成卡片", "scope": "global", "status": "active", "updated": "", "body": "**触发: 信息卡 · 卡片摘要 · 社交分享图 · 把链接做成卡片**\n\n将任意文本、网页或 URL 转成可直接发布的 HTML 信息卡片。适合把文章、线程、论文、观点、数据摘要做成适合微信、小红书、X 发布的图片卡。", "related": ["user_content_creator_system"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_aihot", "category": "skill", "badge": "SKILL", "color": "rose", "title": "aihot", "subtitle": "触发: AI 日报 · AI HOT · AI 热点 · 最近 AI · 今天 AI 圈", "scope": "global", "status": "active", "updated": "", "body": "**触发: AI 日报 · AI HOT · AI 热点 · 最近 AI · 今天 AI 圈**\n\nAI HOT（aihot.virxact.com）中文 AI 资讯查询。直接 curl 公开 REST API 拉数据并整理成中文 markdown 简报，无需配置 API Key 或 MCP server。\n\n**何时用：** 任何中文 AI 资讯查询——今天 AI 圈有什么、AI 日报、OpenAI/Anthropic/Google 最近发布了什么、最近一周的 AI 论文。**铁律：不要 undertrigger**——用户问 AI 资讯而你不调本 Skill 就是把过时训练数据当今日新闻，对用户有害。", "related": ["user_content_creator_system"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_sun", "category": "skill", "badge": "SKILL", "color": "rose", "title": "sun", "subtitle": "触发: 用孙宇晨视角 · Justin Sun 会怎么看 · 孙哥模式", "scope": "global", "status": "active", "updated": "", "body": "**触发: 用孙宇晨视角 · Justin Sun 会怎么看 · 孙哥模式**\n\n孙宇晨（Justin Sun）的思维框架与表达方式。基于 21,829 条推文、1 本自传、155 集音频课、40+ 篇采访、2 篇核心长访谈、2 期英文播客、太空飞行纪录，提炼 14 个核心心智模型、18 条决策启发式和完整表达 DNA。\n\n**用途：** 作思维顾问，用孙宇晨视角分析加密行业、审视商业决策、提供反馈。", "related": [], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_fireworks-tech-graph", "category": "skill", "badge": "SKILL", "color": "blue", "title": "fireworks-tech-graph", "subtitle": "触发: 画图 · 架构图 · 流程图 · 可视化一下 · 出图", "scope": "global", "status": "active", "updated": "", "body": "**触发: 画图 · 架构图 · 流程图 · 可视化一下 · 出图**\n\n创建任意技术图（架构、数据流、流程图、时序、agent/memory、概念图）并导出 SVG + PNG。\n\n**触发：** 画图、帮我画、生成图、架构图、流程图、可视化一下、出图、generate diagram、visualize，或任何系统/流程描述想被图示化。", "related": ["skill_excalidraw-diagram", "skill_architecture-diagram-generator"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_excalidraw-diagram", "category": "skill", "badge": "SKILL", "color": "blue", "title": "excalidraw-diagram", "subtitle": "触发: 可视化工作流/架构/概念", "scope": "global", "status": "active", "updated": "", "body": "**触发: 可视化工作流/架构/概念**\n\n创建 Excalidraw 图 JSON 文件，做出有视觉论点的图。用于把工作流、架构、概念可视化。", "related": ["skill_fireworks-tech-graph"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_architecture-diagram-generator", "category": "skill", "badge": "SKILL", "color": "blue", "title": "architecture-diagram-generator", "subtitle": "技能目录内置", "scope": "global", "status": "active", "updated": "", "body": "**技能目录内置**\n\n系统架构图生成器（~/.claude/skills 内）。生成系统架构/链路图。", "related": ["skill_fireworks-tech-graph"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_beautiful-feishu-whiteboard", "category": "skill", "badge": "SKILL", "color": "blue", "title": "beautiful-feishu-whiteboard", "subtitle": "触发: 飞书白板 · infographic · 画板 · 命名风格", "scope": "global", "status": "active", "updated": "", "body": "**触发: 飞书白板 · infographic · 画板 · 命名风格**\n\n24 套精选配色风格库，从 SVG 构建美观、可编辑的飞书/Lark 白板、信息图、图表、海报或视觉讲解。\n\n**流程：** 弄清想画什么 → 问视觉氛围 → 从目录挑风格 → 生成可编辑飞书白板 → 返回文档链接和渲染图 → 可换风格。需 lark-cli（@larksuite/cli）已安装并认证 + 飞书账号。", "related": ["reference_feishu_wiki"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_json-canvas", "category": "skill", "badge": "SKILL", "color": "blue", "title": "json-canvas", "subtitle": "触发: .canvas · 思维导图 · 流程图 · Obsidian Canvas", "scope": "global", "status": "active", "updated": "", "body": "**触发: .canvas · 思维导图 · 流程图 · Obsidian Canvas**\n\n创建/编辑 JSON Canvas 文件（.canvas）：节点、边、分组、连接。用于做视觉画布、思维导图、流程图，或处理 Obsidian 中的 Canvas 文件。", "related": ["skill_obsidian-markdown"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_qiaomu-design-advisor", "category": "skill", "badge": "SKILL", "color": "indigo", "title": "qiaomu-design-advisor", "subtitle": "触发: 重新设计 · redesign · 优化界面 · UI 审查 · /design-advisor", "scope": "global", "status": "active", "updated": "", "body": "**触发: 重新设计 · redesign · 优化界面 · UI 审查 · /design-advisor**\n\n偏执型设计顾问——Jobs 式产品直觉 + Rams 式功能纯粹主义。\n\n**适用：** 页面/组件重新设计、UI/UX 方案评审、交互逻辑优化、视觉系统建立、设计决策咨询、参考真实网站设计系统。\n\n**核心能力：** 设计思维方法论（如何思考/决策/交付）+ 技术执行规范（色值/间距/动画参数/AI 反套路规则）+ 58 个真实网站 DESIGN.md 设计系统参考库（Google Stitch 格式）。", "related": [], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_obsidian-markdown", "category": "skill", "badge": "SKILL", "color": "indigo", "title": "obsidian-markdown", "subtitle": "触发: wikilink · callout · frontmatter · 标签 · embed", "scope": "global", "status": "active", "updated": "", "body": "**触发: wikilink · callout · frontmatter · 标签 · embed**\n\n创建/编辑 Obsidian Flavored Markdown：wikilink、embed、callout、properties 及其他 Obsidian 特定语法。处理 Obsidian 的 .md 文件时用。（by kepano）", "related": ["skill_obsidian-bases", "skill_obsidian-cli", "skill_json-canvas"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_obsidian-bases", "category": "skill", "badge": "SKILL", "color": "indigo", "title": "obsidian-bases", "subtitle": "触发: .base · 表格视图 · 卡片视图 · 筛选 · 公式", "scope": "global", "status": "active", "updated": "", "body": "**触发: .base · 表格视图 · 卡片视图 · 筛选 · 公式**\n\n创建/编辑 Obsidian Bases（.base 文件）：视图、筛选、公式、汇总。用于创建笔记的数据库式视图。（by kepano）", "related": ["skill_obsidian-markdown"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_obsidian-cli", "category": "skill", "badge": "SKILL", "color": "indigo", "title": "obsidian-cli", "subtitle": "触发: vault 操作 · 管理笔记 · 插件/主题开发调试", "scope": "global", "status": "active", "updated": "", "body": "**触发: vault 操作 · 管理笔记 · 插件/主题开发调试**\n\n用 Obsidian CLI 读、建、搜、管理笔记/任务/properties。也支持插件和主题开发：重载插件、跑 JS、捕错、截图、检查 DOM。（by kepano）", "related": ["skill_obsidian-markdown"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_defuddle", "category": "skill", "badge": "SKILL", "color": "teal", "title": "defuddle", "subtitle": "触发: 读这个 URL · 在线文档/文章/博客（非 .md）", "scope": "global", "status": "active", "updated": "", "body": "**触发: 读这个 URL · 在线文档/文章/博客（非 .md）**\n\n用 Defuddle CLI 从网页提取干净 markdown，去除杂乱和导航省 token。\n\n**何时用：** 用户给 URL 让你读/分析、在线文档、文章、博客。**不要用于：** .md 结尾的 URL（已是 markdown，直接用 WebFetch）。", "related": [], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_storage-analyzer", "category": "skill", "badge": "SKILL", "color": "slate", "title": "storage-analyzer", "subtitle": "触发: 存储分析 · 磁盘满了 · 清理空间 · 占空间", "scope": "global", "status": "active", "updated": "", "body": "**触发: 存储分析 · 磁盘满了 · 清理空间 · 占空间**\n\nmacOS/Windows 只读存储分析助手（自动识别系统）。扫描整机磁盘占用，找出占空间大户，分🟢可自动清理/🟡需人工判断/🔴谨慎清理三级并给可执行处置方案，生成排版精美、可折叠、命令可一键复制的交互式 HTML 报告，可起本地服务一键删除。**扫描全程只读。**\n\n**注意：** 若用户指运行内存/RAM（进程吃内存）那是 RAM 不属本 skill。", "related": [], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_xiaohu-video-md", "category": "skill", "badge": "SKILL", "color": "orange", "title": "xiaohu-video-md", "subtitle": "触发: 视频转写 · 翻译视频 · 视频转文字 · 加字幕 · 视频转 markdown", "scope": "global", "status": "active", "updated": "", "body": "**触发: 视频转写 · 翻译视频 · 视频转文字 · 加字幕 · 视频转 markdown**\n\n视频转写与翻译：抓取字幕/音频转写 → 输出 Markdown；翻译视频 → 转写+翻译+烧录中文字幕。支持精确/快速两种转写模式。\n\n**关键：** 说\"翻译视频\"\"配字幕\"必须执行完整翻译管线（提取音频→Whisper 转写 SRT→调 subtitle-polish 翻译→烧录字幕），不能只输出文档。", "related": ["skill_xiaohu-subtitle-polish", "skill_xiaohu-video-download", "project_video_panel"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_xiaohu-video-download", "category": "skill", "badge": "SKILL", "color": "orange", "title": "xiaohu-video-download", "subtitle": "触发: 下载视频 · 下载音频 · 下载播放列表 · 烧录字幕", "scope": "global", "status": "active", "updated": "", "body": "**触发: 下载视频 · 下载音频 · 下载播放列表 · 烧录字幕**\n\n视频下载工具：下载视频和外挂字幕、仅下载音频、批量下载播放列表、为本地视频烧录中文字幕。支持字幕翻译。基于 yt-dlp。", "related": ["skill_xiaohu-video-md", "project_video_panel"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_xiaohu-subtitle-polish", "category": "skill", "badge": "SKILL", "color": "orange", "title": "xiaohu-subtitle-polish", "subtitle": "触发: 润色字幕 · 翻译字幕 · 字幕校对 · SRT 翻译", "scope": "global", "status": "active", "updated": "", "body": "**触发: 润色字幕 · 翻译字幕 · 字幕校对 · SRT 翻译**\n\n专业字幕润色：将 ASR 转写或外语字幕翻译润色为高质量简体中文字幕。修正识别错误、优化断句、严格对齐时间戳、符合当代中文表达习惯。", "related": ["skill_xiaohu-video-md"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_baoyu-skills", "category": "skill", "badge": "SKILL", "color": "slate", "title": "baoyu-skills", "subtitle": "技能包（目录）", "scope": "global", "status": "active", "updated": "", "body": "**技能包（目录）**\n\nbaoyu（宝玉）系列技能合集，以目录形式存放于 ~/.claude/skills/baoyu-skills。", "related": [], "metaType": "skill", "info": "slash/语义触发"}, {"id": "skill_khazix-skills", "category": "skill", "badge": "SKILL", "color": "slate", "title": "khazix-skills", "subtitle": "技能包（目录）", "scope": "global", "status": "active", "updated": "", "body": "**技能包（目录）**\n\nkhazix（卡兹克）系列技能合集，以目录形式存放于 ~/.claude/skills/khazix-skills。", "related": ["skill_khazix-writer"], "metaType": "skill", "info": "slash/语义触发"}, {"id": "builtin_code-review", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "code-review", "subtitle": "审查当前 diff 的正确性 bug 与复用/简化/效率清理项，按 effort 分级（low/medium 少而高置信，high→max 更广可含", "scope": "global", "status": "active", "updated": "", "body": "审查当前 diff 的正确性 bug 与复用/简化/效率清理项，按 effort 分级（low/medium 少而高置信，high→max 更广可含不确定项）。`--comment` 把发现作为 PR 行内评论发出，`--fix` 审完直接改工作树。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_simplify", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "simplify", "subtitle": "审查改动的复用、简化、效率、抽象层级清理项并应用修复。**仅质量**，不找 bug（找 bug 用 /code-review）。", "scope": "global", "status": "active", "updated": "", "body": "审查改动的复用、简化、效率、抽象层级清理项并应用修复。**仅质量**，不找 bug（找 bug 用 /code-review）。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_verify", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "verify", "subtitle": "通过运行 app 观察行为来验证改动确实做到该做的。用于验 PR、确认修复生效、手动测试改动、推送前验证本地改动。", "scope": "global", "status": "active", "updated": "", "body": "通过运行 app 观察行为来验证改动确实做到该做的。用于验 PR、确认修复生效、手动测试改动、推送前验证本地改动。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_run", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "run", "subtitle": "启动并驱动本项目的 app 看改动真实运行。用于跑/启动/截图 app，或确认改动在真实 app（非仅测试）中工作。先找项目已有的启动 skill，", "scope": "global", "status": "active", "updated": "", "body": "启动并驱动本项目的 app 看改动真实运行。用于跑/启动/截图 app，或确认改动在真实 app（非仅测试）中工作。先找项目已有的启动 skill，否则按项目类型（CLI/server/TUI/Electron/browser/library）回退内置模式。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_init", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "init", "subtitle": "初始化新的 CLAUDE.md，写入代码库说明文档。", "scope": "global", "status": "active", "updated": "", "body": "初始化新的 CLAUDE.md，写入代码库说明文档。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_review", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "review", "subtitle": "审查一个 pull request。", "scope": "global", "status": "active", "updated": "", "body": "审查一个 pull request。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_security-review", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "security-review", "subtitle": "对当前分支的待提交改动做完整安全审查。", "scope": "global", "status": "active", "updated": "", "body": "对当前分支的待提交改动做完整安全审查。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_update-config", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "update-config", "subtitle": "通过 settings.json 配置 Claude Code harness。自动化行为（\"从今往后每当 X\"\"每次 X\"\"X 之前/之后\"）需在", "scope": "global", "status": "active", "updated": "", "body": "通过 settings.json 配置 Claude Code harness。自动化行为（\"从今往后每当 X\"\"每次 X\"\"X 之前/之后\"）需在 settings.json 配 hook——harness 执行而非 Claude，故记忆/偏好无法实现这类。也用于：权限（allow X/加权限/移权限）、env 变量、hook 排障、settings.json 改动。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_keybindings-help", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "keybindings-help", "subtitle": "自定义键盘快捷键、重绑键、加 chord 绑定、改 ~/.claude/keybindings.json。", "scope": "global", "status": "active", "updated": "", "body": "自定义键盘快捷键、重绑键、加 chord 绑定、改 ~/.claude/keybindings.json。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_fewer-permission-prompts", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "fewer-permission-prompts", "subtitle": "扫描 transcript 找高频只读 Bash 和 MCP 调用，把优先级 allowlist 加到项目 .claude/settings.jso", "scope": "global", "status": "active", "updated": "", "body": "扫描 transcript 找高频只读 Bash 和 MCP 调用，把优先级 allowlist 加到项目 .claude/settings.json 以减少权限弹窗。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_loop", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "loop", "subtitle": "按周期重复运行某 prompt 或 slash 命令（如 /loop 5m /foo，默认 10m）。用于设置周期任务、轮询状态、定时重复跑某事。一", "scope": "global", "status": "active", "updated": "", "body": "按周期重复运行某 prompt 或 slash 命令（如 /loop 5m /foo，默认 10m）。用于设置周期任务、轮询状态、定时重复跑某事。一次性任务不要用。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_claude-api", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "claude-api", "subtitle": "Claude API / Anthropic SDK 参考：模型 id、定价、参数、流式、tool use、MCP、agents、缓存、token ", "scope": "global", "status": "active", "updated": "", "body": "Claude API / Anthropic SDK 参考：模型 id、定价、参数、流式、tool use、MCP、agents、缓存、token 计数、模型迁移。命中触发（Claude/Anthropic/Fable/Opus/Sonnet/Haiku/claude-* 等）时先读再答，绝不凭记忆。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_claude-hud:setup", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "claude-hud:setup", "subtitle": "把 claude-hud 配置为你的状态栏 statusline。", "scope": "global", "status": "active", "updated": "", "body": "把 claude-hud 配置为你的状态栏 statusline。", "metaType": "builtin", "info": "内置/插件"}, {"id": "builtin_claude-hud:configure", "category": "builtin", "badge": "BUILTIN", "color": "gray", "title": "claude-hud:configure", "subtitle": "配置 HUD 显示选项（布局/语言/预设/显示元素），同时保留高级手动覆盖。", "scope": "global", "status": "active", "updated": "", "body": "配置 HUD 显示选项（布局/语言/预设/显示元素），同时保留高级手动覆盖。", "metaType": "builtin", "info": "内置/插件"}, {"id": "agent_claude", "category": "subagent", "badge": "AGENT", "color": "indigo", "title": "claude", "subtitle": "默认万能 agent · 工具全部(*)", "scope": "global", "status": "active", "updated": "", "body": "FleetView 的默认子智能体，不指定 agent 名时使用。\n\n**工具集：** 全部（*）——可读写文件、跑命令、调 MCP、起子 agent。\n\n**何时用：** 任何不匹配更专门 agent 的任务的兜底。", "metaType": "subagent", "info": "子智能体"}, {"id": "agent_claude-code-guide", "category": "subagent", "badge": "AGENT", "color": "indigo", "title": "claude-code-guide", "subtitle": "Claude Code 答疑 · 工具 Bash/Read/WebFetch/WebSearch", "scope": "global", "status": "active", "updated": "", "body": "回答关于 Claude Code CLI（功能/hooks/slash 命令/MCP server/settings/IDE 集成/键位）、Claude Agent SDK（自建 agent）、Claude API（tool use/SDK 用法）的问题。\n\n**工具集：** Bash, Read, WebFetch, WebSearch。\n\n**提示：** 起新 agent 前先看有没有在跑/刚完成的同类 agent 可经 SendMessage 续。", "metaType": "subagent", "info": "子智能体"}, {"id": "agent_Explore", "category": "subagent", "badge": "AGENT", "color": "indigo", "title": "Explore", "subtitle": "只读广度搜索 · 工具 除 Agent/Edit/Write/NotebookEdit/ExitPlanMode 外全部", "scope": "global", "status": "active", "updated": "", "body": "只读搜索 agent，做广度扇出搜索——当回答意味着横扫大量文件/目录/命名约定、只要结论不要文件堆。读摘录而非整文件，所以它**定位**代码，不**审查/审计**。\n\n**工具集：** 除 Agent、ExitPlanMode、Edit、Write、NotebookEdit 外全部。\n\n**用法：** 指定搜索广度——\"medium\" 适度探索，\"very thorough\" 多位置多命名约定。", "metaType": "subagent", "info": "子智能体"}, {"id": "agent_general-purpose", "category": "subagent", "badge": "AGENT", "color": "indigo", "title": "general-purpose", "subtitle": "通用研究 agent · 工具全部(*)", "scope": "global", "status": "active", "updated": "", "body": "通用 agent，研究复杂问题、搜代码、执行多步任务。当你搜关键词或文件、不确定头几次能否命中时，用它代你搜。\n\n**工具集：** 全部（*）。", "metaType": "subagent", "info": "子智能体"}, {"id": "agent_Plan", "category": "subagent", "badge": "AGENT", "color": "indigo", "title": "Plan", "subtitle": "软件架构师 agent · 工具 除 Agent/Edit/Write/NotebookEdit/ExitPlanMode 外全部", "scope": "global", "status": "active", "updated": "", "body": "软件架构师 agent，设计实现方案。需要为一个任务规划实现策略时用。\n\n**返回：** 分步计划、识别关键文件、考虑架构权衡。\n\n**工具集：** 除 Agent、ExitPlanMode、Edit、Write、NotebookEdit 外全部。", "metaType": "subagent", "info": "子智能体"}, {"id": "agent_statusline-setup", "category": "subagent", "badge": "AGENT", "color": "indigo", "title": "statusline-setup", "subtitle": "状态栏配置 agent · 工具 Read/Edit", "scope": "global", "status": "active", "updated": "", "body": "配置用户的 Claude Code status line 设置。\n\n**工具集：** Read, Edit。", "metaType": "subagent", "info": "子智能体"}, {"id": "workflow", "category": "workflow", "badge": "ORCHESTRATION", "color": "pink", "title": "Workflow 多智能体编排", "subtitle": "用 JS 脚本确定性地编排几十个子智能体：fan-out / pipeline / parallel", "scope": "global", "status": "available", "updated": "", "info": "编排能力", "related": ["agent_claude", "agent_Explore", "agent_general-purpose"], "body": "用 JS 脚本**确定性**地编排多个子智能体——为了**全面**（分解并行覆盖）、**可信**（独立视角 + 对抗校验再落地）、或承载单上下文装不下的**规模**（迁移/审计/大扫荡）。脚本是你编码这种结构的地方：什么扇出、什么验证、什么综合。\n\n## 核心原语\n- `agent(prompt, opts)` — 起一个子智能体；带 `schema` 时强制结构化输出并校验返回。`opts`：label/phase/model/isolation:'worktree'/agentType。\n- `pipeline(items, ...stages)` — 每项独立流过所有阶段，**阶段间无栅栏**（默认）。墙钟 = 最慢单项链，不是每阶段最慢之和。\n- `parallel(thunks)` — 并发跑，**栅栏**等全部完成。只在确实需要所有结果一起时用。\n- `phase / log / budget / workflow()` — 进度分组、narrator 行、token 预算（\"+500k\"硬上限）、嵌套子工作流（一层）。\n\n## 常用质量模式\n对抗式验证（N 个独立 skeptic 各自试图 refute）、视角多样化验证（correctness/security/repro 不同 lens）、评委面板、loop-until-dry（连续 K 轮无新增才停）、多模态扫荡、完整性批评家、无静默截断（截断要 log）。\n\n## 限制\n并发上限 min(16, 核数-2)，单次 lifetime 上限 1000 agent，单次 parallel/pipeline ≤4096 项。`Date.now()`/`Math.random()` 在脚本里会抛错（破坏 resume）。**仅在用户显式 opt-in（ultracode / 明确要求工作流）时调用。**"}, {"id": "mcp_obsidian", "category": "mcp", "badge": "MCP", "color": "teal", "title": "obsidian", "subtitle": "≈140 工具 · 项目级 · Obsidian vault 全功能操作", "scope": "project", "status": "active", "updated": "", "metaType": "mcp", "info": "≈140 工具", "related": ["skill_obsidian-markdown", "skill_obsidian-cli", "skill_obsidian-bases", "skill_json-canvas"], "body": "Obsidian vault 全功能操作（项目级 MCP，在 `/Users/bytedance/Desktop/3.23` 启用）。约 140 个工具，按功能分组：\n\n## 笔记 CRUD\n- read_note / update_note / append_to_note / rename_note / move_note / delete_note / duplicate_note\n- create_daily_note / create_meeting_note / create_person_note / create_project_note / create_task_note / create_book_note / create_moc\n- update_frontmatter_field / batch_update_metadata / rename_property_globally / convert_to_callout / split_note_by_headings\n\n## 搜索 / 检索\n- search_notes / search_regex / search_in_frontmatter / search_by_date / search_by_link_type / search_by_word_count\n- find_similar_notes / find_duplicate_notes / find_note_clusters / suggest_links / suggest_tags\n\n## 知识图谱\n- generate_graph_data / link_graph / find_backlinks / extract_links / get_shortest_path\n- calculate_note_centrality / most_connected_notes / note_complexity / find_isolated_notes\n\n## Canvas / Bases / Dataview\n- create_canvas / add_card_to_canvas / add_connection_to_canvas / create_canvas_group / read_canvas / update_canvas_card\n- execute_dataview_query / create_dataview_codeblock / validate_dataview_query / create_mermaid_diagram / create_math_block\n\n## 任务\n- get_tasks_by_criteria / mark_task_complete / find_blocked_tasks / move_task_between_notes / tasks_by_tag\n- task_statistics / create_task_report / extract_all_todos / add_task_metadata\n\n## 导出\n- export_note_pdf / export_note_html / export_note_markdown / export_note_plaintext\n- export_vault_archive / export_vault_csv / export_vault_json / export_vault_pdf / export_vault_markdown_bundle\n\n## 健康 / 维护\n- analyze_vault_health / broken_links / cleanup_broken_references / find_orphaned_notes / find_orphaned_attachments\n- find_empty_notes / find_large_notes / find_untagged_notes / vault_stats / vault_timeline / backup_vault / list_backups"}, {"id": "mcp_screenshot", "category": "mcp", "badge": "MCP", "color": "teal", "title": "screenshot", "subtitle": "5 工具 · 项目级 · 屏幕/窗口截图", "scope": "project", "status": "active", "updated": "", "metaType": "mcp", "info": "5 工具", "body": "屏幕/窗口截图 MCP（项目级）。\n\n## 工具\n- `list_displays` — 列所有显示器（ID/名称/主屏/边界）\n- `list_windows` — 列所有窗口\n- `screenshot_screen` — 截整屏（可指定 display_id / save_dir）\n- `screenshot_region` — 截指定区域\n- `screenshot_window` — 截指定窗口\n\n**本次会话**就是用 `screenshot_screen` 截图验证这个架构页渲染效果的。"}, {"id": "mcp_fetch", "category": "mcp", "badge": "MCP", "color": "teal", "title": "fetch", "subtitle": "1 工具 · 项目级 · 网页抓取", "scope": "project", "status": "active", "updated": "", "metaType": "mcp", "info": "1 工具", "body": "网页抓取 MCP（项目级）。\n\n## 工具\n- `mcp__fetch__fetch` — 拉取 URL 内容。\n\n与 defuddle skill / WebFetch 工具互补。", "related": ["skill_defuddle"]}, {"id": "mcp_Gmail", "category": "mcp", "badge": "MCP", "color": "slate", "title": "Gmail", "subtitle": "claude.ai 连接器 · OAuth 授权", "scope": "global", "status": "auth", "updated": "", "metaType": "mcp", "info": "连接器", "body": "claude.ai Gmail 连接器（需先 authenticate / complete_authentication 授权）。\n\n## 工具\n- authenticate / complete_authentication（授权后开放邮件读写工具）\n\n**注意：** 交互式认证的 MCP 在 headless/cron 运行下可能不可用。"}, {"id": "mcp_Google_Calendar", "category": "mcp", "badge": "MCP", "color": "slate", "title": "Google Calendar", "subtitle": "claude.ai 连接器 · OAuth 授权", "scope": "global", "status": "auth", "updated": "", "metaType": "mcp", "info": "连接器", "body": "claude.ai Google Calendar 连接器（需先 authenticate / complete_authentication 授权）。\n\n## 工具\n- authenticate / complete_authentication（授权后开放日历工具）\n\n**注意：** 交互式认证的 MCP 在 headless/cron 运行下可能不可用。"}, {"id": "mcp_Google_Drive", "category": "mcp", "badge": "MCP", "color": "slate", "title": "Google Drive", "subtitle": "claude.ai 连接器 · OAuth 授权", "scope": "global", "status": "auth", "updated": "", "metaType": "mcp", "info": "连接器", "body": "claude.ai Google Drive 连接器（需先 authenticate / complete_authentication 授权）。\n\n## 工具\n- search_files / list_recent_files / read_file_content / download_file_content / create_file / copy_file / get_file_metadata / get_file_permissions\n\n**注意：** 交互式认证的 MCP 在 headless/cron 运行下可能不可用。"}, {"id": "plugin_claude-hud", "category": "plugin", "badge": "PLUGIN", "color": "pink", "title": "claude-hud", "subtitle": "状态栏 HUD · marketplace: github jarrodwatts/claude-hud · 已启用", "scope": "global", "status": "enabled", "updated": "", "metaType": "plugin", "info": "已启用", "related": ["builtin_claude-hud:setup", "builtin_claude-hud:configure", "set_statusLine"], "body": "已启用插件。来源 marketplace `claude-hud` → github `jarrodwatts/claude-hud`。\n\n## 工作方式\n通过 settings.json 的 `statusLine.command`，用 bun 运行插件的 `src/index.ts` 渲染状态栏；脚本会探测终端 COLUMNS 宽度并自动选最新版本目录。\n\n## 配套技能\n- `claude-hud:setup` — 配为 statusline\n- `claude-hud:configure` — 布局/语言/预设/显示元素"}, {"id": "set_API_TIMEOUT_MS", "category": "settings", "badge": "SETTING", "color": "slate", "title": "env · API_TIMEOUT_MS = 3000000", "subtitle": "`3000000` ms ≈ 50 分钟。把单次请求超时拉到极长，支撑长任务、大上下文（1M）、多轮工作流调用不被中途掐断。", "scope": "global", "status": "active", "updated": "", "body": "`3000000` ms ≈ 50 分钟。把单次请求超时拉到极长，支撑长任务、大上下文（1M）、多轮工作流调用不被中途掐断。", "metaType": "settings", "info": "settings.json"}, {"id": "set_NONESSENTIAL", "category": "settings", "badge": "SETTING", "color": "slate", "title": "env · CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = 1", "subtitle": "`1` 关闭非必要遥测/后台流量，降低网络打扰与开销。", "scope": "global", "status": "active", "updated": "", "body": "`1` 关闭非必要遥测/后台流量，降低网络打扰与开销。", "metaType": "settings", "info": "settings.json"}, {"id": "set_statusLine", "category": "settings", "badge": "SETTING", "color": "slate", "title": "statusLine · command（bun + claude-hud）", "subtitle": "状态栏用一段 bash 命令：探测 `stty size` 得到列宽并 `export COLUMNS`，再用 `/Users/bytedance/", "scope": "global", "status": "active", "updated": "", "body": "状态栏用一段 bash 命令：探测 `stty size` 得到列宽并 `export COLUMNS`，再用 `/Users/bytedance/.bun/bin/bun` 运行 claude-hud 插件最新版本目录下的 `src/index.ts`。type=command。", "metaType": "settings", "info": "settings.json"}, {"id": "set_enabledPlugins", "category": "settings", "badge": "SETTING", "color": "slate", "title": "enabledPlugins · claude-hud@claude-hud = true", "subtitle": "启用 claude-hud。`extraKnownMarketplaces` 注册了 marketplace `claude-hud`（source", "scope": "global", "status": "active", "updated": "", "body": "启用 claude-hud。`extraKnownMarketplaces` 注册了 marketplace `claude-hud`（source: github，repo: jarrodwatts/claude-hud）。", "metaType": "settings", "info": "settings.json"}, {"id": "set_skipDangerous", "category": "settings", "badge": "SETTING", "color": "slate", "title": "skipDangerousModePermissionPrompt = true", "subtitle": "跳过危险模式权限弹窗（已durably授权，少打断）。", "scope": "global", "status": "active", "updated": "", "body": "跳过危险模式权限弹窗（已durably授权，少打断）。", "metaType": "settings", "info": "settings.json"}, {"id": "set_skipWorkflow", "category": "settings", "badge": "SETTING", "color": "slate", "title": "skipWorkflowUsageWarning = true", "subtitle": "跳过工作流用量警告。", "scope": "global", "status": "active", "updated": "", "body": "跳过工作流用量警告。", "metaType": "settings", "info": "settings.json"}, {"id": "claudemd_global", "category": "config", "badge": "CLAUDE.md", "color": "dark", "title": "全局指令 (~/.claude/CLAUDE.md)", "subtitle": "对所有项目生效的技能注册与 slash 触发硬绑定", "scope": "global", "status": "active", "updated": "", "metaType": "config", "info": "全局", "related": ["skill_article-forker", "skill_graphify", "skill_obsidian-markdown", "skill_defuddle"], "body": "**全局私有指令，覆盖默认行为，必须严格遵守。** 把核心技能的 slash 触发词硬绑定到 Skill 工具调用：\n\n## article-forker\n`~/.claude/skills/article-forker/SKILL.md` — fork 文章成 tutorial/tool/wiki。**用户输入 `/forkit` → 先调 Skill 工具再做任何事。**\n\n## graphify\n`~/.claude/skills/graphify/SKILL.md` — 任意输入 → 知识图谱。触发 `/graphify`。\n\n## Obsidian 技能组（by kepano）\nobsidian-markdown / obsidian-bases / json-canvas / obsidian-cli / defuddle —— 各自处理 OFM 语法、Bases、Canvas、CLI、网页提取。\n\n**作用：** 确保命中 slash 即先执行对应技能，而不是凭默认行为乱答。"}, {"id": "claudemd_project", "category": "config", "badge": "CLAUDE.md", "color": "dark", "title": "项目 Schema (.claude/CLAUDE.md)", "subtitle": "Karpathy LLM Wiki 方法论 + Driver Agent 2.0 Planner 领域知识（完整）", "scope": "project", "status": "active", "updated": "", "metaType": "config", "info": "项目 Schema", "related": ["claudemd_global", "config_structure", "skill_llm-wiki-lark", "project_director_sp_groundtruth", "claudemd_funnel"], "body": "**字节豆包上车（Driver Agent 2.0）智能座舱产品知识库**，Karpathy LLM Wiki 方法论维护。用户是 Planner 模块 AI PM。\n\n## 系统定位\n豆包上车搭载在上汽荣威 D6X。Planner 是系统\"大脑\"——不直接控车，而是理解意图 → 制定计划 → 调度下游 Agent 执行 → 跟踪进度反馈。底层模型豆包 Seed 1.8，云端部署。\n\n## 三层漏斗架构\n用户语音→ASR → ①句法 RAG（毫秒级·规则匹配·\"打开车窗\"）→ ②情景 RAG + 仲裁模型（注入记忆/车况/情景，简单/复杂分流）→ ③Planner（云端 LLM 深度推理·多步规划·多工具）→ 下游 Agent 执行返回 tool_feedback。\n\n## Planner 单次调用 = [SP, UP]\n**SP（~30-35K token）：** ①角色 ②输入类型 ③23工具定义 ④输出格式 ⑤10条注意事项 ⑥69个参考示例(约占SP 50%) ⑦D6X设备知识 ⑧工具tips ⑨其他知识 ⑩聊天风格(温柔高知女生) ⑪动态模板变量{{status}}{{goal_list}}{{env_info}}{{memory}}。\n**UP（~10-15K token）：** 最近 N 轮 user/assistant 交替历史 + 当前轮（用户 query + advisor 建议，数组同传）。user 侧三形态：用户query(speaker_name/position/timestamp/goal_list/env_info)、advisor建议、tool_feedback。\n\n## 23 个下游工具\n⚠ 真实生产 SP 已演进到 26/28（见记忆 Director SP 真身）。CLAUDE.md 原列：vehicle_basic_control / search_vehicle_status_info / search_weather / search_poi_qa / route_planning_qa / navi_basic_control / vehicle_manual_qa / search_and_control_short_video / search_and_control_music / search_user_memory / face_id_register / operate_user_memory / web_search / goal_list_update / ai_broadcast_generate / search_and_control_broadcast / recording_minutes / image_generate / search_visual_info / ambient_light_control / auto_drive / car_log / car_care_qa\n\n## 四种任务类型\n单步复杂（一句话拆多动作并行·S7）/ 多步串行依赖（S8）/ 条件触发（S8）/ 持续运行（S9-S10）。\n\n## 缓存机制\nKV Cache 输入前缀完全匹配复用；同请求多轮复用前序全部 token 的 KV 只算增量（几百 token）；跨请求仅 SP 固定段(~30K)可命中，动态变量不同则断裂；长对话>20轮 KV 占用大易被挤出，命中率下降。\n\n## 上下文优化（远区精简+近区完整）\n远区(1-8轮)只留 user query + talk_content，删 tool_feedback/action_list；近区(9-10轮)完整。省对话历史 40-70% token，总 input 减~10%，因 Attention O(n²) 实际算力减~19%。\n\n## Goal List + Advisor 演进\n从\"Planner 一人包揽\"→\"团队协作\"：Planner 管快速响应+执行，4 个静态 Advisor（舒适/出行/情感/内容）+ 动态 Advisor 管深度思考+目标监控，Goal List 为共享看板。\n\n## Badcase 排查路径\n链路问题（走错模块）→ 工具描述问题（SP 工具定义不清）→ 上下文问题（缺记忆/车况/情景）→ 模型能力问题（信息全但推理错）。\n\n## 已知挑战\n任务拆解不稳定 / 简单复杂误分类 / 长对话上下文捕捉弱 / 车控幻觉 / 话术生硬 / Planner 过载 / 性能 vs 质量矛盾。\n\n## Wiki 三种操作 + 规范\nIngest（摄入→summaries→entities→concepts→更新 index/log）/ Query（查询→必要时建 comparison）/ Lint（frontmatter/index/孤立页/归档）。命名：小写英文+连字符。Frontmatter 必填 title/date/tags/sources/status。raw/ 不可变铁律：LLM 绝不修改、只追加。log.md append-only。"}, {"id": "config_structure", "category": "config", "badge": "STRUCTURE", "color": "dark", "title": "项目三层目录结构", "subtitle": "raw（原始·只读）→ wiki（LLM 维护）→ .claude（Schema）", "scope": "project", "status": "active", "updated": "", "metaType": "config", "info": "目录结构", "related": ["claudemd_project"], "body": "```\nraw/                第1层 原始素材（不可变·LLM 只读）\n├── assets/          图片附件\n└── articles/        文章/网页剪藏\n\nwiki/               第2层 Wiki 层（LLM 生成维护）\n├── index.md         内容索引\n├── log.md           append-only 操作日志\n├── entities/        实体页（人物/组织/工具/产品）\n├── concepts/        概念页（抽象概念/方法论/框架）\n├── comparisons/     对比分析（A vs B）\n├── summaries/       源文件摘要\n└── synthesis/       跨素材综合\n\n.claude/CLAUDE.md   第3层 Schema（领域知识 + 维护规则）\n```\n\n**标签体系：** entity / concept / comparison / summary / synthesis / technology / product / methodology / meeting / architecture。"}, {"id": "art_79", "category": "artifact", "badge": "PDF", "color": "blue", "title": "AI Car主链路架构", "subtitle": "Planner 架构 · PDF", "scope": "project", "status": "file", "updated": "06-09", "body": "**所属：** Planner 架构\n\n**路径：** `planner 架构/AI Car主链路架构.pdf`\n\n**类型：** PDF · **大小：** 1438 KB · **更新：** 06-09\n\n**打开：** 在 Finder 双击，或浏览器打开本地文件路径。", "metaType": "Planner 架构", "info": "PDF · 1438KB"}, {"id": "art_80", "category": "artifact", "badge": "PDF", "color": "blue", "title": "AI Car架构链路细化梳理", "subtitle": "Planner 架构 · PDF", "scope": "project", "status": "file", "updated": "06-09", "body": "**所属：** Planner 架构\n\n**路径：** `planner 架构/AI Car架构链路细化梳理.pdf`\n\n**类型：** PDF · **大小：** 491 KB · **更新：** 06-09\n\n**打开：** 在 Finder 双击，或浏览器打开本地文件路径。", "metaType": "Planner 架构", "info": "PDF · 491KB"}, {"id": "art_81", "category": "artifact", "b function md(src){const lines=src.split('\n');let out=[],i=0,inCode=false,code=[],inUl=false;
const flushUl=()=>{if(inUl){out.push('</ul>');inUl=false;}};
while(i<lines.length){let ln=lines[i];
if(ln.trim().startsWith('```')){if(!inCode){inCode=true;code=[];}else{inCode=false;out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');}i++;continue;}
if(inCode){code.push(ln);i++;continue;}
if(/^##\s+/.test(ln)){flushUl();out.push('<h2>'+inline(ln.replace(/^##\s+/,''))+'</h2>');i++;continue;}
if(/^\s*[-•]\s+/.test(ln)){if(!inUl){out.push('<ul>');inUl=true;}out.push('<li>'+inline(ln.replace(/^\s*[-•]\s+/,''))+'</li>');i++;continue;}
if(ln.trim()===''){flushUl();i++;continue;}flushUl();out.push('<p>'+inline(ln)+'</p>');i++;}
flushUl();return out.join('');}
function inline(s){s=esc(s);s=s.replace(/`([^`]+)`/g,'<code>$1</code>');s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
s=s.replace(/\[\[([^\]]+)\]\]/g,(m,p1)=>'<a class="wl" data-wl="'+esc(p1)+'">'+esc(p1)+'</a>');return s;}
function findByLink(key){key=key.toLowerCase();
return records.find(r=>(r.linkKeys||[]).some(k=>k.toLowerCase()===key))||records.find(r=>r.id.toLowerCase()===key);}

document.getElementById('dTitle').textContent=r.title;

`<span class="metapill">作用域 · ${r.scope}</span><span class="metapill">状态 · ${r.status}</span>`+
(r.updated?`<span class="metapill">更新 · ${r.updated}</span>`:'')+(r.info?`<span class="metapill">${esc(r.info)}</span>`:'')+
`<span class="metapill">id · ${r.id}</span>`;
const relBox=document.getElementById('dRel');const rel=(r.related||[]).map(x=>byId[x]).filter(Boolean);
if(rel.length){relBox.innerHTML='<div class="rel"><h4>关联 / 依赖</h4>'+rel.map(t=>
`<a data-go="${t.id}"><span class="d c-${t.color}" style="background:currentColor"></span>${esc(t.title)}</a>`).join('')+'</div>';
relBox.querySelectorAll('[data-go]').forEach(a=>a.onclick=()=>openDrawer(a.dataset.go));}else relBox.innerHTML='';
const body=document.getElementById('dBody');body.innerHTML=md(r.body);
body.querySelectorAll('[data-wl]').forEach(a=>a.onclick=()=>{const t=findByLink(a.dataset.wl);if(t)openDrawer(t.id);});
document.querySelector('.db').scrollTop=0;drawer.classList.add('show');scrim.classList.add('show');}
