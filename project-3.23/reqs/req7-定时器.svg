<text x="46" y="52" font-size="22" font-weight="bold" fill="#fff">需求7 ｜ 时间维度 / 端侧定时器</text>
<text x="46" y="80" font-size="13" fill="#cbd5e1">『10分钟后关加热』『情人节10点提醒』现不支持,且倒计时必须在端上</text>
<rect x="950" y="38" width="150" height="36" rx="18" fill="#64748b"/>
<text x="1025.0" y="62" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">赛力斯 · P1</text>
