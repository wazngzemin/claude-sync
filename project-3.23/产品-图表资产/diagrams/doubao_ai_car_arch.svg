<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" style="background:#f8fafc;" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="35" font-size="20" font-weight="700" fill="#1e293b" text-anchor="middle">豆包 AI 汽车架构逻辑图</text>

  <!-- Watcher Layer (Left Side, Always On) -->
  <rect x="40" y="80" width="220" height="740" rx="12" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="150" y="105" font-size="14" font-weight="700" fill="#0369a1" text-anchor="middle">Watcher（端侧 Always On）</text>
  <rect x="60" y="120" width="180" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="145" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">全时多模态聆听</text>
  <text x="150" y="162" font-size="10" fill="#64748b" text-anchor="middle">音频流 + 视频流</text>
  <rect x="60" y="195" width="180" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="220" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">情景理解描述</text>
  <text x="150" y="237" font-size="10" fill="#64748b" text-anchor="middle">舱内人物/行为/环境</text>
  <rect x="60" y="270" width="180" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="295" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">事件发现</text>
  <text x="150" y="312" font-size="10" fill="#64748b" text-anchor="middle">注册事件 / 行为事件</text>
  <rect x="60" y="345" width="180" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="370" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">弱网/无网兜底</text>
  <text x="150" y="387" font-size="10" fill="#64748b" text-anchor="middle">端侧算力独立运行</text>

  <!-- Main Pipeline Layers -->
  <!-- Layer 1: Perception -->
  <rect x="300" y="80" width="520" height="120" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="560" y="105" font-size="15" font-weight="700" fill="#1d4ed8" text-anchor="middle">① 感知层 Perception</text>
  <rect x="320" y="120" width="150" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="395" y="145" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">视频流</text>
  <text x="395" y="162" font-size="10" fill="#64748b" text-anchor="middle">舱内摄像头</text>
  <rect x="485" y="120" width="150" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="145" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">音频流</text>
  <text x="560" y="162" font-size="10" fill="#64748b" text-anchor="middle">麦克风阵列</text>
  <rect x="650" y="120" width="150" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="145" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">端信号</text>
  <text x="725" y="162" font-size="10" fill="#64748b" text-anchor="middle">车辆状态/传感器</text>

  <!-- Layer 2: Attention -->
  <rect x="300" y="220" width="520" height="120" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="245" font-size="15" font-weight="700" fill="#15803d" text-anchor="middle">② 注意力层 Attention</text>
  <rect x="320" y="260" width="230" height="60" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="435" y="285" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">工程触发</text>
  <text x="435" y="302" font-size="10" fill="#64748b" text-anchor="middle">定时 / 位置 / 唤醒事件</text>
  <rect x="570" y="260" width="230" height="60" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="285" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">多模态模型触发</text>
  <text x="685" y="302" font-size="10" fill="#64748b" text-anchor="middle">有人上车 / 人物行为 / 语音</text>

  <!-- Layer 3: Thinking -->
  <rect x="300" y="360" width="520" height="280" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="560" y="385" font-size="15" font-weight="700" fill="#b45309" text-anchor="middle">③ 思考层 Thinking（主Agent）</text>
  <rect x="320" y="400" width="480" height="60" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="425" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">System Prompt + Context（任务队列 / 记忆 / 端状态 / 情感状态）</text>
  <rect x="320" y="475" width="230" height="60" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="435" y="500" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">功能向子Agent</text>
  <text x="435" y="517" font-size="10" fill="#64748b" text-anchor="middle">导航 / 内容 / 外卖 / GUI操作</text>
  <rect x="570" y="475" width="230" height="60" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="500" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">内心向子Agent</text>
  <text x="685" y="517" font-size="10" fill="#64748b" text-anchor="middle">记忆 / 动机 / 情绪 / 自我探索</text>
  <text x="560" y="555" font-size="10" fill="#b45309" text-anchor="middle" font-style="italic">子Agent 间通过 A2A 自然语言协议与主Agent通信</text>

  <!-- Layer 4: Action + Express -->
  <rect x="300" y="660" width="520" height="160" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="560" y="685" font-size="15" font-weight="700" fill="#be185d" text-anchor="middle">④ 行动 &amp; 表达层 Action + Express</text>
  <rect x="320" y="700" width="110" height="60" rx="8" fill="#ffffff" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="725" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">语音输出</text>
  <text x="375" y="742" font-size="10" fill="#64748b" text-anchor="middle">TTS</text>
  <rect x="445" y="700" width="110" height="60" rx="8" fill="#ffffff" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="725" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">GUI呈现</text>
  <text x="500" y="742" font-size="10" fill="#64748b" text-anchor="middle">流式文字 / 生成式UI</text>
  <rect x="570" y="700" width="110" height="60" rx="8" fill="#ffffff" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="625" y="725" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">设备控制</text>
  <text x="625" y="742" font-size="10" fill="#64748b" text-anchor="middle">车控指令</text>
  <rect x="695" y="700" width="110" height="60" rx="8" fill="#ffffff" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="725" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">角色表情</text>
  <text x="750" y="742" font-size="10" fill="#64748b" text-anchor="middle">情感表达</text>

  <!-- Memory System (Right Side) -->
  <rect x="860" y="80" width="300" height="740" rx="12" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="1010" y="105" font-size="14" font-weight="700" fill="#7e22ce" text-anchor="middle">Memory 记忆系统（贯穿全程）</text>
  <rect x="880" y="120" width="260" height="70" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="145" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">短时记忆</text>
  <text x="1010" y="162" font-size="10" fill="#64748b" text-anchor="middle">舱内人物 / 屏幕内容 / 当前对话 / 设备状态</text>
  <rect x="880" y="205" width="260" height="90" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="230" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">长时记忆</text>
  <text x="1010" y="247" font-size="10" fill="#64748b" text-anchor="middle">用户偏好 / 语义记忆 / 视觉记忆</text>
  <text x="1010" y="264" font-size="10" fill="#64748b" text-anchor="middle">情景记忆 / 快速联想RAG</text>
  <rect x="880" y="310" width="260" height="70" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="335" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">垂直Agent记忆</text>
  <text x="1010" y="352" font-size="10" fill="#64748b" text-anchor="middle">各子Agent独立记忆（专注降噪）</text>
  <rect x="880" y="395" width="260" height="70" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="420" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">记忆更新机制</text>
  <text x="1010" y="437" font-size="10" fill="#64748b" text-anchor="middle">即时FC调用 / 定期Summary总结</text>

  <!-- Arrows between layers -->
  <!-- Watcher -> Perception -->
  <line x1="260" y1="150" x2="300" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="135" font-size="9" fill="#64748b">端信号</text>
  <!-- Perception -> Attention -->
  <line x1="560" y1="200" x2="560" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Attention -> Thinking -->
  <line x1="560" y1="340" x2="560" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Thinking -> Action -->
  <line x1="560" y1="640" x2="560" y2="660" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Memory connections (dashed) -->
  <line x1="860" y1="155" x2="820" y2="155" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="860" y1="250" x2="820" y2="250" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="860" y1="345" x2="820" y2="345" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="860" y1="430" x2="820" y2="430" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Bottom annotation -->
  <text x="600" y="875" font-size="11" fill="#64748b" text-anchor="middle">数据流方向：感知 → 注意力 → 思考 → 行动&amp;表达  |  记忆系统贯穿全程提供上下文支撑</text>

</svg>