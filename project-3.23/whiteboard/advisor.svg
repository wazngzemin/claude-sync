<svg viewBox="0 0 2060 1280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L9 4 L0 8 z"/></marker>
    <marker id="arrowR" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L9 4 L0 8 z" fill="#C0392B"/></marker>
  </defs>
  <rect x="0" y="0" width="2060" height="1280" fill="#FFFFFF"/>
  <text x="40" y="50" font-size="32" font-weight="700" fill="#1F2A44">动态 Advisor · 感知订阅 总架构（图为基准 + 文档组合）</text>

  <!-- legend -->
  <rect x="40" y="72" width="24" height="20" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.6"/><text x="72" y="89" font-size="15" fill="#1F2A44">字节 AICAR 主线模块</text>
  <rect x="270" y="72" width="24" height="20" fill="#FCEBD6" stroke="#C8821E" stroke-width="1.6"/><text x="302" y="89" font-size="15" fill="#1F2A44">外部生态依赖</text>
  <rect x="450" y="72" width="24" height="20" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="482" y="89" font-size="15" fill="#1F2A44">YT 开发（AdvisorService）</text>
  <rect x="700" y="72" width="24" height="20" fill="#ECE4FA" stroke="#8E6FBF" stroke-width="1.6"/><text x="732" y="89" font-size="15" fill="#1F2A44">设计备注（原图）</text>

  <!-- 其它Agent + note -->
  <rect x="430" y="118" width="330" height="70" fill="#ECE4FA" stroke="#8E6FBF" stroke-width="1.4"/><text x="446" y="146" font-size="14" fill="#3B2F55">所有 Advice 和主动推荐都可能</text><text x="446" y="168" font-size="14" fill="#3B2F55">直接给到字节 agent，不走 planner</text>
  <rect x="800" y="120" width="280" height="70" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="830" y="162" font-size="18" font-weight="700" fill="#1F2A44">其它 Agent</text>

  <!-- Planner -->
  <rect x="1140" y="180" width="300" height="92" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="1210" y="218" font-size="19" font-weight="700" fill="#1F2A44">Planner 模块</text><text x="1240" y="246" font-size="15" fill="#51607A">（刘正伟）</text>

  <!-- Context -->
  <rect x="1640" y="300" width="280" height="92" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="1700" y="338" font-size="19" font-weight="700" fill="#1F2A44">Context 模块</text><text x="1720" y="366" font-size="15" fill="#51607A">（向超然）</text>

  <!-- 生态 -->
  <rect x="1960" y="300" width="80" height="120" fill="#FCEBD6" stroke="#C8821E" stroke-width="1.8"/><text x="1972" y="346" font-size="16" font-weight="700" fill="#7A4E0E">生态</text><text x="1972" y="372" font-size="12" fill="#7A4E0E">主线插件</text><text x="1972" y="390" font-size="12" fill="#7A4E0E">火山/高德</text>

  <!-- 端状态服务 + note -->
  <rect x="40" y="300" width="300" height="66" fill="#ECE4FA" stroke="#8E6FBF" stroke-width="1.4"/><text x="56" y="326" font-size="14" fill="#3B2F55">之前的链路。原则上作为缺少</text><text x="56" y="348" font-size="14" fill="#3B2F55">端状态和事件的紧急备案</text>
  <rect x="40" y="406" width="220" height="74" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="60" y="438" font-size="18" font-weight="700" fill="#1F2A44">端状态服务</text><text x="60" y="462" font-size="13" fill="#51607A">全量端状态 + 端事件</text>

  <!-- ============ 触发器模块 container ============ -->
  <rect x="30" y="560" width="540" height="470" fill="#F4F5F7" stroke="#9AA3B0" stroke-width="2"/>
  <text x="48" y="588" font-size="18" font-weight="700" fill="#1F2A44">触发器模块（刘杨）</text>
  <rect x="120" y="600" width="330" height="64" fill="#ECE4FA" stroke="#8E6FBF" stroke-width="1.4"/><text x="136" y="626" font-size="14" fill="#3B2F55">字节开发由于时延考虑，时间敏感</text><text x="136" y="648" font-size="14" fill="#3B2F55">的事件才走 Advisor</text>
  <rect x="56" y="760" width="150" height="80" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="80" y="800" font-size="17" font-weight="700" fill="#1F2A44">watcher</text><text x="92" y="824" font-size="13" fill="#51607A">（刘杨）</text>
  <rect x="240" y="690" width="150" height="66" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="288" y="730" font-size="17" font-weight="700" fill="#1F2A44">事件 A</text>
  <rect x="240" y="800" width="150" height="66" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="288" y="840" font-size="17" font-weight="700" fill="#1F2A44">事件 B</text>
  <rect x="410" y="800" width="146" height="66" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.8"/><text x="424" y="832" font-size="15" font-weight="700" fill="#1F2A44">主动推进配置</text>
  <line x1="130" y1="775" x2="238" y2="725" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="800" x2="238" y2="830" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="833" x2="408" y2="833" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="48" y="892" width="508" height="124" fill="#FFFFFF" stroke="#9AA3B0" stroke-width="1.4"/><text x="62" y="916" font-size="14" font-weight="700" fill="#1F2A44">触发器对 Advisor 提供的接口（文档·依赖梳理）：</text><text x="62" y="940" font-size="13" fill="#51607A">· 能力输出：哪些信号状态可用（文字给模型）</text><text x="62" y="962" font-size="13" fill="#51607A">· 订阅 / 取消订阅接口 · 事件触发接口（回传自定义事件）</text><text x="62" y="984" font-size="13" fill="#51607A">· callback 类型：注册时传入，条件达成后回调</text><text x="62" y="1006" font-size="13" fill="#51607A">· 输入文本 → 返回创建成功/失败 + 事件类型（DSL 定义）</text>

  <!-- ============ AdvisorService container ============ -->
  <rect x="620" y="430" width="1180" height="640" fill="#F4F5F7" stroke="#9AA3B0" stroke-width="2"/>
  <text x="638" y="460" font-size="18" font-weight="700" fill="#1F2A44">AdvisorService（YT 开发）</text>
  <!-- API -->
  <rect x="650" y="500" width="190" height="400" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.8"/><text x="700" y="528" font-size="16" font-weight="700" fill="#2E6B33">API</text>
  <rect x="668" y="546" width="154" height="92" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="684" y="588" font-size="15" font-weight="700" fill="#1F2A44">端状态收集</text>
  <rect x="668" y="654" width="154" height="92" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="684" y="696" font-size="15" font-weight="700" fill="#1F2A44">请求建议</text>
  <rect x="668" y="762" width="154" height="92" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="684" y="804" font-size="15" font-weight="700" fill="#1F2A44">接收 query</text>
  <!-- 公共模块 -->
  <rect x="870" y="500" width="900" height="160" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.8"/><text x="888" y="528" font-size="16" font-weight="700" fill="#2E6B33">公共模块</text>
  <rect x="900" y="544" width="250" height="96" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="916" y="586" font-size="16" font-weight="700" fill="#1F2A44">Advisor 分发器</text><text x="916" y="612" font-size="13" fill="#51607A">事件触达 / 注册监听</text>
  <rect x="1180" y="544" width="250" height="96" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="1196" y="586" font-size="16" font-weight="700" fill="#1F2A44">定时任务管理器</text><text x="1196" y="612" font-size="13" fill="#51607A">定时触发 / 注册定时</text>
  <rect x="1460" y="544" width="250" height="96" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="1476" y="586" font-size="16" font-weight="700" fill="#1F2A44">工具调用</text><text x="1476" y="612" font-size="13" fill="#51607A">调用工具 → 生态/VQA</text>
  <!-- Advisors -->
  <rect x="870" y="690" width="900" height="360" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.8"/><text x="888" y="718" font-size="16" font-weight="700" fill="#2E6B33">Advisors（情感 / 舒适 / 出行 / 内容）</text>
  <rect x="900" y="740" width="820" height="86" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="916" y="772" font-size="16" font-weight="700" fill="#1F2A44">情感 Advisor</text><text x="916" y="798" font-size="13" fill="#51607A">查询 Context 构建上下文 · 调用工具 · 产出 Advice</text>
  <rect x="900" y="844" width="256" height="80" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="916" y="888" font-size="16" font-weight="700" fill="#1F2A44">舒适 Advisor</text>
  <rect x="1182" y="844" width="256" height="80" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="1198" y="888" font-size="16" font-weight="700" fill="#1F2A44">出行 Advisor</text>
  <rect x="1464" y="844" width="256" height="80" fill="#FFFFFF" stroke="#4E9A52" stroke-width="1.5"/><text x="1480" y="888" font-size="16" font-weight="700" fill="#1F2A44">内容 Advisor</text>
  <!-- 其它服务 -->
  <rect x="900" y="948" width="380" height="86" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.6"/><text x="916" y="980" font-size="16" font-weight="700" fill="#1F2A44">其它服务</text><text x="916" y="1006" font-size="14" fill="#51607A">日记写入 · 表情写入</text>
  <!-- 4 task types panel -->
  <rect x="1300" y="948" width="470" height="100" fill="#FFFFFF" stroke="#9AA3B0" stroke-width="1.4"/><text x="1314" y="972" font-size="14" font-weight="700" fill="#1F2A44">动态 Advisor 4 类任务（文档·技术设计）：</text><text x="1314" y="995" font-size="13" fill="#51607A">①长时(上限2) ②持续/GUI(1) ③条件→订阅触发器(6)</text><text x="1314" y="1016" font-size="13" fill="#51607A">④定时(6)，含 vlm定时(1，定时捞VQA判事件)</text><text x="1314" y="1037" font-size="13" fill="#51607A">超上限→返回 error 给 planner（不再挤掉旧的）</text>

  <!-- ============ EDGES ============ -->
  <!-- 请求建议 <- http同步 <- 事件A -->
  <line x1="666" y1="700" x2="392" y2="722" stroke="#5A6B85" stroke-width="2" marker-start="url(#arrow)"/>
  <text x="430" y="690" font-size="14" fill="#51607A">http 同步请求 advisor 的建议结构</text>
  <!-- 端状态服务 -> 端状态收集 -->
  <polyline points="260,443 560,443 560,592 666,592" fill="none" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="436" font-size="14" fill="#51607A">主动推送（全量端状态 + 端事件）</text>
  <!-- Planner -> 接收query -->
  <polyline points="1290,272 1290,420 760,420 760,808 838,808" fill="none" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="900" y="414" font-size="14" fill="#51607A">推送用户 query</text>
  <!-- API -> 分发器 -->
  <line x1="822" y1="592" x2="898" y2="588" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="822" y1="700" x2="898" y2="600" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 分发器 <-> Advisors -->
  <line x1="990" y1="640" x2="990" y2="738" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/><text x="1000" y="690" font-size="13" fill="#51607A">事件触达</text>
  <line x1="1305" y1="640" x2="1305" y2="738" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/><text x="1315" y="690" font-size="13" fill="#51607A">定时触发</text>
  <line x1="1585" y1="738" x2="1585" y2="642" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/><text x="1595" y="690" font-size="13" fill="#51607A">调用工具</text>
  <!-- 工具调用 -> 生态 -->
  <polyline points="1710,592 1900,592 1900,422" fill="none" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 情感Advisor -> Context -->
  <polyline points="1720,772 1780,772 1780,392 1780,392" fill="none" stroke="#5A6B85" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1500" y="500" font-size="14" fill="#51607A">查询 Context 构建上下文</text>
  <!-- Advisor建议 -> Planner (red) -->
  <polyline points="1442,742 1980,742 1980,226 1442,226" fill="none" stroke="#C0392B" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="1700" y="220" font-size="14" font-weight="700" fill="#C0392B">Advisor 建议 → Planner（advice 统一推 planner）</text>
  <!-- 主动推进配置 -> 其它Agent (我们的Advice) + -> Planner (red) -->
  <polyline points="483,800 483,200 798,160" fill="none" stroke="#4A6FB5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="430" font-size="14" fill="#4A6FB5">我们的 Advice</text>
  <polyline points="520,820 600,820 600,250 1138,226" fill="none" stroke="#C0392B" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="640" y="244" font-size="14" font-weight="700" fill="#C0392B">字节配置的主动推荐 Advice</text>
</svg>
