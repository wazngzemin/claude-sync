<svg viewBox="0 0 2820 1560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L8 4 L0 8 z" fill="#5A6B85"/></marker>
    <marker id="arP" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L8 4 L0 8 z" fill="#8E6FBF"/></marker>
    <marker id="arG" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L8 4 L0 8 z" fill="#4E9A52"/></marker>
  </defs>
  <rect x="0" y="0" width="2820" height="1560" fill="#FFFFFF"/>
  <text x="40" y="48" font-size="30" font-weight="700" fill="#1F2A44">触发器系统 · 业务流程（从用户 query 到最终输出 · 含信号触发链 / Director推理 / 扇出 / 端侧VLM调度）</text>
  <text x="40" y="76" font-size="14" fill="#51607A">蓝=query入口 · 绿=信号触发链 · 紫=Director大脑/扇出 · 橙=端侧VLM。 ◇=判断。 连线上为流转说明。</text>

  <!-- ===== A 入口与分流 ===== -->
  <text x="40" y="120" font-size="17" font-weight="700" fill="#3A6FB0">A · 用户 query 入口与分流</text>
  <rect x="40" y="136" width="220" height="50" fill="#EAF1FB" stroke="#4A6FB5" stroke-width="1.8"/><text x="56" y="166" font-size="15" font-weight="700" fill="#1F2A44">用户语音 query</text>
  <rect x="40" y="208" width="220" height="46" fill="#EAF1FB" stroke="#4A6FB5" stroke-width="1.6"/><text x="56" y="236" font-size="14" fill="#1F2A44">ASR(speaker/position)</text>
  <rect x="40" y="276" width="220" height="64" fill="#FFF3D8" stroke="#C8821E" stroke-width="1.8"/><text x="56" y="302" font-size="14" font-weight="700" fill="#9A6410">◇ 云端拒识仲裁意图模型</text><text x="56" y="324" font-size="12" fill="#7A5A1E">分流路由</text>
  <line x1="150" y1="186" x2="150" y2="206" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="150" y1="254" x2="150" y2="274" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <!-- 分流A 车控 -->
  <rect x="320" y="136" width="240" height="50" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="336" y="166" font-size="14" fill="#2E5E33">端侧离线fc + 白名单</text>
  <rect x="320" y="208" width="240" height="56" fill="#FFF3D8" stroke="#C8821E" stroke-width="1.6"/><text x="336" y="234" font-size="13" font-weight="700" fill="#9A6410">◇ 命中白名单?</text><text x="336" y="254" font-size="11" fill="#7A5A1E">是:端侧快执行 / 否:云端结果</text>
  <rect x="320" y="286" width="240" height="50" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.6"/><text x="336" y="316" font-size="14" fill="#1F2A44">原子车控执行</text>
  <rect x="320" y="358" width="240" height="50" fill="#EAE0F7" stroke="#8E6FBF" stroke-width="1.6"/><text x="336" y="388" font-size="14" fill="#3B2F55">输出：车控生效 + 卡片</text>
  <polyline points="260,300 300,160 318,160" fill="none" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/><text x="262" y="200" font-size="12" font-weight="700" fill="#C8821E">①车控+6意图</text>
  <line x1="440" y1="186" x2="440" y2="206" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="440" y1="264" x2="440" y2="284" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="440" y1="336" x2="440" y2="356" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <!-- 分流B 条件/定时话 -->
  <rect x="620" y="136" width="260" height="50" fill="#EAF1FB" stroke="#4A6FB5" stroke-width="1.6"/><text x="636" y="166" font-size="13" fill="#1F2A44">意图模型解析→触发器协议</text>
  <rect x="620" y="208" width="260" height="60" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="636" y="232" font-size="13" font-weight="700" fill="#2E5E33">触发器·条件提槽&解析</text><text x="636" y="254" font-size="11" fill="#3E6E43">◇常识判断(黄赌毒拒) → notify planner</text>
  <rect x="620" y="290" width="260" height="50" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="636" y="320" font-size="13" fill="#2E5E33">注册场景(conditions+actions+priority)</text>
  <rect x="620" y="362" width="260" height="46" fill="#FFF" stroke="#2B3A55" stroke-width="1.4"/><text x="636" y="390" font-size="13" fill="#1F2A44">回执Director · 等待条件触发 ↓↓</text>
  <polyline points="260,310 600,160 618,160" fill="none" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/><text x="320" y="130" font-size="12" font-weight="700" fill="#4A6FB5">②条件/定时话</text>
  <line x1="750" y1="186" x2="750" y2="206" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="750" y1="268" x2="750" y2="288" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="750" y1="340" x2="750" y2="360" stroke="#5A6B85" stroke-width="1.6" marker-end="url(#ar)"/>
  <!-- 分流D 拒识后 -->
  <rect x="940" y="208" width="240" height="56" fill="#FFF" stroke="#2B3A55" stroke-width="1.4"/><text x="956" y="234" font-size="13" fill="#1F2A44">拒识后→Context事件日志</text><text x="956" y="254" font-size="11" fill="#51607A">被advisor感知</text>
  <polyline points="260,330 920,236 938,236" fill="none" stroke="#5A6B85" stroke-width="1.4" marker-end="url(#ar)"/><text x="600" y="296" font-size="12" font-weight="700" fill="#888">④拒识后</text>
  <!-- 分流C 非车控→Director -->
  <text x="270" y="356" font-size="12" font-weight="700" fill="#8E6FBF">③非车控/拒识超时 → Director ↓</text>

  <!-- ===== B 信号触发链 (左下) ===== -->
  <text x="40" y="470" font-size="17" font-weight="700" fill="#1E7A47">B · 信号触发链（主动服务 / 条件任务触发）</text>
  <rect x="40" y="490" width="240" height="48" fill="#FCEBC8" stroke="#C8821E" stroke-width="1.6"/><text x="56" y="519" font-size="14" fill="#6E4E0E">信号采集(端/云·端同步上云)</text>
  <rect x="40" y="560" width="240" height="48" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="56" y="589" font-size="14" fill="#2E5E33">信号库(系统快照)</text>
  <rect x="40" y="630" width="240" height="48" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="56" y="659" font-size="14" fill="#2E5E33">触发器扫描(信号更新/5s)</text>
  <rect x="40" y="700" width="240" height="60" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="56" y="724" font-size="13" font-weight="700" fill="#2E5E33">场景判定(规则判定+模型推理)</text><text x="56" y="746" font-size="11" fill="#3E6E43">◇该车场景集·条件全达成?</text>
  <rect x="40" y="782" width="240" height="44" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="56" y="810" font-size="13" fill="#2E5E33">数值抖动过滤</text>
  <rect x="40" y="848" width="240" height="44" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="56" y="876" font-size="13" fill="#2E5E33">冲突仲裁(优先级最高·planner最高)</text>
  <g stroke="#4E9A52" stroke-width="1.6" marker-end="url(#arG)"><line x1="160" y1="538" x2="160" y2="558"/><line x1="160" y1="608" x2="160" y2="628"/><line x1="160" y1="678" x2="160" y2="698"/><line x1="160" y1="760" x2="160" y2="780"/><line x1="160" y1="826" x2="160" y2="846"/></g>
  <!-- 命中后三路 -->
  <rect x="330" y="760" width="250" height="50" fill="#EAF1FB" stroke="#4A6FB5" stroke-width="1.6"/><text x="346" y="784" font-size="13" fill="#1F2A44">静态advisor触发→思考(查Context)</text><text x="346" y="802" font-size="11" fill="#51607A">→ 建议</text>
  <rect x="330" y="826" width="250" height="50" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="346" y="850" font-size="13" fill="#2E5E33">动态advisor事件→推理</text><text x="346" y="868" font-size="11" fill="#3E6E43">→ 建议</text>
  <rect x="330" y="892" width="250" height="44" fill="#EAE0F7" stroke="#8E6FBF" stroke-width="1.6"/><text x="346" y="920" font-size="13" fill="#3B2F55">通知Director(条件任务已触发)</text>
  <rect x="330" y="952" width="250" height="44" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.6"/><text x="346" y="980" font-size="13" fill="#1F2A44">动作执行(车控)→输出</text>
  <g stroke="#4E9A52" stroke-width="1.5" marker-end="url(#arG)"><line x1="280" y1="870" x2="328" y2="784"/><line x1="280" y1="872" x2="328" y2="850"/><line x1="280" y1="874" x2="328" y2="912"/><line x1="280" y1="876" x2="328" y2="972"/></g>

  <!-- ===== C Director 推理核心 ===== -->
  <text x="1240" y="120" font-size="17" font-weight="700" fill="#8E6FBF">C · Director(=Planner) 推理核心</text>
  <rect x="1240" y="140" width="520" height="120" fill="#F2ECFB" stroke="#8E6FBF" stroke-width="1.8"/><text x="1256" y="166" font-size="14" font-weight="700" fill="#3B2F55">汇入(6路)</text>
  <text x="1256" y="190" font-size="12.5" fill="#5B4B7A">非车控query · 静态advisor建议 · 动态advisor建议</text><text x="1256" y="212" font-size="12.5" fill="#5B4B7A">tool_feedback · 触发器"条件已触发"通知 · Goal List</text><text x="1256" y="240" font-size="12.5" fill="#5B4B7A">→ 前置筛选(筛工具/示例/knowhow) + Context注入(情景/端状态/记忆)</text>
  <rect x="1240" y="290" width="520" height="90" fill="#EAE0F7" stroke="#8E6FBF" stroke-width="2.5"/><text x="1500" y="322" font-size="18" font-weight="700" fill="#3B2F55" text-anchor="middle">Director 推理（核心大脑）</text><text x="1500" y="350" font-size="13" fill="#5B4B7A" text-anchor="middle">输出 { talk_or_not, talk_content, action_list }</text>
  <line x1="1500" y1="260" x2="1500" y2="288" stroke="#8E6FBF" stroke-width="1.8" marker-end="url(#arP)"/>
  <!-- inputs into Director from A/B/advisors/tool -->
  <polyline points="500,366 1230,200" fill="none" stroke="#8E6FBF" stroke-width="1.5" marker-end="url(#arP)"/><text x="700" y="270" font-size="12" fill="#8E6FBF">③非车控query</text>
  <polyline points="580,785 1238,180" fill="none" stroke="#8E6FBF" stroke-width="1.3" marker-end="url(#arP)"/><text x="900" y="500" font-size="12" fill="#8E6FBF">静态建议→</text>
  <polyline points="580,851 1238,210" fill="none" stroke="#8E6FBF" stroke-width="1.3" marker-end="url(#arP)"/><text x="900" y="650" font-size="12" fill="#8E6FBF">动态建议→</text>
  <polyline points="580,914 1238,235" fill="none" stroke="#8E6FBF" stroke-width="1.3" marker-end="url(#arP)"/><text x="900" y="800" font-size="12" fill="#8E6FBF">条件已触发→</text>

  <!-- ===== D 扇出输出 ===== -->
  <text x="1840" y="120" font-size="17" font-weight="700" fill="#8E6FBF">D · 扇出输出（action_list / talk）</text>
  <rect x="1840" y="140" width="300" height="46" fill="#EAE0F7" stroke="#8E6FBF" stroke-width="1.6"/><text x="1856" y="168" font-size="14" fill="#3B2F55">talk_content → TTS播报 + 卡片</text>
  <rect x="1840" y="206" width="300" height="56" fill="#DCE6FA" stroke="#4A6FB5" stroke-width="1.6"/><text x="1856" y="230" font-size="13" fill="#1F2A44">操作工具(车控/搜索/导航/音乐)</text><text x="1856" y="250" font-size="11" fill="#51607A">→ tool_feedback 回Director二次推理</text>
  <rect x="1840" y="282" width="300" height="46" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="1856" y="310" font-size="13" fill="#2E5E33">注册条件任务 → 触发器</text>
  <rect x="1840" y="348" width="300" height="46" fill="#FFF8E8" stroke="#C8821E" stroke-width="1.6"/><text x="1856" y="376" font-size="13" fill="#9A6410">goal_list_update → Goal List</text>
  <rect x="1840" y="414" width="300" height="46" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="1856" y="442" font-size="13" fill="#2E5E33">创建动态advisor</text>
  <rect x="1840" y="480" width="300" height="56" fill="#EAE0F7" stroke="#8E6FBF" stroke-width="1.6"/><text x="1856" y="504" font-size="13" fill="#3B2F55">planner触发机器人</text><text x="1856" y="524" font-size="11" fill="#5B4B7A">→选形象→圆屏/云台展示</text>
  <rect x="2200" y="140" width="240" height="50" fill="#FFF" stroke="#2B3A55" stroke-width="1.6"/><text x="2216" y="170" font-size="14" font-weight="700" fill="#1F2A44">→ 用户(听到/看到)</text>
  <g stroke="#8E6FBF" stroke-width="1.6" marker-end="url(#arP)"><line x1="1760" y1="320" x2="1838" y2="163"/><line x1="1760" y1="330" x2="1838" y2="234"/><line x1="1760" y1="340" x2="1838" y2="305"/><line x1="1760" y1="350" x2="1838" y2="371"/><line x1="1760" y1="360" x2="1838" y2="437"/><line x1="1760" y1="368" x2="1838" y2="508"/></g>
  <line x1="2140" y1="163" x2="2198" y2="163" stroke="#8E6FBF" stroke-width="1.6" marker-end="url(#arP)"/>
  <!-- tool_feedback 回环 -->
  <polyline points="2140,234 2480,234 2480,180 1762,180" fill="none" stroke="#5A6B85" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ar)"/><text x="2200" y="226" font-size="12" fill="#51607A">tool_feedback 回Director(二次推理)</text>
  <!-- 注册条件任务->触发器 回环 -->
  <polyline points="1840,305 800,305 800,288" fill="none" stroke="#4E9A52" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arG)"/><text x="1200" y="298" font-size="12" fill="#4E9A52">Director注册条件任务→触发器</text>

  <!-- ===== E 端侧VLM调度 (底部) ===== -->
  <line x1="20" y1="1060" x2="2800" y2="1060" stroke="#9AA3B0" stroke-width="1.6" stroke-dasharray="10 6"/>
  <text x="40" y="1100" font-size="17" font-weight="700" fill="#9A6410">E · 端侧 VLM 视觉任务调度链（端侧闭环·弱网）</text>
  <rect x="40" y="1120" width="220" height="56" fill="#FCEBC8" stroke="#C8821E" stroke-width="1.6"/><text x="56" y="1146" font-size="13" fill="#6E4E0E">端信号(端状态/VLM/围栏)</text><text x="56" y="1166" font-size="11" fill="#8A6A1E">→端侧信号库</text>
  <rect x="320" y="1120" width="240" height="56" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="336" y="1146" font-size="13" font-weight="700" fill="#2E5E33">端侧触发器·扫描/命中</text><text x="336" y="1166" font-size="11" fill="#3E6E43">优先级P0-P4/互斥组/冷却/Always-on</text>
  <rect x="620" y="1120" width="240" height="56" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="636" y="1146" font-size="13" font-weight="700" fill="#2E5E33">下发运行指令(7字段)</text><text x="636" y="1166" font-size="11" fill="#3E6E43">task_id/goal/priority/timeout/mutex/expire</text>
  <rect x="920" y="1120" width="260" height="56" fill="#FCEBC8" stroke="#C8821E" stroke-width="1.6"/><text x="936" y="1146" font-size="13" font-weight="700" fill="#6E4E0E">端侧VLM业务·执行视觉任务</text><text x="936" y="1166" font-size="11" fill="#8A6A1E">哨兵/迎宾/下车安全/儿童照看/Always-on</text>
  <rect x="1240" y="1120" width="260" height="56" fill="#FFF3D8" stroke="#C8821E" stroke-width="1.6"/><text x="1256" y="1146" font-size="13" font-weight="700" fill="#9A6410">◇ 终态</text><text x="1256" y="1166" font-size="11" fill="#7A5A1E">success/empty/timeout/failed(空≠没看)</text>
  <rect x="1560" y="1120" width="240" height="56" fill="#DDEFDD" stroke="#4E9A52" stroke-width="1.6"/><text x="1576" y="1146" font-size="13" fill="#2E5E33">结果回写信号库</text><text x="1576" y="1166" font-size="11" fill="#3E6E43">供下游消费/可二次触发</text>
  <rect x="1860" y="1120" width="240" height="56" fill="#EFEAF9" stroke="#8E6FBF" stroke-width="1.6"/><text x="1876" y="1146" font-size="13" fill="#3B2F55">动作执行(本地)→本地能力</text><text x="1876" y="1166" font-size="11" fill="#5B4B7A">车控/TTS·弱网闭环</text>
  <g stroke="#C8821E" stroke-width="1.6" marker-end="url(#ar)"><line x1="260" y1="1148" x2="318" y2="1148"/><line x1="560" y1="1148" x2="618" y2="1148"/><line x1="860" y1="1148" x2="918" y2="1148"/><line x1="1180" y1="1148" x2="1238" y2="1148"/><line x1="1500" y1="1148" x2="1558" y2="1148"/></g>
  <polyline points="1680,1176 1680,1240 320,1240 320,1178" fill="none" stroke="#4E9A52" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arG)"/><text x="900" y="1232" font-size="12" fill="#4E9A52">回写信号→端侧触发器二次触发(持续循环↻)</text>
  <line x1="1740" y1="1176" x2="1900" y2="1118" stroke="#C8821E" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- 端侧VLM 也回写到云信号库 -->
  <polyline points="150,1118 150,1060" fill="none" stroke="#C8821E" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ar)"/><text x="156" y="1092" font-size="11" fill="#9A6410">端信号同步上云→信号库(B链)</text>
</svg>
