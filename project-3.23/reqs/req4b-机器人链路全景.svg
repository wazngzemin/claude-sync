<text x="449.3333333333333" y="1078" font-size="13.5" fill="#6d28d9" font-weight="bold" text-anchor="start">🔗 接口② → 需求9 端云分工</text>
<text x="449.3333333333333" y="1102" font-size="12.5" fill="#334155" text-anchor="start">演什么在云 / 怎么转怎么显在端</text>
