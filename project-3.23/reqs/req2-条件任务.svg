<text x="88" y="333" font-size="15.5" font-weight="bold" fill="#ffffff">交给谁 → 他拿到后做什么</text>
<text x="62" y="369" font-size="13.5" font-weight="bold" fill="#5b21b6">意图团队 · 廖婉婷</text>
<text x="66" y="395" font-size="13" fill="#1f2937">• 拿清单当约束,调模型把用户话解析成触发器协议</text>
<text x="90" y="417" font-size="12" fill="#64748b">– 例:『超25度开空调』→ 条件:温度&gt;25,动作:开空调</text>
<text x="66" y="438" font-size="13" fill="#1f2937">• 回你一个『模型调试需要几天』的工期</text>
