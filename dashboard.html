<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 同步管理</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--sf:#1c2129;--border:#30363d;
    --text:#e6edf3;--dim:#8b949e;--accent:#58a6ff;--accentd:#1f6feb;--green:#3fb950;--greend:#238636;
    --red:#f85149;--orange:#d29922;--purple:#bc8cff;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:22px 26px}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;
    padding-bottom:16px;border-bottom:1px solid var(--border)}
  .header h1{font-size:22px;font-weight:600;display:flex;align-items:center;gap:11px}
  .header h1 .logo{width:34px;height:34px;background:linear-gradient(160deg,#3684f5,#a870ff);
    border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .status{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--dim)}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
  .dot.ok{background:var(--green)}.dot.warn{background:var(--orange)}.dot.off{background:var(--red)}

  .hint{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.25);border-radius:9px;
    padding:11px 14px;font-size:13px;color:#c9d7e6;margin-bottom:16px;line-height:1.6}
  .hint b{color:var(--accent)} .hint .g{color:var(--green)}

  .toolbar{display:flex;gap:9px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .btn{padding:9px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);
    color:var(--text);font-size:13.5px;cursor:pointer;transition:.13s;display:flex;align-items:center;gap:7px;user-select:none}
  .btn:hover{background:var(--sf);border-color:var(--dim)} .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
  .btn-push{background:var(--accentd);border-color:var(--accent);font-weight:600}
  .btn-push:hover{background:var(--accent);color:#fff}
  .btn-pull{background:var(--greend);border-color:var(--green);font-weight:600}
  .btn-pull:hover{background:var(--green);color:#fff}
  .btn-del{background:#5c1a1a;border-color:var(--red);font-weight:600}
  .btn-del:hover{background:var(--red);color:#fff}
  .btn-sm{padding:7px 11px;font-size:12.5px}
  .sep{width:1px;height:22px;background:var(--border);margin:0 3px}
  .count{margin-left:auto;font-size:13px;color:var(--dim)}
  .count b{color:var(--accent);font-size:15px}

  .tree{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .sec{padding:9px 16px;font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--dim);
    background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);text-transform:uppercase}
  .row{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;
    border-bottom:1px solid rgba(48,54,61,.4);transition:background .1s}
  .row:hover{background:var(--sf)}
  .caret{width:16px;text-align:center;color:var(--dim);font-size:11px;flex-shrink:0;transition:transform .12s}
  .caret.open{transform:rotate(90deg)}
  .caret.leaf{visibility:hidden}
  .cbox{width:19px;height:19px;border:2px solid var(--border);border-radius:5px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;transition:.12s}
  .row.sel>.cbox{background:var(--accent);border-color:var(--accent)}
  .row.sel>.cbox::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
  .row.covered>.cbox{background:rgba(88,166,255,.35);border-color:rgba(88,166,255,.4)}
  .row.covered>.cbox::after{content:"✓";color:rgba(255,255,255,.7);font-size:12px}
  .ico{font-size:16px;flex-shrink:0}
  .nm{flex:1;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row.dir .nm{font-weight:500}
  .dsc{font-size:11.5px;color:var(--dim);margin-left:6px}
  .sz{font-size:11.5px;color:var(--dim);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px;flex-shrink:0}
  .kids{overflow:hidden}

  .toasts{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
  .toast{padding:13px 18px;border-radius:10px;font-size:13.5px;max-width:420px;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:pre-line;animation:sl .3s}
  .toast.ok{background:var(--greend);border:1px solid var(--green)}
  .toast.fail{background:#5c1a1a;border:1px solid var(--red)}
  .toast.info{background:var(--surface);border:1px solid var(--border)}
  @keyframes sl{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:998;backdrop-filter:blur(4px)}
  .box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 40px;text-align:center;min-width:300px}
  .spin{width:46px;height:46px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 18px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <h1><span class="logo">⇅</span> Claude Code 同步管理</h1>
  <div class="status"><span><span class="dot off" id="dot"></span><span id="stxt">加载中…</span></span><span id="last"></span></div>
</div>

<div class="hint">
  勾选想同步的文件/文件夹 → <b>「推送选中」</b>上传到云,<span class="g">「拉取选中」</span>从云下载。
  勾<b>文件夹</b>=整个一起同步;想只传一个文件,就点开三角 ▶ 展开,单独勾那一个。
</div>

<div class="toolbar">
  <button class="btn btn-push" id="bPush" onclick="doSync('push')" disabled><span>📤</span>推送选中</button>
  <button class="btn btn-pull" id="bPull" onclick="doSync('pull')" disabled><span>📥</span>拉取选中</button>
  <button class="btn btn-del" id="bDel" onclick="doDelete()" disabled><span>🗑</span>删除选中</button>
  <div class="sep"></div>
  <button class="btn btn-sm" onclick="doAll('push')">全部推送</button>
  <button class="btn btn-sm" onclick="doAll('pull')">全部拉取</button>
  <div class="sep"></div>
  <button class="btn btn-sm" onclick="collapseAll()">折叠全部</button>
  <button class="btn btn-sm" onclick="clearSel()">清空勾选</button>
  <button class="btn btn-sm" onclick="loadRoots()">🔄 刷新</button>
  <div class="count">已选 <b id="cnt">0</b> 项</div>
</div>

<div class="tree" id="tree"></div>

<div class="toasts" id="toasts"></div>
<div class="ov" id="ov" style="display:none"><div class="box"><div class="spin"></div>
  <div id="ovt" style="font-size:16px;font-weight:500">同步中…</div>
  <div id="ovs" style="font-size:13px;color:var(--dim);margin-top:6px"></div></div></div>

<script>
const API = location.origin;
let forest = [];
const byKey = {};
const selected = new Set();

function mkNode(n, level, parentKey){
  const node = Object.assign({}, n, {level, parentKey, expanded:false, loaded:!n.expandable, children:[]});
  byKey[node.key] = node;
  return node;
}

async function loadRoots(){
  try{
    const [secs, st] = await Promise.all([
      fetch(API+'/api/roots').then(r=>r.json()),
      fetch(API+'/api/status').then(r=>r.json())
    ]);
    for(const k in byKey) delete byKey[k];
    forest = secs.map(s=>({section:s.section, nodes:s.nodes.map(n=>mkNode(n,0,null))}));
    renderStatus(st); render();
  }catch(e){ toast('连不上同步服务，请重开 App','fail'); }
}

function renderStatus(st){
  const dot=document.getElementById('dot'), t=document.getElementById('stxt'), last=document.getElementById('last');
  if(!st.initialized){dot.className='dot off';t.textContent='未初始化';}
  else if(!st.has_remote){dot.className='dot warn';t.textContent='未连 GitHub';}
  else{dot.className='dot ok';t.textContent='已就绪';}
  last.textContent = st.last_sync? '上次同步: '+st.last_sync.time : '';
}

async function toggleExpand(node){
  if(!node.expandable) return;
  if(!node.loaded){
    const kids = await fetch(`${API}/api/tree?scope=${encodeURIComponent(node.scope)}&rel=${encodeURIComponent(node.rel)}`).then(r=>r.json());
    node.children = kids.map(k=>mkNode(k, node.level+1, node.key));
    node.loaded = true;
  }
  node.expanded = !node.expanded;
  render();
}

function isCovered(node){
  let p = node.parentKey;
  while(p){ if(selected.has(p)) return true; p = byKey[p] ? byKey[p].parentKey : null; }
  return false;
}

function toggleSel(node){
  if(isCovered(node)) return;
  if(selected.has(node.key)) selected.delete(node.key);
  else {
    selected.add(node.key);
    [...selected].forEach(k=>{ if(k!==node.key){ let p=byKey[k]&&byKey[k].parentKey; while(p){ if(p===node.key){selected.delete(k);break;} p=byKey[p]?byKey[p].parentKey:null; } } });
  }
  render();
}

function render(){
  const el = document.getElementById('tree');
  let html='';
  for(const sec of forest){
    html += `<div class="sec">${sec.section}</div>`;
    for(const n of sec.nodes) html += rowHTML(n);
  }
  el.innerHTML = html;
  document.getElementById('cnt').textContent = selected.size;
  const has = selected.size>0;
  document.getElementById('bPush').disabled=!has;
  document.getElementById('bPull').disabled=!has;
  document.getElementById('bDel').disabled=!has;
}

function rowHTML(n){
  const covered = isCovered(n);
  const sel = selected.has(n.key);
  const cls = 'row '+(n.type==='dir'?'dir ':'')+(sel?'sel ':'')+(covered?'covered ':'');
  const caret = n.expandable ? `<span class="caret ${n.expanded?'open':''}" onclick="event.stopPropagation();expandKey('${esc(n.key)}')">▶</span>`
                             : `<span class="caret leaf">▶</span>`;
  const desc = n.desc ? `<span class="dsc">${escHtml(n.desc)}</span>` : '';
  const pad = 16 + n.level*22;
  let h = `<div class="${cls}" style="padding-left:${pad}px" onclick="selKey('${esc(n.key)}')">
    ${caret}<div class="cbox"></div><span class="ico">${n.icon||'📄'}</span>
    <span class="nm">${escHtml(n.label||n.name)}${desc}</span><span class="sz">${n.size||''}</span></div>`;
  if(n.expandable && n.expanded){
    h += `<div class="kids">`;
    for(const c of n.children) h += rowHTML(c);
    h += `</div>`;
  }
  return h;
}

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function escHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
window.expandKey = k => toggleExpand(byKey[k]);
window.selKey = k => toggleSel(byKey[k]);

function collectSelected(){
  return [...selected].map(k=>{const n=byKey[k];return n?{scope:n.scope,rel:n.rel,label:n.label||n.name}:null;}).filter(Boolean);
}
function allRootItems(){
  // 固定的"全部"集合，保证真的全（含未显示的隐藏项）
  return [
    {scope:'file', rel:'claude-md', label:'CLAUDE.md'},
    {scope:'file', rel:'settings', label:'settings.json'},
    {scope:'skills', rel:'', label:'技能'},
    {scope:'plugins', rel:'', label:'插件'},
    {scope:'memories', rel:'', label:'记忆'},
    {scope:'project', rel:'', label:'3.23 全部'},
  ];
}

async function doSync(direction){ await sync(collectSelected(), direction); }
async function doAll(direction){ await sync(allRootItems(), direction); }
async function doDelete(){
  const items = collectSelected();
  if(!items.length){ toast('先勾选要删除的文件/文件夹','info'); return; }
  if(!confirm(`确定删除选中的 ${items.length} 项吗？\n\n· 本机 + 云端都会删除\n· 另一台点「拉取」后也会跟着删\n· 不可撤销`)) return;
  await sync(items, 'delete');
}

async function sync(items, direction){
  if(!items.length){ toast('先勾选要同步的文件/文件夹','info'); return; }
  const dt = {push:'推送',pull:'拉取',delete:'删除'}[direction]||direction;
  showOv(`正在${dt}…`, `${items.length} 项`);
  try{
    const data = await fetch(API+'/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({items,direction})}).then(r=>r.json());
    hideOv();
    if(data.error){ toast(data.error,'fail'); return; }
    const fails = data.results.filter(r=>r.status==='fail');
    if(fails.length){ toast(`${dt}有问题：\n`+fails.map(r=>r.item+': '+r.msg).join('\n'),'fail'); }
    else { const cloud=data.results.find(r=>r.item==='云端'); toast(`${dt}成功！`+(cloud?'\n'+cloud.msg:''),'ok'); }
    loadRoots();
  }catch(e){ hideOv(); toast(`${dt}失败: ${e.message}`,'fail'); }
}

function collapseAll(){ for(const k in byKey) byKey[k].expanded=false; render(); }
function clearSel(){ selected.clear(); render(); }

function toast(m,t='info'){const c=document.getElementById('toasts');const d=document.createElement('div');d.className='toast '+t;d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),6000);}
function showOv(t,s){document.getElementById('ovt').textContent=t;document.getElementById('ovs').textContent=s;document.getElementById('ov').style.display='flex';}
function hideOv(){document.getElementById('ov').style.display='none';}

loadRoots();
</script>
</body>
</html>
