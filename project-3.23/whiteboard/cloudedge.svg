<svg viewBox="0 0 1720 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L9 4 L0 8 z"/></marker>
    <marker id="arrowO" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L8 4 L0 8 z" fill="#C8821E"/></marker>
  </defs>
  <rect x="0" y="0" width="1720" height="980" fill="#FFFFFF"/>
  <text x="40" y="52" font-size="32" font-weight="700" fill="#1F2A44">触发器引擎 · 端云分工</text>
  <text x="40" y="84" font-size="17" fill="#51607A">云端管：注册 · 配置 · 仲裁 · 模型 · 存储　｜　端侧管：信号库 · 判定 · 执行（弱网可闭环）</text>

  <!-- ☁️ 云端 zone -->
  <rect x="40" y="108" width="1640" height="290" fill="#EAF2FC" stroke="#2B3A55" stroke-width="2.5"/>
  <rect x="40" y="108" width="1640" height="46" fill="#2B3A55"/><text x="60" y="140" font-size="20" font-weight="700" fill="#FFFFFF">☁️ 云端（Cloud）</text>
  <rect x="64" y="178" width="300" height="196" fill="#FFFFFF" stroke="#4A6FB5" stroke-width="2"/><text x="84" y="216" font-size="19" font-weight="700" fill="#1F2A44">规则/场景</text><text x="84" y="242" font-size="19" font-weight="700" fill="#1F2A44">配置平台</text><text x="84" y="278" font-size="15" fill="#51607A">注册渠道：Advisor /</text><text x="84" y="300" font-size="15" fill="#51607A">Planner / 预设 / 运营</text><text x="84" y="330" font-size="15" fill="#51607A">触发器管理后台</text>
  <rect x="392" y="178" width="300" height="196" fill="#FFFFFF" stroke="#4A6FB5" stroke-width="2"/><text x="412" y="216" font-size="19" font-weight="700" fill="#1F2A44">云端触发器</text><text x="412" y="256" font-size="15" fill="#51607A">判定"依赖云端服务</text><text x="412" y="278" font-size="15" fill="#51607A">或模型"的场景</text>
  <rect x="720" y="178" width="300" height="196" fill="#FFFFFF" stroke="#4A6FB5" stroke-width="2"/><text x="740" y="216" font-size="19" font-weight="700" fill="#1F2A44">冲突仲裁</text><text x="740" y="256" font-size="15" fill="#51607A">多场景命中</text><text x="740" y="278" font-size="15" fill="#51607A">取优先级最高</text>
  <rect x="1048" y="178" width="300" height="196" fill="#FFFFFF" stroke="#4A6FB5" stroke-width="2"/><text x="1068" y="216" font-size="19" font-weight="700" fill="#1F2A44">云端信号全集</text><text x="1068" y="256" font-size="15" fill="#51607A">端侧信号同步上来</text><text x="1068" y="278" font-size="15" fill="#51607A">云端拥有完整信号</text>
  <rect x="1376" y="178" width="280" height="196" fill="#FFFFFF" stroke="#4A6FB5" stroke-width="2"/><text x="1396" y="216" font-size="19" font-weight="700" fill="#1F2A44">模型 + 存储</text><text x="1396" y="256" font-size="15" fill="#51607A">advisor/planner 推理</text><text x="1396" y="278" font-size="15" fill="#51607A">执行记录存储</text>

  <!-- 端→云 big arrow (UP, left) -->
  <line x1="430" y1="556" x2="430" y2="400" stroke="#C8821E" stroke-width="7" marker-end="url(#arrowO)"/>
  <rect x="120" y="430" width="560" height="96" fill="#FCF3E6" stroke="#C8821E" stroke-width="2"/><text x="140" y="462" font-size="19" font-weight="700" fill="#9A6410">端 → 云（上行）</text><text x="140" y="490" font-size="16" fill="#7A5A1E">① 信号同步上云（保证云端有全集）</text><text x="140" y="514" font-size="16" fill="#7A5A1E">② 执行记录回写存储</text>
  <!-- 云→端 big arrow (DOWN, right) -->
  <line x1="1240" y1="402" x2="1240" y2="558" stroke="#C8821E" stroke-width="7" marker-end="url(#arrowO)"/>
  <rect x="1010" y="430" width="660" height="96" fill="#FCF3E6" stroke="#C8821E" stroke-width="2"/><text x="1030" y="462" font-size="19" font-weight="700" fill="#9A6410">云 → 端（下行）</text><text x="1030" y="490" font-size="16" fill="#7A5A1E">③ 规则下发（全量/增量/灰度） ④ 动态任务下发</text><text x="1030" y="514" font-size="16" fill="#7A5A1E">⑤ 端拉取最新场景（启动 / 每10min / 收到通知）</text>

  <!-- 📟 端侧 zone -->
  <rect x="40" y="560" width="1640" height="300" fill="#E8F4EC" stroke="#1E5E3A" stroke-width="2.5"/>
  <rect x="40" y="560" width="1640" height="46" fill="#1E5E3A"/><text x="60" y="592" font-size="20" font-weight="700" fill="#FFFFFF">📟 端侧（车机 / Device）</text>
  <rect x="64" y="630" width="280" height="200" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="2"/><text x="84" y="668" font-size="19" font-weight="700" fill="#1F2A44">端侧采集</text><text x="84" y="704" font-size="15" fill="#51607A">端状态 / 视觉VLM</text><text x="84" y="726" font-size="15" fill="#51607A">埋点 / 电子围栏</text><text x="84" y="748" font-size="15" fill="#51607A">日期时间</text>
  <rect x="372" y="630" width="320" height="200" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="2"/><text x="392" y="668" font-size="19" font-weight="700" fill="#1F2A44">端侧信号库</text><text x="392" y="704" font-size="15" fill="#51607A">统一事实源</text><text x="392" y="726" font-size="15" fill="#51607A">标准化字段</text><text x="392" y="748" font-size="15" fill="#51607A">任务状态机</text>
  <rect x="720" y="630" width="380" height="200" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="2"/><text x="740" y="668" font-size="19" font-weight="700" fill="#1F2A44">端侧触发器</text><text x="740" y="704" font-size="15" fill="#51607A">规则 + 信号判定是否触发</text><text x="740" y="726" font-size="15" fill="#51607A">优先级 P0-P4 / 互斥组 / 冷却</text><text x="740" y="748" font-size="15" fill="#51607A">规则加载：全量/增量/灰度/回滚</text><text x="740" y="770" font-size="15" fill="#51607A">命中 → 下发运行指令给 VLM</text>
  <rect x="1128" y="630" width="240" height="200" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="2"/><text x="1148" y="668" font-size="19" font-weight="700" fill="#1F2A44">端侧 VLM</text><text x="1148" y="704" font-size="15" fill="#51607A">接收指令识别</text><text x="1148" y="726" font-size="15" fill="#51607A">结果回写信号库</text>
  <rect x="1396" y="630" width="260" height="200" fill="#FFFFFF" stroke="#1E5E3A" stroke-width="2"/><text x="1416" y="668" font-size="19" font-weight="700" fill="#1F2A44">端侧本地执行</text><text x="1416" y="704" font-size="15" fill="#51607A">简单 / 固定</text><text x="1416" y="726" font-size="15" fill="#51607A">弱网可闭环</text>
  <!-- 端侧内部 arrows -->
  <line x1="344" y1="730" x2="370" y2="730" stroke="#1E5E3A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="692" y1="730" x2="718" y2="730" stroke="#1E5E3A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="715" x2="1126" y2="715" stroke="#1E5E3A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="760" x2="1394" y2="760" stroke="#1E5E3A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1180" y="752" font-size="13" fill="#1E5E3A">命中 → 执行</text>

  <!-- 现状/目标 callout -->
  <rect x="40" y="888" width="1640" height="64" fill="#FBECEC" stroke="#C0392B" stroke-width="2"/><text x="60" y="916" font-size="17" font-weight="700" fill="#C0392B">现状：触发判定 + 执行几乎全在云端，端侧信号库 / 触发器还没建起来</text><text x="60" y="942" font-size="17" font-weight="700" fill="#C0392B">目标（需求9 端云分工）：把"简单 / 弱网"任务下沉到端侧闭环，云端只管注册 + 仲裁 + 模型</text>
</svg>
