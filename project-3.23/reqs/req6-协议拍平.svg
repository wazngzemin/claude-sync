<text x="46" y="52" font-size="22" font-weight="bold" fill="#fff">需求6 ｜ 协议拍平 / 支持『任意位置』</text>
<text x="46" y="80" font-size="13" fill="#cbd5e1">车门是套娃结构,位置当参数→『主驾门开』占两条件,『任意门开且X』配不出</text>
