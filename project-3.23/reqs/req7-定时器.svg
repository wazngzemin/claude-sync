<text x="58" y="667" font-size="14.5" font-weight="bold" fill="#ffffff">🔑 开发前置 · 缺了开不了工</text>
<text x="60" y="702" font-size="12.5" fill="#1f2937">• 端侧触发器模块要先具备 ← 依赖需求9</text>
<text x="60" y="724" font-size="12.5" fill="#1f2937">• 云上不跑倒计时(延迟、隧道失联)</text>
<rect x="580.0" y="644" width="520.0" height="106" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.8" filter="url(#sh)"/>
