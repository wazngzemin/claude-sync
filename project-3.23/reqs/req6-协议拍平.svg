<text x="88" y="150" font-size="15.5" font-weight="bold" fill="#ffffff">你(PM)产出 — 协议改造方案</text>
<text x="66" y="186" font-size="13" fill="#1f2937">• 每个门拆成独立一级条件(主 / 副 / 左后 / 右后)</text>
<text x="66" y="208" font-size="13" fill="#1f2937">• position 与端状态平齐,层级拍平</text>
<text x="66" y="230" font-size="13" fill="#1f2937">• 新增『任意位置』表达式支持</text>
