<text x="66" y="208" font-size="13" fill="#1f2937">• 端侧 = 判断触发 + 定时器 + 执行策略(notify / 直接执行)</text>
<text x="66" y="230" font-size="13" fill="#1f2937">• 冲突在云上消解后丢回端;端侧『没脑子只执行』</text>
