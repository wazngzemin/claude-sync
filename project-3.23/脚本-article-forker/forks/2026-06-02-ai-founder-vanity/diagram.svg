<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1880">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 4 L0 8 z"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1680" height="1880" fill="#F5F4EF"/>
  <rect x="32" y="32" width="1616" height="1816" fill="none" stroke="#0A0A0A" stroke-width="4"/>

  <!-- ===== TITLE ===== -->
  <rect x="32" y="32" width="1616" height="138" fill="#0A0A0A"/>
  <text x="68" y="108" fill="#F5F4EF" font-size="52" font-weight="700" letter-spacing="2">AI 软件创业避坑地图</text>
  <text x="68" y="146" fill="#E6FF3D" font-size="22" font-weight="700" letter-spacing="1">从「愚昧之巅」走向「第一性原理」 · 一年踩坑复盘</text>
  <rect x="1320" y="64" width="296" height="74" fill="#E6FF3D"/>
  <text x="1468" y="100" fill="#0A0A0A" font-size="20" font-weight="700" text-anchor="middle">AI coding 抹平了「做得出」</text>
  <text x="1468" y="126" fill="#0A0A0A" font-size="20" font-weight="700" text-anchor="middle">没抹平「做得好」</text>

  <!-- ===== SECTION 01 · 祛魅曲线 ===== -->
  <rect x="32" y="190" width="150" height="40" fill="#0A0A0A"/>
  <text x="48" y="217" fill="#E6FF3D" font-size="18" font-weight="700">01 / 祛魅曲线</text>
  <text x="200" y="218" fill="#0A0A0A" font-size="20" font-weight="700">拿到融资时最自负，落地后才学会敬畏</text>

  <!-- connecting line (up -> down -> up) -->
  <polyline points="232,330 600,360 840,408 1080,360 1448,318" fill="none" stroke="#E6FF3D" stroke-width="6"/>
  <!-- A 愚昧之巅 -->
  <rect x="92" y="290" width="300" height="118" fill="#0A0A0A"/>
  <text x="112" y="330" fill="#E6FF3D" font-size="24" font-weight="700">① 愚昧之巅</text>
  <text x="112" y="362" fill="#F5F4EF" font-size="18">刚拿融资 · 最会拽概念</text>
  <text x="112" y="388" fill="#8A8A85" font-size="17">「讲 RL 讲得溜，其实是被</text>
  <text x="112" y="410" fill="#8A8A85" font-size="17">市场和投资人 RL 了」</text>

  <!-- B 低谷 -->
  <rect x="690" y="350" width="300" height="118" fill="#ECECE8" stroke="#0A0A0A" stroke-width="3"/>
  <text x="710" y="390" fill="#0A0A0A" font-size="24" font-weight="700">② 低谷</text>
  <text x="710" y="422" fill="#0A0A0A" font-size="18">垂类不成立 · 旧金山祛魅</text>
  <text x="710" y="448" fill="#8A8A85" font-size="17">聊遍各类垂类 Agent 公司，</text>
  <text x="710" y="470" fill="#8A8A85" font-size="17">发现大家困境都一样</text>

  <!-- C 重获敬畏 -->
  <rect x="1288" y="278" width="300" height="118" fill="#0A0A0A"/>
  <text x="1308" y="318" fill="#E6FF3D" font-size="24" font-weight="700">③ 重获敬畏</text>
  <text x="1308" y="350" fill="#F5F4EF" font-size="18">转 C · 49 版 · 做简答题</text>
  <text x="1308" y="376" fill="#8A8A85" font-size="17">一个客户端做 3 个月，</text>
  <text x="1308" y="398" fill="#8A8A85" font-size="17">反而没那么焦虑了</text>

  <!-- ===== SECTION 02 · 三个创业错误 ===== -->
  <rect x="32" y="508" width="200" height="40" fill="#0A0A0A"/>
  <text x="48" y="535" fill="#E6FF3D" font-size="18" font-weight="700">02 / 三个创业错误</text>
  <text x="250" y="536" fill="#0A0A0A" font-size="20" font-weight="700">当时都觉得「自洽、英明神武」，回头看基本都错</text>

  <!-- err 1 -->
  <rect x="32" y="566" width="520" height="190" fill="#F5F4EF" stroke="#0A0A0A" stroke-width="3"/>
  <rect x="32" y="566" width="520" height="46" fill="#0A0A0A"/>
  <text x="54" y="598" fill="#F5F4EF" font-size="22" font-weight="700">错误 1 · 选错场景</text>
  <text x="54" y="648" fill="#0A0A0A" font-size="18">Sourcing 只占行业工作的 30%，</text>
  <text x="54" y="676" fill="#0A0A0A" font-size="18">是对 AI 的 low-hanging fruit。</text>
  <text x="54" y="710" fill="#8A8A85" font-size="17">跳过了最费时的「来回沟通」硬骨头</text>
  <text x="54" y="740" fill="#0A0A0A" font-size="17" font-weight="700">→ 要啃端到端，别挑泛化好的浅场景</text>

  <!-- err 2 -->
  <rect x="580" y="566" width="520" height="190" fill="#F5F4EF" stroke="#0A0A0A" stroke-width="3"/>
  <rect x="580" y="566" width="520" height="46" fill="#0A0A0A"/>
  <text x="602" y="598" fill="#F5F4EF" font-size="22" font-weight="700">错误 2 · 做垂直 Agent</text>
  <text x="602" y="648" fill="#0A0A0A" font-size="18">为躲开通用赛道的混战，</text>
  <text x="602" y="676" fill="#0A0A0A" font-size="18">转去做垂类。</text>
  <text x="602" y="710" fill="#8A8A85" font-size="17">却撞上两个结构性困局（见 03）</text>
  <text x="602" y="740" fill="#0A0A0A" font-size="17" font-weight="700">→ 躲混战，躲不开商业模式的地心引力</text>

  <!-- err 3 -->
  <rect x="1128" y="566" width="520" height="190" fill="#F5F4EF" stroke="#0A0A0A" stroke-width="3"/>
  <rect x="1128" y="566" width="520" height="46" fill="#0A0A0A"/>
  <text x="1150" y="598" fill="#F5F4EF" font-size="22" font-weight="700">错误 3 · 过度服务专业用户</text>
  <text x="1150" y="648" fill="#0A0A0A" font-size="18">想「蒸馏专家经验」，</text>
  <text x="1150" y="676" fill="#0A0A0A" font-size="18">最后做成了 SaaS。</text>
  <text x="1150" y="710" fill="#8A8A85" font-size="17">「一直提需求，直到你长得跟剪映一样」</text>
  <text x="1150" y="740" fill="#0A0A0A" font-size="17" font-weight="700">→ 重点服务新用户（原来不用的长尾）</text>

  <!-- ===== SECTION 03 · 两个结构性困局 ===== -->
  <rect x="32" y="800" width="372" height="40" fill="#0A0A0A"/>
  <text x="48" y="827" fill="#E6FF3D" font-size="18" font-weight="700">03 / 垂类 Agent 两个结构性困局</text>
  <text x="424" y="828" fill="#0A0A0A" font-size="20" font-weight="700">这才是「垂类不成立」的根因</text>

  <rect x="32" y="858" width="790" height="150" fill="#E6FF3D"/>
  <text x="58" y="906" fill="#0A0A0A" font-size="24" font-weight="700">困局 A · 被迫成为 agency</text>
  <text x="58" y="946" fill="#0A0A0A" font-size="18">客户本来不用你的产品，你又想挣钱，</text>
  <text x="58" y="974" fill="#0A0A0A" font-size="18">最后只能派一个人去服务他们。</text>
  <text x="58" y="1000" fill="#0A0A0A" font-size="17" font-weight="700">极端：产品连自己都不用，只是给投资人看的「景」</text>

  <rect x="858" y="858" width="790" height="150" fill="#0A0A0A"/>
  <text x="884" y="906" fill="#E6FF3D" font-size="24" font-weight="700">困局 B · 本质还是 toB</text>
  <text x="884" y="946" fill="#F5F4EF" font-size="18">说破天，垂类 Agent 还是 toB 业务。</text>
  <text x="884" y="974" fill="#F5F4EF" font-size="18">中国做 toB 本来就难；</text>
  <text x="884" y="1000" fill="#8A8A85" font-size="17">海外做，华人天花板也非常明显</text>

  <!-- ===== SECTION 04 · B转C方法论 ===== -->
  <rect x="32" y="1052" width="240" height="40" fill="#0A0A0A"/>
  <text x="48" y="1079" fill="#E6FF3D" font-size="18" font-weight="700">04 / B 转 C 方法论</text>
  <text x="290" y="1080" fill="#0A0A0A" font-size="20" font-weight="700">转 C 后真正攒下的可操作收获</text>

  <!-- step 1 -->
  <rect x="32" y="1110" width="388" height="250" fill="#F5F4EF" stroke="#0A0A0A" stroke-width="3"/>
  <rect x="32" y="1110" width="388" height="52" fill="#0A0A0A"/>
  <text x="52" y="1146" fill="#F5F4EF" font-size="21" font-weight="700">① 选挣钱模式</text>
  <text x="52" y="1198" fill="#0A0A0A" font-size="18" font-weight="700">大 R 模式</text>
  <text x="52" y="1224" fill="#8A8A85" font-size="16">ARPU 极高，本质做 token 生意，</text>
  <text x="52" y="1246" fill="#8A8A85" font-size="16">一两万用户就够（如 Lovable）</text>
  <text x="52" y="1290" fill="#0A0A0A" font-size="18" font-weight="700">健身房模式</text>
  <text x="52" y="1316" fill="#8A8A85" font-size="16">收订阅费，赌用户 token 用不满</text>
  <text x="52" y="1338" fill="#8A8A85" font-size="16">赚差价 · 高竞争下毛利低</text>

  <!-- step 2 -->
  <rect x="440" y="1110" width="388" height="250" fill="#F5F4EF" stroke="#0A0A0A" stroke-width="3"/>
  <rect x="440" y="1110" width="388" height="52" fill="#0A0A0A"/>
  <text x="460" y="1146" fill="#F5F4EF" font-size="21" font-weight="700">② 缩短意图→方案</text>
  <text x="460" y="1200" fill="#0A0A0A" font-size="18">只要体验比直接用</text>
  <text x="460" y="1226" fill="#0A0A0A" font-size="18">ChatGPT / Claude 更好，</text>
  <text x="460" y="1252" fill="#0A0A0A" font-size="18" font-weight="700">你就有活着的价值。</text>
  <text x="460" y="1300" fill="#8A8A85" font-size="16">如翻译插件——解决一个</text>
  <text x="460" y="1322" fill="#8A8A85" font-size="16">极其明确的意图</text>

  <!-- step 3 -->
  <rect x="848" y="1110" width="388" height="250" fill="#E6FF3D"/>
  <rect x="848" y="1110" width="388" height="52" fill="#0A0A0A"/>
  <text x="868" y="1146" fill="#E6FF3D" font-size="21" font-weight="700">③ 70% 精力花在交互</text>
  <text x="868" y="1200" fill="#0A0A0A" font-size="18" font-weight="700">交互 + 情绪价值</text>
  <text x="868" y="1240" fill="#0A0A0A" font-size="17">更快 / 更便捷 / 更舒适，</text>
  <text x="868" y="1266" fill="#0A0A0A" font-size="17">交互本身就提供情绪价值。</text>
  <text x="868" y="1312" fill="#0A0A0A" font-size="16">「做生产力大家都一样烂，</text>
  <text x="868" y="1334" fill="#0A0A0A" font-size="16">情绪价值反而非常重要」</text>

  <!-- step 4 -->
  <rect x="1256" y="1110" width="392" height="250" fill="#F5F4EF" stroke="#0A0A0A" stroke-width="3"/>
  <rect x="1256" y="1110" width="392" height="52" fill="#0A0A0A"/>
  <text x="1276" y="1146" fill="#F5F4EF" font-size="21" font-weight="700">④ Reddit 决策漏斗用研</text>
  <text x="1276" y="1198" fill="#0A0A0A" font-size="18">每个产品决策拆成漏斗，</text>
  <text x="1276" y="1224" fill="#0A0A0A" font-size="18">每层设计 40–50 个帖子</text>
  <text x="1276" y="1250" fill="#0A0A0A" font-size="18">收集痛点 → 大量验证 → 做成能力。</text>
  <text x="1276" y="1300" fill="#8A8A85" font-size="16">「一泡 Reddit 就不焦虑了——</text>
  <text x="1276" y="1322" fill="#8A8A85" font-size="16">很多需求尚未被解决」</text>

  <!-- ===== SECTION 05 · 心态转变 ===== -->
  <rect x="32" y="1404" width="200" height="40" fill="#0A0A0A"/>
  <text x="48" y="1431" fill="#E6FF3D" font-size="18" font-weight="700">05 / 心态转变</text>
  <text x="250" y="1432" fill="#0A0A0A" font-size="20" font-weight="700">创业者最大的牵引力，应该来自用户</text>

  <rect x="32" y="1462" width="700" height="150" fill="#ECECE8" stroke="#0A0A0A" stroke-width="3"/>
  <text x="58" y="1506" fill="#0A0A0A" font-size="22" font-weight="700">✗ 拿锤子找钉子 + 俯视感</text>
  <text x="58" y="1546" fill="#0A0A0A" font-size="18">觉得用户现有方案不是最优解，非要</text>
  <text x="58" y="1572" fill="#0A0A0A" font-size="18">给他「雕了花的钛合金锤子」。</text>
  <text x="58" y="1598" fill="#8A8A85" font-size="17">「他不冷，我偏要他穿我这条 AI 秋裤」</text>

  <line x1="752" y1="1537" x2="868" y2="1537" stroke="#0A0A0A" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="888" y="1462" width="760" height="150" fill="#0A0A0A"/>
  <text x="914" y="1506" fill="#E6FF3D" font-size="22" font-weight="700">✓ 用户 = 第一牵引力</text>
  <text x="914" y="1546" fill="#F5F4EF" font-size="18">花大部分时间想：用户问题是什么、需求是</text>
  <text x="914" y="1572" fill="#F5F4EF" font-size="18">什么、解决它的最短路径是什么。</text>
  <text x="914" y="1598" fill="#8A8A85" font-size="17">最短路径往往来自第一性原理 · 克制装 B</text>

  <!-- ===== BOTTOM · 两条核心判断 ===== -->
  <rect x="32" y="1656" width="1616" height="168" fill="#E6FF3D"/>
  <line x1="840" y1="1672" x2="840" y2="1808" stroke="#0A0A0A" stroke-width="3"/>
  <text x="62" y="1704" fill="#0A0A0A" font-size="24" font-weight="700">demo ≠ 发布级</text>
  <text x="62" y="1744" fill="#0A0A0A" font-size="18">软件由上万个细节组成，你得一颗颗把屎吃掉，</text>
  <text x="62" y="1772" fill="#0A0A0A" font-size="18">多吃一个，用户体验就好一点。</text>
  <text x="62" y="1802" fill="#0A0A0A" font-size="17" font-weight="700">做软件像维护草坪——修剪成本 &gt; 铺设成本</text>

  <text x="872" y="1704" fill="#0A0A0A" font-size="24" font-weight="700">简答题 &gt; 证明题</text>
  <text x="872" y="1744" fill="#0A0A0A" font-size="18">迎合市场、自己都不信的产品 = 证明题（一波流）；</text>
  <text x="872" y="1772" fill="#0A0A0A" font-size="18">倾尽全力、因为爱它而做 = 简答题。</text>
  <text x="872" y="1802" fill="#0A0A0A" font-size="17" font-weight="700">人内心那种 spark，是 AI 代替不了的</text>
</svg>
