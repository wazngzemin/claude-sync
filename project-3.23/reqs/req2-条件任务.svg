<text x="88" y="150" font-size="15.5" font-weight="bold" fill="#ffffff">你(PM)产出 — 给意图的两份输入</text>
<text x="62" y="186" font-size="13.5" font-weight="bold" fill="#1e3a8a">交付物:</text>
<text x="66" y="212" font-size="13" fill="#1f2937">• 定稿《高频条件清单》(来自需求1)</text>
<text x="66" y="234" font-size="13" fill="#1f2937">• 协议范围说明:支持哪些条件、哪些取值、什么格式</text>
