<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", sans-serif; }
    .title { font-size: 20px; font-weight: 700; fill: #1a1a2e; }
    .sub { font-size: 11px; fill: #666; }
    .label { font-size: 13px; fill: #fff; font-weight: 600; }
    .label-dark { font-size: 13px; fill: #333; font-weight: 600; }
    .small { font-size: 11px; fill: #fff; }
    .small-dark { font-size: 11px; fill: #555; }
    .arrow-label { font-size: 10px; fill: #333; }
  </style>
  <rect width="960" height="520" fill="#ffffff" rx="12"/>
  <text x="480" y="35" text-anchor="middle" class="title">Planner 内部工作流 + 任务状态机</text>
  <text x="480" y="52" text-anchor="middle" class="sub">从用户说话到最终回复的完整流程</text>
  <rect x="20" y="65" width="560" height="440" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="300" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#667eea">Planner 内部工作流</text>
  <rect x="40" y="100" width="160" height="50" rx="25" fill="#43a047" filter="url(#shadow)"/>
  <text x="120" y="122" text-anchor="middle" class="label">用户说话</text>
  <text x="120" y="137" text-anchor="middle" class="small">"我好热呀"</text>
  <line x1="200" y1="125" x2="235" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="240" y="100" width="160" height="50" rx="10" fill="#1565c0" filter="url(#shadow)"/>
  <text x="320" y="120" text-anchor="middle" class="label">plan_describe</text>
  <text x="320" y="137" text-anchor="middle" class="small">"先想清楚要做啥"</text>
  <line x1="400" y1="125" x2="435" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="520,100 560,125 520,150 480,125" fill="#ff9800" filter="url(#shadow)"/>
  <text x="520" y="128" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">需要查？</text>
  <line x1="520" y1="150" x2="520" y2="175" stroke="#059669" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="532" y="168" class="arrow-label">是</text>
  <line x1="560" y1="125" x2="560" y2="260" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="548" y="200" class="arrow-label" text-anchor="end">否</text>
  <rect x="380" y="178" width="130" height="46" rx="8" fill="#7b1fa2" filter="url(#shadow)"/>
  <text x="445" y="198" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">查用户记忆</text>
  <text x="445" y="213" text-anchor="middle" font-size="10" fill="#e1bee7">偏好/历史</text>
  <rect x="520" y="178" width="130" height="46" rx="8" fill="#7b1fa2" filter="url(#shadow)"/>
  <text x="585" y="198" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">查车辆状态</text>
  <text x="585" y="213" text-anchor="middle" font-size="10" fill="#e1bee7">温度/开关…</text>
  <line x1="445" y1="224" x2="445" y2="260" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="585" y1="224" x2="500" y2="260" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="360" y="262" width="200" height="50" rx="10" fill="#e65100" filter="url(#shadow)"/>
  <text x="460" y="284" text-anchor="middle" class="label">拆解任务</text>
  <text x="460" y="299" text-anchor="middle" class="small">"分成几步去做"</text>
  <line x1="460" y1="312" x2="460" y2="335" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="50" y="338" width="510" height="50" rx="10" fill="none" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="80" y="359" font-size="12" fill="#667eea" font-weight="600">分发给下游 Agent：</text>
  <rect x="210" y="344" width="70" height="34" rx="6" fill="#e3f2fd"/>
  <text x="245" y="366" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="600">车控</text>
  <rect x="288" y="344" width="70" height="34" rx="6" fill="#e8f5e9"/>
  <text x="323" y="366" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="600">音乐</text>
  <rect x="366" y="344" width="70" height="34" rx="6" fill="#fff3e0"/>
  <text x="401" y="366" text-anchor="middle" font-size="10" fill="#e65100" font-weight="600">导航</text>
  <rect x="444" y="344" width="70" height="34" rx="6" fill="#f3e5f5"/>
  <text x="479" y="366" text-anchor="middle" font-size="10" fill="#6a1b9a" font-weight="600">搜索</text>
  <line x1="300" y1="388" x2="300" y2="410" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="200" y="412" width="200" height="40" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="300" y="437" text-anchor="middle" class="label">plan_update 跟进进度</text>
  <line x1="400" y1="432" x2="440" y2="432" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="445" y="412" width="120" height="40" rx="20" fill="#43a047" filter="url(#shadow)"/>
  <text x="505" y="437" text-anchor="middle" class="label">回复用户</text>
  <rect x="600" y="65" width="345" height="440" rx="12" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="772" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#c62828">任务状态机</text>
  <rect x="710" y="110" width="120" height="44" rx="10" fill="#ff9800" filter="url(#shadow)"/>
  <text x="770" y="130" text-anchor="middle" class="label">待执行</text>
  <text x="770" y="145" text-anchor="middle" class="small">PENDING</text>
  <line x1="740" y1="154" x2="690" y2="200" stroke="#059669" stroke-width="2" marker-end="url(#arr-g)"/>
  <rect x="628" y="175" width="70" height="18" rx="4" fill="#fff" stroke="#059669" stroke-width="1"/>
  <text x="663" y="188" text-anchor="middle" font-size="9" fill="#059669">执行成功</text>
  <rect x="630" y="205" width="120" height="44" rx="10" fill="#43a047" filter="url(#shadow)"/>
  <text x="690" y="225" text-anchor="middle" class="label">已完成</text>
  <text x="690" y="240" text-anchor="middle" class="small">COMPLETED</text>
  <line x1="800" y1="154" x2="850" y2="200" stroke="#c62828" stroke-width="2" marker-end="url(#arr-r)"/>
  <rect x="815" y="175" width="70" height="18" rx="4" fill="#fff" stroke="#c62828" stroke-width="1"/>
  <text x="850" y="188" text-anchor="middle" font-size="9" fill="#c62828">执行失败</text>
  <rect x="790" y="205" width="120" height="44" rx="10" fill="#c62828" filter="url(#shadow)"/>
  <text x="850" y="225" text-anchor="middle" class="label">失败</text>
  <text x="850" y="240" text-anchor="middle" class="small">FAILED</text>
  <line x1="850" y1="249" x2="850" y2="285" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-o)"/>
  <rect x="790" y="288" width="120" height="44" rx="10" fill="#e65100" filter="url(#shadow)"/>
  <text x="850" y="308" text-anchor="middle" class="label">重新规划</text>
  <text x="850" y="323" text-anchor="middle" class="small">Replan</text>
  <path d="M 910,310 Q 940,310 940,160 Q 940,127 830,127" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-o)"/>
  <text x="942" y="230" font-size="9" fill="#ea580c">换方案</text>
  <rect x="620" y="356" width="310" height="140" rx="10" fill="#fff" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="775" y="376" text-anchor="middle" font-size="13" fill="#333" font-weight="700">特殊状态处理</text>
  <rect x="635" y="390" width="90" height="36" rx="8" fill="#7b1fa2"/>
  <text x="680" y="413" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">打断</text>
  <rect x="740" y="390" width="90" height="36" rx="8" fill="#1565c0"/>
  <text x="785" y="413" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">恢复</text>
  <rect x="845" y="390" width="70" height="36" rx="8" fill="#ff9800"/>
  <text x="880" y="413" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">挂起</text>
  <text x="680" y="445" text-anchor="middle" font-size="9" fill="#666">用户突然说别的</text>
  <text x="680" y="457" text-anchor="middle" font-size="9" fill="#666">→保存进度</text>
  <text x="785" y="445" text-anchor="middle" font-size="9" fill="#666">插入任务完成</text>
  <text x="785" y="457" text-anchor="middle" font-size="9" fill="#666">→回来继续</text>
  <text x="880" y="445" text-anchor="middle" font-size="9" fill="#666">等条件触发</text>
  <text x="880" y="457" text-anchor="middle" font-size="9" fill="#666">→自动唤醒</text>
  <line x1="725" y1="408" x2="738" y2="408" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>