<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 1016" font-family="PingFang SC, Heiti SC, sans-serif">
<defs><marker id="a" markerWidth="12" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#64748b"/></marker>
<filter id="sh" x="-6%" y="-6%" width="112%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.14"/></filter></defs>
<rect width="1140" height="1016" fill="#ffffff"/>
<rect x="20" y="18" width="1100" height="84" rx="14" fill="#0f172a"/>
<text x="46" y="52" font-size="22" font-weight="bold" fill="#fff">需求1 ｜ 整理《高频触发条件清单》</text>
<text x="46" y="80" font-size="13" fill="#cbd5e1">四方共用的总源头 · 本周第一优先级</text>
<rect x="950" y="38" width="150" height="36" rx="18" fill="#dc2626"/>
<text x="1025.0" y="62" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">P0 · 610</text>
<rect x="40" y="126" width="1060" height="238" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8" filter="url(#sh)"/>
<rect x="40" y="126" width="1060" height="36" rx="12" fill="#2563eb"/>
<rect x="40" y="144" width="1060" height="18" fill="#2563eb"/>
<circle cx="66" cy="144" r="12" fill="#ffffff"/>
<text x="66" y="149" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">1</text>
<text x="88" y="150" font-size="15.5" font-weight="bold" fill="#ffffff">你(PM)产出 — 交付什么</text>
<text x="62" y="186" font-size="13.5" font-weight="bold" fill="#1e3a8a">交付物:《高频触发条件清单》(表格)</text>
<text x="66" y="212" font-size="13" fill="#1f2937">• 每条字段必须写全:</text>
<text x="90" y="234" font-size="12" fill="#64748b">– 条件名(车内温度 / 车速 / 车门 / 座椅占用 …)</text>
<text x="90" y="255" font-size="12" fill="#64748b">– 取值判断方式:布尔开关 | 数值阈值 | 变更为(从无变有)</text>
<text x="90" y="276" font-size="12" fill="#64748b">– 对应《信号库v2.5》的信号编号</text>
<text x="90" y="297" font-size="12" fill="#64748b">– DNA能否支持(✓/✗/?)、归属哪类任务</text>
<text x="66" y="318" font-size="13" fill="#1f2937">• 范围:对标理想任务大师,精选 20~30 条高频,不贪全</text>
<text x="66" y="340" font-size="13" fill="#1f2937">• 形式:Excel / 飞书表,一行一条,可评审</text>
<path d="M570.0,366 L570.0,390" stroke="#94a3b8" stroke-width="2.6" marker-end="url(#a)"/>
<rect x="40" y="394" width="1060" height="180" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8" filter="url(#sh)"/>
<rect x="40" y="394" width="1060" height="36" rx="12" fill="#7c3aed"/>
<rect x="40" y="412" width="1060" height="18" fill="#7c3aed"/>
<circle cx="66" cy="412" r="12" fill="#ffffff"/>
<text x="66" y="417" font-size="14" font-weight="bold" fill="#7c3aed" text-anchor="middle">2</text>
<text x="88" y="418" font-size="15.5" font-weight="bold" fill="#ffffff">交给谁 → 他拿到后做什么(一份清单,分发四方)</text>
<text x="62" y="454" font-size="13.5" font-weight="bold" fill="#5b21b6">同一份清单分发四方,各取所需:</text>
<text x="70" y="480" font-size="13" fill="#334155">▸ 意图 · 廖婉婷 → 当词表调模型,使条件任务可被解析</text>
<text x="70" y="503" font-size="13" fill="#334155">▸ 动态Advisor · 施佳杰 → 按清单解析用户实时订阅事件</text>
<text x="70" y="526" font-size="13" fill="#334155">▸ 主动服务 · 赵益红 → 照清单在后台配『预设事件』</text>
<text x="70" y="549" font-size="13" fill="#334155">▸ 研发 · 刘洋/叶芳 → 录入后台,注册成系统可用条件</text>
<path d="M570.0,576 L570.0,600" stroke="#94a3b8" stroke-width="2.6" marker-end="url(#a)"/>
<rect x="40" y="604" width="1060" height="106" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.8" filter="url(#sh)"/>
<rect x="40" y="604" width="1060" height="36" rx="12" fill="#0d9488"/>
<rect x="40" y="622" width="1060" height="18" fill="#0d9488"/>
<circle cx="66" cy="622" r="12" fill="#ffffff"/>
<text x="66" y="627" font-size="14" font-weight="bold" fill="#0d9488" text-anchor="middle">3</text>
<text x="88" y="628" font-size="15.5" font-weight="bold" fill="#ffffff">研发开发 · 测试验收</text>
<text x="66" y="664" font-size="13" fill="#1f2937">• 刘洋/叶芳:在后台配置器把条件录入、上线</text>
<text x="66" y="686" font-size="13" fill="#1f2937">• 测试·萝莉:找车实测,标记哪些真能触发 / 未部署</text>
<path d="M570.0,712 L570.0,736" stroke="#94a3b8" stroke-width="2.6" marker-end="url(#a)"/>
<rect x="40" y="740" width="1060" height="106" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#sh)"/>
<rect x="40" y="740" width="1060" height="36" rx="12" fill="#16a34a"/>
<rect x="40" y="758" width="1060" height="18" fill="#16a34a"/>
<circle cx="66" cy="758" r="12" fill="#ffffff"/>
<text x="66" y="763" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">4</text>
<text x="88" y="764" font-size="15.5" font-weight="bold" fill="#ffffff">最终落地</text>
<text x="66" y="800" font-size="13" fill="#1f2937">• 后台有一版干净、通用、能被模型解析的标准条件库</text>
<text x="66" y="822" font-size="13" fill="#1f2937">• 成为所有项目(上汽 / 赛力斯)通用基线</text>
<rect x="40" y="868" width="520.0" height="128" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8" filter="url(#sh)"/>
<rect x="40" y="868" width="520.0" height="34" rx="12" fill="#dc2626"/>
<rect x="40" y="885" width="520.0" height="17" fill="#dc2626"/>
<text x="58" y="891" font-size="14.5" font-weight="bold" fill="#ffffff">🔑 开发前置 · 缺了开不了工</text>
<text x="60" y="926" font-size="12.5" fill="#1f2937">• 后台配置器登录权限 ← 找 文涛 / 芭比 开通</text>
<text x="60" y="948" font-size="12.5" fill="#1f2937">• 《信号库v2.5》最新版 ← 找 韩天亮 要</text>
<text x="60" y="970" font-size="12.5" fill="#1f2937">• 你先精选定稿,别等齐所有端信号</text>
<rect x="580.0" y="868" width="520.0" height="128" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.8" filter="url(#sh)"/>
<rect x="580.0" y="868" width="520.0" height="34" rx="12" fill="#d97706"/>
<rect x="580.0" y="885" width="520.0" height="17" fill="#d97706"/>
<text x="598.0" y="891" font-size="14.5" font-weight="bold" fill="#ffffff">🗓 排期 · 依赖 · 风险</text>
<text x="600.0" y="926" font-size="12.5" fill="#1f2937">• 节点:6/15 前评审,610 交需求</text>
<text x="600.0" y="948" font-size="12.5" fill="#1f2937">• 下游强依赖:需求2(意图)依赖本清单</text>
<text x="600.0" y="970" font-size="12.5" fill="#1f2937">• 风险:信号表一直在变 → 锁定一个版本号再开工</text>
</svg>