<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="1200" height="1000">
  <style>
    text { font-family: "SF Mono", "Fira Code", "PingFang SC", "Microsoft YaHei", monospace; fill: #e2e8f0; }
    .title { font-size: 18px; font-weight: 700; fill: #f1f5f9; letter-spacing: 0.05em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .section-title { font-size: 14px; font-weight: 700; }
    .label { font-size: 12px; fill: #e2e8f0; }
    .sublabel { font-size: 10px; fill: #94a3b8; }
    .tiny { font-size: 9px; fill: #64748b; }
    .count { font-size: 10px; fill: #f97316; font-weight: 700; }
    .arrow-label { font-size: 10px; fill: #cbd5e1; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="selector-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="director-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a855f7"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f97316"/></marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>
    <filter id="glow-purple"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-green"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-orange"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="1000" fill="url(#bg-grad)"/>
  <text x="600" y="35" text-anchor="middle" class="title">司机 Agent 2.0 — 动态知识注入系统架构</text>
  <text x="600" y="52" text-anchor="middle" class="subtitle">Two-Layer Agent + Dynamic SP Injection</text>
  <!-- Input Layer -->
  <rect x="30" y="68" width="1140" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="50" y="86" class="sublabel" fill="#64748b">输入层 INPUT</text>
  <rect x="75" y="93" width="190" height="36" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="108" text-anchor="middle" class="label" font-size="11">user_query</text>
  <text x="170" y="122" text-anchor="middle" class="tiny">说话人+位置+内容</text>
  <rect x="305" y="93" width="190" height="36" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="400" y="108" text-anchor="middle" class="label" font-size="11">conversation_history</text>
  <text x="400" y="122" text-anchor="middle" class="tiny">最近10轮对话</text>
  <rect x="535" y="93" width="190" height="36" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="630" y="108" text-anchor="middle" class="label" font-size="11">goal_list</text>
  <text x="630" y="122" text-anchor="middle" class="tiny">目标队列</text>
  <rect x="765" y="93" width="190" height="36" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="860" y="108" text-anchor="middle" class="label" font-size="11">env_info</text>
  <text x="860" y="122" text-anchor="middle" class="tiny">实时车辆状态</text>
  <rect x="995" y="93" width="190" height="36" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="1090" y="108" text-anchor="middle" class="label" font-size="11">loaded_knowledge_ids</text>
  <text x="1090" y="122" text-anchor="middle" class="tiny">已加载知识ID</text>
  <line x1="170" y1="129" x2="170" y2="155" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="400" y1="129" x2="400" y2="155" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="630" y1="129" x2="630" y2="155" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="860" y1="129" x2="860" y2="155" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="1090" y1="129" x2="1090" y2="155" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- Layer 1: Knowledge Selector -->
  <rect x="30" y="160" width="1140" height="280" rx="8" fill="url(#selector-grad)" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow-purple)"/>
  <text x="50" y="183" class="section-title" fill="#a855f7">第一层：Knowledge Selector Agent</text>
  <text x="380" y="183" class="sublabel">知识筛选专家 — 审阅情境，匹配知识索引</text>
  <rect x="50" y="195" width="680" height="175" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="70" y="215" class="label" fill="#c4b5fd">知识库索引目录（四段式编码）</text>
  <rect x="65" y="230" width="195" height="52" rx="4" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="75" y="250" class="label" fill="#f97316" font-weight="700">EXP</text>
  <text x="130" y="250" class="label" font-size="11">销售/体验官</text>
  <text x="75" y="270" class="count">15 条知识</text>
  <text x="135" y="270" class="tiny">购车·试驾·送别</text>
  <rect x="280" y="230" width="195" height="52" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="290" y="250" class="label" fill="#3b82f6" font-weight="700">DRV</text>
  <text x="345" y="250" class="label" font-size="11">司机/导游</text>
  <text x="290" y="270" class="count">20 条知识</text>
  <text x="350" y="270" class="tiny">通勤·接送·充电·泊车</text>
  <rect x="495" y="230" width="195" height="52" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="505" y="250" class="label" fill="#10b981" font-weight="700">COM</text>
  <text x="560" y="250" class="label" font-size="11">随侍/管家</text>
  <text x="505" y="270" class="count">8 条知识</text>
  <text x="550" y="270" class="tiny">调温·晕车·小憩</text>
  <rect x="65" y="300" width="195" height="52" rx="4" fill="#1e293b" stroke="#eab308" stroke-width="1"/>
  <text x="75" y="320" class="label" fill="#eab308" font-weight="700">ENT</text>
  <text x="130" y="320" class="label" font-size="11">DJ/主播</text>
  <text x="75" y="340" class="count">7 条知识</text>
  <text x="120" y="340" class="tiny">听歌·播客·游戏</text>
  <rect x="280" y="300" width="195" height="52" rx="4" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <text x="290" y="320" class="label" fill="#ec4899" font-weight="700">LIFE</text>
  <text x="345" y="320" class="label" font-size="11">管家/助理</text>
  <text x="290" y="340" class="count">7 条知识</text>
  <text x="335" y="340" class="tiny">缴费·天气·快递</text>
  <rect x="495" y="300" width="195" height="52" rx="4" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="505" y="320" class="label" fill="#06b6d4" font-weight="700">EMO</text>
  <text x="560" y="320" class="label" font-size="11">伙伴</text>
  <text x="505" y="340" class="count">7 条知识</text>
  <text x="550" y="340" class="tiny">迎宾·彩蛋·闲聊</text>
  <rect x="750" y="195" width="400" height="175" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="770" y="215" class="label" fill="#c4b5fd">5 条筛选原则</text>
  <text x="770" y="233" class="label" font-size="11">1. 场景绑定推理</text>
  <text x="950" y="233" class="tiny">三级场景粒度匹配</text>
  <text x="770" y="259" class="label" font-size="11">2. 关注环境变化</text>
  <text x="950" y="259" class="tiny">趋势 > 绝对值</text>
  <text x="770" y="285" class="label" font-size="11">3. 目标持续关联</text>
  <text x="950" y="285" class="tiny">目标在则知识留</text>
  <text x="770" y="311" class="label" font-size="11">4. 增量更新</text>
  <text x="950" y="311" class="tiny">只输出变化部分</text>
  <text x="770" y="337" class="label" font-size="11">5. 信息不足不虚构</text>
  <text x="950" y="337" class="tiny">宁空不猜</text>
  <rect x="50" y="385" width="1100" height="44" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="70" y="406" class="label" fill="#a855f7">输出 →</text>
  <text x="140" y="406" class="label" font-size="11">add_knowledge_ids: ["ID1","ID2"]</text>
  <text x="440" y="406" class="label" font-size="11">remove_knowledge_ids: ["ID3"]</text>
  <text x="730" y="406" class="label" font-size="11">reasoning: { add_reason, remove_reason }</text>
  <!-- Arrow: Selector → Assembly -->
  <line x1="600" y1="440" x2="600" y2="460" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <!-- Knowledge Assembly -->
  <rect x="280" y="465" width="640" height="50" rx="6" fill="#1c1917" stroke="#f97316" stroke-width="1.5" filter="url(#glow-orange)"/>
  <text x="310" y="490" class="label" fill="#f97316" font-weight="700">知识拼接层</text>
  <text x="440" y="490" class="label" font-size="11">ID → 知识数据(Excel) → 全文取出 → 拼接为 {{knowledge}}</text>
  <ellipse cx="160" cy="480" rx="60" ry="12" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <rect x="100" y="480" width="120" height="25" fill="#052e16" stroke="none"/>
  <line x1="100" y1="480" x2="100" y2="505" stroke="#059669" stroke-width="1"/>
  <line x1="220" y1="480" x2="220" y2="505" stroke="#059669" stroke-width="1"/>
  <ellipse cx="160" cy="505" rx="60" ry="12" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="160" y="498" text-anchor="middle" class="label" font-size="11" fill="#10b981">知识数据层</text>
  <text x="160" y="530" text-anchor="middle" class="tiny">Excel 结构化表格</text>
  <text x="160" y="542" text-anchor="middle" class="tiny">(产出中)</text>
  <line x1="220" y1="490" x2="278" y2="490" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="600" y1="515" x2="600" y2="555" stroke="#f97316" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="555" y="527" width="90" height="16" rx="3" fill="#0f0f1a" opacity="0.95"/>
  <text x="600" y="539" text-anchor="middle" class="arrow-label" fill="#f97316">{{knowledge}}</text>
  <!-- Layer 2: Director/Thinker -->
  <rect x="30" y="560" width="1140" height="290" rx="8" fill="url(#director-grad)" stroke="#10b981" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="50" y="583" class="section-title" fill="#10b981">第二层：Director / Thinker Agent</text>
  <text x="380" y="583" class="sublabel">对话推理引擎 — SP 中注入动态知识，执行对话与任务</text>
  <rect x="50" y="595" width="350" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="70" y="613" class="label" fill="#86efac">3 种输入类型</text>
  <rect x="65" y="622" width="108" height="42" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="119" y="638" text-anchor="middle" class="label" font-size="10" fill="#3b82f6">user_query</text>
  <text x="119" y="655" text-anchor="middle" class="tiny">用户说的话</text>
  <rect x="180" y="622" width="108" height="42" rx="3" fill="#1e293b" stroke="#eab308" stroke-width="1"/>
  <text x="234" y="638" text-anchor="middle" class="label" font-size="10" fill="#eab308">advisor</text>
  <text x="234" y="655" text-anchor="middle" class="tiny">专家Agent建议</text>
  <rect x="295" y="622" width="108" height="42" rx="3" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="349" y="638" text-anchor="middle" class="label" font-size="10" fill="#f97316">tool_feedback</text>
  <text x="349" y="655" text-anchor="middle" class="tiny">工具返回结果</text>
  <rect x="50" y="683" width="350" height="30" rx="4" fill="#1c2d1c" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="225" y="703" text-anchor="middle" class="label" font-size="11" fill="#10b981">SP 注入点: &lt;动态专业知识&gt;{{knowledge}}&lt;/&gt;</text>
  <rect x="420" y="595" width="740" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="440" y="613" class="label" fill="#86efac">18 个可用工具</text>
  <text x="435" y="625" class="label" font-size="10" fill="#ef4444">车控类:</text>
  <text x="485" y="625" class="tiny" fill="#94a3b8">车控 | 车状态 | 导航控制</text>
  <text x="435" y="670" class="label" font-size="10" fill="#3b82f6">搜索类:</text>
  <text x="485" y="670" class="tiny" fill="#94a3b8">天气 | POI | 路线 | 联网 | 车书</text>
  <text x="720" y="625" class="label" font-size="10" fill="#eab308">媒体类:</text>
  <text x="770" y="625" class="tiny" fill="#94a3b8">音乐 | 短视频 | AI播客 | 图片</text>
  <text x="720" y="670" class="label" font-size="10" fill="#a855f7">记忆类:</text>
  <text x="770" y="670" class="tiny" fill="#94a3b8">记忆检索 | 人脸 | 长期记忆</text>
  <text x="990" y="625" class="label" font-size="10" fill="#06b6d4">管理类:</text>
  <text x="1040" y="625" class="tiny" fill="#94a3b8">目标管理 | GUI操作 | 视觉问答</text>
  <rect x="50" y="725" width="1100" height="44" rx="4" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="70" y="746" class="label" fill="#10b981">输出 →</text>
  <text x="140" y="746" class="label" font-size="11">talk_or_not: "yes/no"</text>
  <text x="360" y="746" class="label" font-size="11">talk_content: "对用户说的话"</text>
  <text x="650" y="746" class="label" font-size="11">action_list: [{ action_id, params, tool_name }]</text>
  <rect x="50" y="778" width="1100" height="55" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="70" y="796" class="sublabel" fill="#64748b">关键注意事项</text>
  <text x="200" y="796" class="tiny">听不懂→沉默</text>
  <text x="350" y="796" class="tiny">串行依赖→不并发</text>
  <text x="530" y="796" class="tiny">tool成功→不必说话</text>
  <text x="710" y="796" class="tiny">GUI等待→优先路由add_info</text>
  <text x="930" y="796" class="tiny">重复输入→沉默</text>
  <text x="200" y="818" class="tiny">模糊需求→询问</text>
  <text x="350" y="818" class="tiny">工具反复失败→放弃</text>
  <text x="530" y="818" class="tiny">新任务不沿用历史参数</text>
  <text x="710" y="818" class="tiny">仅输出JSON</text>
  <!-- Feedback: Tool Execution → Director -->
  <rect x="350" y="870" width="300" height="36" rx="6" fill="#1c1917" stroke="#f97316" stroke-width="1"/>
  <text x="500" y="893" text-anchor="middle" class="label" font-size="11" fill="#f97316">工具执行 Tool Execution</text>
  <line x1="500" y1="769" x2="500" y2="868" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M 650,888 L 1190,888 L 1190,640 L 1165,640" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <rect x="1095" y="870" width="90" height="16" rx="3" fill="#0f0f1a" opacity="0.95"/>
  <text x="1140" y="882" text-anchor="middle" class="arrow-label" fill="#f97316">tool_feedback</text>
  <path d="M 350,888 L 15,888 L 15,111 L 73,111" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <rect x="3" y="500" width="16" height="55" rx="3" fill="#0f0f1a" opacity="0.95"/>
  <text x="11" y="510" text-anchor="middle" class="tiny" fill="#a855f7" transform="rotate(90,11,510)">更新 loaded_ids</text>
  <!-- Legend -->
  <rect x="700" y="920" width="480" height="65" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="720" y="940" class="sublabel" fill="#64748b">图例 LEGEND</text>
  <line x1="800" y1="936" x2="840" y2="936" stroke="#3b82f6" stroke-width="2"/>
  <text x="848" y="940" class="tiny" fill="#94a3b8">输入数据流</text>
  <line x1="930" y1="936" x2="970" y2="936" stroke="#a855f7" stroke-width="2"/>
  <text x="978" y="940" class="tiny" fill="#94a3b8">知识筛选流</text>
  <line x1="1060" y1="936" x2="1100" y2="936" stroke="#f97316" stroke-width="2"/>
  <text x="1108" y="940" class="tiny" fill="#94a3b8">执行流</text>
  <line x1="800" y1="962" x2="840" y2="962" stroke="#10b981" stroke-width="2"/>
  <text x="848" y="966" class="tiny" fill="#94a3b8">数据存储</text>
  <line x1="930" y1="962" x2="970" y2="962" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="978" y="966" class="tiny" fill="#94a3b8">反馈循环</text>
  <line x1="1060" y1="962" x2="1100" y2="962" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="1108" y="966" class="tiny" fill="#94a3b8">状态回传</text>
  <text x="50" y="940" class="sublabel" fill="#64748b">司机 Agent 2.0</text>
  <text x="50" y="958" class="tiny">字节跳动 火山引擎 × 上汽 SAIC</text>
  <text x="50" y="972" class="tiny">豆包大模型 + 智能座舱</text>
</svg>